  la:`Domine, fac me instrumentum pacis tuae:\nubi odium, amorem seminem;\nubi iniuria, veniam;\nubi discordia, unitatem;\nubi dubium, fidem;\nubi error, veritatem;\nubi desperatio, spem;\nubi tristitia, laetitiam;\nubi tenebrae, lucem.\n\nDivine Magister, effice ut non tam\nquaeram consolari quam consolari,\nintellegi quam intellegere,\namari quam amare.\nNam in dando accipitur,\nin ignoscendo ignosco,\net in moriendo\nad vitam aeternam nascimur.\nAmen.`}},

{id:52,cat:'saints',
 title:{en:'Prayer to St. Anthony',pt:'Oração a Santo Antônio',la:'Ad Sanctum Antonium'},
 text:{
  en:`O wonderful St. Anthony,\ngentle and powerful in your intercession,\nyou are the patron of lost things\nand the special advocate\nfor those in need of a miracle.\nGrant us your aid in this our hour of need.\nTouch our hearts and lead us\nback to what we have lost,\nwhether it be material things,\nor something more precious:\nour health, our hope,\nor our love for God.\nAmen.`,
  pt:`Ó maravilhoso Santo Antônio,\nsuave e poderoso na vossa intercessão,\nvós sois o patrono das coisas perdidas\ne o defensor especial\ndaqueles que precisam de um milagre.\nConcedei-nos o vosso auxílio nesta hora de necessidade.\nTocai nossos corações e conduzi-nos\nde volta ao que perdemos,\nseja coisa material,\nsejar algo mais precioso:\nnossa saúde, nossa esperança\nou nosso amor por Deus.\nAmém.`,
  la:`O mirande Sancte Antoni,\nmitis et potens in intercessione tua,\ntu es patronus rerum amissarum\net advocatus specialis\neorum qui miraculum necessitatibus indigent.\nDa nobis auxilium tuum in hac necessitate.\nCor nostrum tange et rededuc nos\nad id quod amisimus,\nsive res materiales sint,\nsive aliquid pretiosius:\nvaletudo, spes,\nvel amor Dei.\nAmen.`}},

{id:53,cat:'saints',
 title:{en:'Prayer to St. Therese of Lisieux',pt:'Oração a Santa Teresinha',la:'Ad Sanctam Teresiam Parvu'},
 text:{
  en:`O Little Flower of Jesus,\nask God today to grant the graces\nI need so much.\nYou promised to let fall\na shower of roses when you died.\nPlease, dear Little Flower,\npick for me the roses I need most\nand drop them down as favors,\nnot only for my temporal needs,\nbut above all for my immortal soul.\nAmen.`,
  pt:`Ó Flor pequenina de Jesus,\npedi a Deus hoje que me conceda as graças\nde que tanto necessito.\nVós prometestes enviar do Céu\numa chuva de rosas ao morrer.\nPor favor, querida Florzinha,\nescolhei para mim as rosas de que mais preciso\ne deixai-as cair como favores,\nnão somente para minhas necessidades temporais,\nmas sobretudo para minha alma imortal.\nAmém.`,
  la:`O Flos parvule Iesu,\nroga Deum hodie ut gratias mihi concedas\nde quibus tam vehementer egeo.\nPromisisti te imbrem rosarum\nmittere post mortem tuam.\nOro te, cara Flos parvule,\nrosas quas maxime indigeo elige pro me\net eas ut beneficia demitte,\nnon solum pro necessitatibus temporalibus,\nverum etiam praecipue pro anima mea immortali.\nAmen.`}},

{id:54,cat:'saints',
 title:{en:'Prayer to St. Augustine',pt:'Oração de Santo Agostinho',la:'Oratio Sancti Augustini'},
 text:{
  en:`Breathe in me, O Holy Spirit,\nthat my thoughts may all be holy.\nAct in me, O Holy Spirit,\nthat my work, too, may be holy.\nDraw my heart, O Holy Spirit,\nthat I love but what is holy.\nStrengthen me, O Holy Spirit,\nto defend all that is holy.\nGuard me, then, O Holy Spirit,\nthat I always may be holy.\nAmen.`,
  pt:`Respirai em mim, Espírito Santo,\npara que todos os meus pensamentos sejam santos.\nAgisté em mim, Espírito Santo,\npara que o meu trabalho também seja santo.\nAtraí meu coração, Espírito Santo,\npara que eu ame somente o que é santo.\nFortificai-me, Espírito Santo,\npara que defenda tudo o que é santo.\nGuardai-me, Espírito Santo,\npara que eu sempre possa ser santo.\nAmém.`,
  la:`Spira in me, Spiritus Sancte,\nut omnes cogitationes meae sanctae sint.\nAge in me, Spiritus Sancte,\nut opus meum quoque sanctum sit.\nAttrahe cor meum, Spiritus Sancte,\nut quod sanctum est solum amem.\nRobora me, Spiritus Sancte,\nut quod sanctum est defendant.\nCustodi me, Spiritus Sancte,\nut semper sanctus esse possim.\nAmen.`}},

{id:55,cat:'saints',
 title:{en:'Prayer to St. Thomas Aquinas (Before Study)',pt:'Oração de São Tomás de Aquino',la:'Oratio S. Thomae Aquinatis'},
 text:{
  en:`Creator of all things,\ntrue source of light and wisdom,\nlofty origin of all being,\ngraciously let a ray of your brilliance\npenetrate into the darkness of my understanding\nand take from me the double darkness\nin which I have been born,\nan obscurity of both sin and ignorance.\nGive me a sharp sense of understanding,\na retentive memory,\nand the ability to grasp things correctly and fundamentally.\nAmen.`,
  pt:`Criador de todas as coisas,\nverdadeira fonte de luz e sabedoria,\neleva origem de todo ser,\ndignai-Vos infundir nos escuros de meu entendimento\num raio de Vossa claridade,\ne afastai de mim as duplas trevas\nem que nasci:\na obscuridade do pecado e da ignorância.\nDai-me agudeza para entender,\ncapacidade para reter,\ne habilidade para aprender as coisas\ncomo são verdadeiramente.\nAmém.`,
  la:`Creator omnium rerum,\nvera lux et sapientia,\nalte omnium rerum origo,\ndignare mentis meae tenebras\nraio claritatis tuae illuminare,\net duplices, quibus natus sum, tenebras\na me auferre:\npeccati scilicet et ignorantiae.\nDa mihi acumen intelligendi,\nretinendi capacitatem\net rerum vere intelligendarum habilitem.\nAmen.`}},

{id:56,cat:'saints',
 title:{en:'Prayer to St. Padre Pio',pt:'Oração a Padre Pio',la:'Ad Sanctum Pium ex Pietrelcina'},
 text:{
  en:`Dear Padre Pio,\nyou bore the wounds of Christ\nand spent your life in prayer and sacrifice\nfor the salvation of souls.\nFrom your place in Heaven,\nobtain for me the graces I need most.\nI trust in your powerful intercession\nand in the mercy of God.\nAmen.`,
  pt:`Querido Padre Pio,\nvós carrastes as chagas de Cristo\ne passastes a vida em oração e sacrifício\npela salvação das almas.\nDo lugar que ocupais no Céu,\ninterecedei por mim e pedi as graças de que mais necessito.\nConfio na vossa poderosa intercessão\ne na misericórdia de Deus.\nAmém.`,
  la:`Care Sancte Pie,\ntua stigmata Christi gerebas\nvitamque tuam in oratione et sacrificio\npro salute animarum transegisti.\nEx loco tuo in caelo,\nobtine mihi gratias quas maxime indigeo.\nPotenti intercessioni tuae\net misericordiae Dei confido.\nAmen.`}},

{id:57,cat:'saints',
 title:{en:'Prayer to St. Jude',pt:'Oração a São Judas Tadeu',la:'Ad Sanctum Iudam Thaddaeum'},
 text:{
  en:`O most holy apostle, St. Jude,\nfaithful servant and friend of Jesus,\nthe name of the traitor who delivered\nyour beloved Master into the hands of His enemies\nhas caused you to be forgotten by many.\nBut the Church honors and invokes you universally\nas the patron of hopeless cases\nand of things despaired of.\nPray for me, that finally I may receive\nthe consolations and the help of Heaven.\nAmen.`,
  pt:`Ó glorioso apóstolo São Judas Tadeu,\nfiel servo e amigo de Jesus,\no nome do traidor que entregou\nvosso amado Mestre nas mãos dos inimigos\nvos fez ser esquecido por muitos.\nMas a Igreja vos honra e invoca universalmente\ncomo patrono dos casos desesperados.\nOrai por mim, para que eu finalmente receba\nas consolações e o auxílio do Céu.\nAmém.`,
  la:`O Sanctissime Apostole Iuda Thaddaee,\nfidelis serve et amice Iesu,\nnomen proditoris,\nqui dilectum Magistrum tuum\nin hostium manus tradidit,\nte in oblivionem a multis abduxit.\nSed Ecclesia te universaliter honorat et invocat\nut patronum desperatorum casuum.\nOra pro me,\nut tandem consolationes et auxilium caeli recipiam.\nAmen.`}},

{id:58,cat:'saints',
 title:{en:'Prayer to St. Rita',pt:'Oração a Santa Rita de Cássia',la:'Ad Sanctam Ritam'},
 text:{
  en:`O holy patroness of those in need,\nSaint Rita,\nyour pleadings before your Divine Lord are irresistible;\nthrough the favors you obtained,\nmiracles seem to be the proof\nof your great power with God.\nConfidently I come to you,\nbecause I am desperate for your help.\nO dear Saint Rita,\nintercede on my behalf.\nAmen.`,
  pt:`Ó Santa padroeira dos necessitados,\nSanta Rita de Cássia,\nvossas súplicas diante do Senhor são irresistíveis;\npelos favores que obtivestes,\nos milagres parecem ser a prova\ndo grande poder que tendes junto a Deus.\nVenho a Vós confiante,\npois preciso desesperadamente do vosso auxílio.\nÓ querida Santa Rita,\nintercedei por mim.\nAmém.`,
  la:`O sancta patrocina egenorum,\nSancta Rita,\npreces tuae apud Dominum tuum divinum irresistibiles sunt;\nper beneficia quae impetravisti,\nmiracula quasi probatio sunt\nmagnae potentiae tuae apud Deum.\nConfidenter ad te venio,\nquia auxilio tuo desperatissime indigeo.\nO cara Sancta Rita,\nintercessione tua pro me adi Deum.\nAmen.`}},

{id:59,cat:'saints',
 title:{en:'Prayer to the Holy Family',pt:'Oração à Sagrada Família',la:'Ad Sacram Familiam'},
 text:{
  en:`Jesus, Mary, and Joseph,\nin you we contemplate\nthe splendor of true love;\nto you we turn with trust.\nHoly Family of Nazareth,\nmake our families too\nplaces of communion and prayer,\nauthentic schools of the Gospel\nand small domestic churches.\nHoly Family of Nazareth,\nmay families never again\nexperience violence, rejection and division;\nmay all who have been hurt or scandalized\nfind ready comfort and healing.\nAmen.`,
  pt:`Jesus, Maria e José,\nem Vós contemplamos o esplendor do verdadeiro amor;\na Vós nos voltamos com confiança.\nSagrada Família de Nazaré,\nfazei de nossas famílias\nlugares de comunhão e de oração,\nautênticas escolas do Evangelho\ne pequenas Igrejas domésticas.\nSagrada Família de Nazaré,\nque as famílias nunca mais vivam\na violência, a rejeição e a divisão;\nque todos os que foram feridos ou escandalizados\nencontrem pronto consolo e cura.\nAmém.`,
  la:`Iesu, Maria et Ioseph,\nin vobis splendorem veri amoris contemplamur;\nad vos cum fiducia convertimus.\nSancta Familia Nazaretana,\nfac familias nostras quoque\nloca communionis et orationis,\nauthenticas scholas Evangelii\net parvas Ecclesias domesticas.\nSancta Familia Nazaretana,\nut familiae violentiam, reiectionem et divisionem\nnunquam amplius patiantur;\nut omnes qui vulnerati vel scandalizati sunt\nsolatium et curationem promptam inveniant.\nAmen.`}},

{id:60,cat:'saints',
 title:{en:'Prayer to All Saints',pt:'Oração a Todos os Santos',la:'Ad Omnes Sanctos'},
 text:{
  en:`O all ye holy saints of God,\nyou who are already enjoying\nthe blessed vision of God,\nremember us before the Throne of the Most High.\nPray for the Church,\npray for sinners,\npray for those in purgatory,\npray for all who need God's grace.\nMay your intercession hasten the day\nwhen we too shall be gathered\ninto the company of the blessed in Heaven.\nAmen.`,
  pt:`Ó todos os Santos de Deus,\nvós que já estais gozando\nda bem-aventurada visão de Deus,\nlembrai-vos de nós diante do Trono do Altíssimo.\nOrai pela Igreja,\norai pelos pecadores,\norai pelos que estão no Purgatório,\norai por todos os que necessitam da graça de Deus.\nQue a vossa intercessão apresse o dia\nem que nós também seremos reunidos\nà vossa companhia no Céu.\nAmém.`,
  la:`O omnes Sancti Dei,\nvos qui iam beatam Dei visionem fruitini estis,\nmemento nostri ante Thronum Altissimi.\nOrate pro Ecclesia,\norate pro peccatoribus,\norate pro animabus in purgatorio,\norate pro omnibus qui gratia Dei indigent.\nIntercessio vestra festinet diem\nqua nos quoque in societa beatorum in caelo congregabimur.\nAmen.`}},

// ── DAILY ───────────────────────────────────────────────────────────
{id:61,cat:'daily',
 title:{en:'Morning Prayer',pt:'Oração da Manhã',la:'Oratio Matutina'},
 text:{
  en:`Lord God, almighty Father,\nwho have brought me safely to the beginning of this day,\ndefend me today by your mighty power\nthat I may not fall into any sin,\nbut that all my words may so proceed\nand all my thoughts and actions be so directed\nas to be always just in your sight.\nThrough Christ our Lord.\nAmen.`,
  pt:`Senhor Deus, Pai todo-poderoso,\nque me conduzistes em segurança\naté o início deste dia,\ndefendei-me hoje com vosso poder\npara que não caia em nenhum pecado,\nmas que todas as minhas palavras procedam\ne todos os meus pensamentos e ações sejam dirigidos\npara que sejam sempre justos a Vossos olhos.\nPelo Cristo Nosso Senhor.\nAmém.`,
  la:`Domine Deus, Pater omnipotens,\nqui me salvo perduces ad huius diei principium,\nme hodie potentia tua munitum conserva,\nne in ullum incidam peccatum,\nsed cuncta verba mea sic procedant\ncunctaeque cogitationes et actiones meae sic dirigantur\nut tibi semper iusta sint.\nPer Christum Dominum nostrum.\nAmen.`}},

{id:62,cat:'daily',
 title:{en:'Night Prayer (Compline)',pt:'Oração da Noite (Completas)',la:'Completorium'},
 text:{
  en:`Be present, O merciful God,\nand protect us through the silent hours of this night,\nso that we who are wearied\nby the changes and chances of this fleeting world\nmay repose upon Thy eternal changelessness;\nthrough Jesus Christ our Lord.\nAmen.`,
  pt:`Sede presente, ó Deus misericordioso,\ne protegei-nos durante as horas silenciosas desta noite,\npara que nós, fatigados pelas vicissitudes\ndeste mundo passageiro,\npossamos repousar sobre a Vossa eterna imutabilidade;\npor Jesus Cristo Nosso Senhor.\nAmém.`,
  la:`Adesto, Deus miserator,\net per horas silentes noctis huius\nnos protege;\nut nos qui mutatione et casibus\nhuius labentis mundi fessi sumus\nsuper aeternam tuam immuabilitatem requiescamus;\nper Iesum Christum Dominum nostrum.\nAmen.`}},

{id:63,cat:'daily',
 title:{en:'Prayer Before Study',pt:'Oração Antes do Estudo',la:'Ante Studium'},
 text:{
  en:`Come, Holy Spirit,\nfill the hearts of your faithful\nand enkindle in them the fire of your love.\nSend forth your Spirit and they shall be created,\nand You shall renew the face of the earth.\n\nO God, who by the light of the Holy Spirit\ndid instruct the hearts of the faithful,\ngrant that by the same Holy Spirit\nwe may be truly wise\nand ever rejoice in His consolations.\nThrough Christ our Lord.\nAmen.`,
  pt:`Vinde, Espírito Santo,\nenchei os corações dos Vossos fiéis\ne acendei neles o fogo do Vosso amor.\nEnviai o Vosso Espírito e serão criados,\ne Vós renovareis a face da terra.\n\nÓ Deus, que iluminastes os corações dos fiéis\npela luz do Espírito Santo,\nconcedei-nos que pela virtude do mesmo Espírito\npossamos saber o que é reto\ne sempre nos regozijemos\ncom o Seu consolo.\nPelo Cristo Nosso Senhor.\nAmém.`,
  la:`Veni, Sancte Spiritus,\nreple tuorum corda fidelium,\net tui amoris in eis ignem accende.\nEmitte Spiritum tuum et creabuntur,\net renovabis faciem terrae.\n\nDeus, qui corda fidelium\nSancti Spiritus illustratione docuisti,\nda nobis in eodem Spiritu\nrecta sapere,\net de eius semper consolatione gaudere.\nPer Christum Dominum nostrum.\nAmen.`}},

{id:64,cat:'daily',
 title:{en:"Prayer for Peace (St. Francis)",pt:'Oração pela Paz (São Francisco)',la:'Pro Pace'},
 text:{
  en:`Lord, make me an instrument of your peace.\nWhere there is hatred, let me sow love;\nwhere there is injury, pardon;\nwhere there is doubt, faith;\nwhere there is despair, hope;\nwhere there is darkness, light;\nand where there is sadness, joy.\nGrant that I may not so much seek\nto be consoled as to console;\nto be understood as to understand;\nto be loved as to love.\nFor it is in giving that we receive;\nit is in pardoning that we are pardoned;\nand it is in dying that we are born to eternal life.\nAmen.`,
  pt:`Senhor, fazei de mim\num instrumento de Vossa paz.\nOnde houver ódio, que eu leve o amor;\nondes houver ofensa, o perdão;\nondes houver discórdia, a union;\nondes houver dúvida, a fé;\nondes houver desespero, a esperança;\nondes houver tristeza, a alegria;\nondes houver trevas, a luz.\nÓ Mestre Divino,\nfazei que eu procure mais\nconsolar do que ser consolado;\ncompreender do que ser compreendido;\namar do que ser amado.\nPois é dando que se recebe;\né perdoando que se é perdoado;\ne é morrendo que se vive para a vida eterna.\nAmém.`,
  la:`Domine, fac me instrumentum pacis tuae.\nUbi odium, amorem seminem;\nubi iniuria, veniam;\nubi discordia, unitatem;\nubi dubium, fidem;\nubi desperatio, spem;\nubi tristitia, laetitiam;\nubi tenebrae, lucem.\nO Domine Divine,\neffice, ne tam quaeram\nconsolari quam consolari;\nintellegere quam intellegi;\namari quam amare.\nNam in dando accipitur;\nin ignoscendo ignosco;\net in moriendo ad vitam aeternam nascimur.\nAmen.`}},

{id:65,cat:'daily',
 title:{en:'Te Deum',pt:'Te Deum',la:'Te Deum'},
 text:{
  en:`We praise Thee, O God;\nwe acknowledge Thee to be the Lord.\nAll the earth doth worship Thee,\nthe Father everlasting.\nTo Thee all Angels cry aloud,\nthe Heavens and all the Powers therein.\nTo Thee Cherubim and Seraphim\ncontinually do cry:\nHoly, Holy, Holy,\nLord God of Sabaoth;\nHeaven and earth are full\nof the majesty of Thy glory.\nThe glorious company of the Apostles praise Thee.\nThe goodly fellowship of the Prophets praise Thee.\nThe noble army of Martyrs praise Thee.\nThe holy Church throughout all the world doth acknowledge Thee.\nAmen.`,
  pt:`A Vós, ó Deus, louvamos;\na Vós confessamos como Senhor.\nVos adora toda a terra,\nPai eterno.\nA Vós todos os Anjos aclamam,\nos Céus e todas as potências;\nOs Querubins e os Serafins\nvos proclamam sem cessar:\nSanto, Santo, Santo,\nSenhor Deus dos exércitos.\nOs céus e a terra estão cheios\nda majestade de Vossa glória.\nA vós aclamam o coro glorioso dos Apóstolos,\ne a família dos Profetas;\ne o exército dos Mártires.\nA Igreja Santa, em toda a terra, Vos confessa.\nAmém.`,
  la:`Te Deum laudamus;\nte Dominum confitemur.\nTe aeternum Patrem\nomnis terra veneratur.\nTibi omnes Angeli,\ntibi Caeli et universae Potestates;\ntibi Cherubim et Seraphim\nincessabili voce proclamant:\nSanctus, Sanctus, Sanctus,\nDominus Deus Sabaoth.\nPleni sunt Caeli et terra\nmaiestatis gloriae tuae.\nTe gloriosus Apostolorum chorus,\nte Prophetarum laudabilis numerus;\nte Martyrum candidatus laudat exercitus.\nTe per orbem terrarum sancta confitetur Ecclesia.\nAmen.`}},

// ── SPECIAL ─────────────────────────────────────────────────────────
{id:66,cat:'special',
 title:{en:'Prayer for Healing',pt:'Oração pela Cura',la:'Pro Sanitate'},
 text:{
  en:`Lord Jesus,\nyou who healed many in your earthly life,\nlook with mercy on those who suffer,\nespecially those dear to us.\nTouch them with your healing hand,\nrelieve their pain and restore their health,\nif it be your will.\nGive them patience and courage\nin the face of illness.\nStrengthen those who care for them.\nAnd above all, grant us all\nthe healing of our souls.\nAmen.`,
  pt:`Senhor Jesus,\nVós que curastes muitos durante Vossa vida terrena,\nolhai com misericórdia para os que sofrem,\nespecialmente para aqueles que nos são queridos.\nTomai-os com Vossa mão curadora,\nalivieis as suas dores e restaurei a sua saúde,\nse for a Vossa vontade.\nDai-lhes paciência e coragem\ndiante da doença.\nFortificai os que deles cuidam.\nE, sobretudo, concedei a todos nós\na cura das nossas almas.\nAmém.`,
  la:`Domine Iesu,\nqui in vita terrena multos sanavisti,\nmisericorditer respice in eos qui patiuntur,\npraesertim in caros nostros.\nEos manu sanante tange,\ndolores allevia et sanitatem restitue,\nsi voluntas tua sit.\nPatientia et animo eos in adversis aegritudinis munia.\nRobora eos qui eorum curam agunt.\nEt super omnia, nobis omnibus\nsanationem animarum concede.\nAmen.`}},

{id:67,cat:'special',
 title:{en:'Prayer for the Dead',pt:'Oração pelos Mortos',la:'Pro Defunctis'},
 text:{
  en:`O God, the Creator and Redeemer of all the faithful,\ngrant to the souls of Thy departed servants\nfull remission of all their sins;\nthat through the help of pious supplications\nthey may obtain the pardon\nthey have always desired.\nWho lives and reigns for ever and ever.\nAmen.`,
  pt:`Ó Deus, Criador e Redentor de todos os fiéis,\nconcedei às almas dos Vossos servos defuntos\na plena remissão de todos os seus pecados;\npara que, com o auxílio das nossas piedosas súplicas,\nalcancem o perdão\nque sempre desejaram.\nVós que viveis e reinais por todos os séculos dos séculos.\nAmém.`,
  la:`Deus, conditor et redemptor omnium fidelium,\nanimabus famulorum famularumque tuarum\nremissionem cunctorum tribue peccatorum;\nut indulgentiam quam semper optaverunt,\npiis supplicationibus consequantur.\nQui vivis et regnas in saecula saeculorum.\nAmen.`}},

{id:68,cat:'special',
 title:{en:'Prayer for the Church',pt:'Oração pela Igreja',la:'Pro Ecclesia'},
 text:{
  en:`O Lord Jesus Christ,\nwho said to your apostles:\n"Peace I leave with you, my peace I give you."\nDo not look upon our sins,\nbut upon the faith of your Church,\nand grant her that peace and unity\nwhich is in accord with your will.\nWho live and reign for ever and ever.\nAmen.`,
  pt:`Senhor Jesus Cristo,\nque dissestes a vossos apóstolos:\n"Deixo-vos a paz, dou-vos a minha paz."\nNão olheis para os nossos pecados,\nmas para a fé de vossa Igreja\ne concedei-lhe a paz e a unidade\nconforme a Vossa vontade.\nVós que viveis e reinais\npor todos os séculos dos séculos.\nAmém.`,
  la:`Domine Iesu Christe,\nqui apostolis tuis dixisti:\n"Pacem relinquo vobis, pacem meam do vobis."\nNe respicias peccata nostra,\nsed fidem Ecclesiae tuae;\neique pacem et unitatem largiri dignare\nsecundum voluntatem tuam.\nQui vivis et regnas in saecula saeculorum.\nAmen.`}},

{id:69,cat:'special',
 title:{en:'Prayer for Vocations',pt:'Oração pelas Vocações',la:'Pro Vocationibus'},
 text:{
  en:`Lord of the harvest,\nsend forth laborers into your harvest.\nSow in young hearts\nthe seeds of holiness.\nGive them the grace to hear your call\nand the courage to follow it.\nRaise up holy priests, men and women consecrated to you,\nand missionary disciples\nwho will proclaim your Kingdom\nto the ends of the earth.\nAmen.`,
  pt:`Senhor da messe,\nenviai operários para a Vossa messe.\nSemeai nos corações jovens\nas sementes da santidade.\nDai-lhes a graça de escutar o Vosso chamado\ne a coragem de segui-lo.\nSuscitai santos sacerdotes,\nhomens e mulheres consagrados a Vós,\ne discípulos missionários\nque proclamem o Vosso Reino\naté os confins da terra.\nAmém.`,
  la:`Domine messis,\noperarios in messem tuam mitte.\nSemina in corda iuvenum\ngerminam sanctitatis.\nDa eis gratiam vocem tuam audiendi\net animum eam sequendi.\nSanctos sacerdotes suscita,\nviros et mulieres tibi consecratos,\net discipulos missionarios\nqui Regnum tuum\nusque ad fines terrae proclament.\nAmen.`}},

{id:70,cat:'special',
 title:{en:'Prayer for Marriage',pt:'Oração pelo Matrimônio',la:'Pro Matrimonio'},
 text:{
  en:`O God, who in creating human nature\ndidst wondrously dignify it\nand still more wondrously restore it,\ngrant that we may share in the divinity\nof Christ, who humbled himself\nto share in our humanity.\nBless this marriage,\nshower this couple with your graces;\nand be ever present in their home.\nAmen.`,
  pt:`Ó Deus, que ao criar a natureza humana\na adornastes admiravelmente\ne ainda mais admiravelmente a restaurastes,\nconcedei-nos participar da divindade\nde Cristo, que se humilhou\npara participar da nossa humanidade.\nAbençoai este casamento,\ncobrais este casal com vossas graças;\ne estai sempre presentes em seu lar.\nAmém.`,
  la:`O Deus, qui humanam naturam\nadmirabiliter condidisti\net mirabilius reformasti,\nda nobis divinitatis tuae esse consortes,\nqui humanitatis nostrae\nfieri dignatus es particeps.\nHoc matrimonium benedic,\nhoc coniugium gratiis tuis perfunde;\net in domo eorum semper adesto.\nAmen.`}},

{id:71,cat:'special',
 title:{en:'Prayer for Children',pt:'Oração pelas Crianças',la:'Pro Pueris'},
 text:{
  en:`Lord Jesus, who said\n"Let the little children come to me\nand do not hinder them,\nfor the kingdom of heaven belongs to such as these,"\nwatch over the children of the world.\nProtect the innocent, feed the hungry,\ncomfort those who suffer.\nGive parents wisdom and love\nto guide their children in your ways.\nAmen.`,
  pt:`Senhor Jesus, que dissestes:\n"Deixai as crianças virem a mim\ne não as impediais,\npois delas é o Reino dos Céus,"\nvelais pelas crianças do mundo.\nProtegeis os inocentes, alimentais os famintos,\nconsolais os que sofrem.\nDai aos pais sabedoria e amor\npara guiarem seus filhos nos Vossos caminhos.\nAmém.`,
  la:`Domine Iesu, qui dixisti:\n"Sinite parvulos venire ad me\nnec prohibueritis eos;\ntalium enim est regnum caelorum,"\ncustodia super pueros mundi.\nInnocentes protege, esurientes pasce,\npatientes consola.\nParentibus sapientiam et amorem da\nquo filios suos in viis tuis ducant.\nAmen.`}},

{id:72,cat:'special',
 title:{en:'Prayer for the Nation',pt:'Oração pela Pátria',la:'Pro Patria'},
 text:{
  en:`Almighty God,\nyou have given us this good land\nas our heritage.\nMay we always prove ourselves a people\nmindful of your favors\nand glad to do your will.\nBless our land with honest industry,\nsound learning, and an honorable way of life.\nPreserve our unity in the spirit of peace and charity.\nAmen.`,
  pt:`Deus Todo-Poderoso,\nVós nos destes esta boa terra\ncomo herança.\nFazei que sejamos sempre um povo\ngratos pelos Vossos favores\ne ávidos de fazer Vossa vontade.\nAbençoai nossa terra com trabalho honesto,\nbom aprendizado e modo de vida honrado.\nPreservai nossa unidade no espírito de paz e caridade.\nAmém.`,
  la:`Deus omnipotens,\nterram hanc bonam nobis\nin haereditatem dedisti.\nEffice ut semper simus populus\nbeneficiorum tuorum memor\net voluntati tuae faciendae promptus.\nTerram nostram industria honesta,\ndoctrina sana et vita honesta bene dono.\nUnitatem nostram in spiritu pacis et caritatis serva.\nAmen.`}},

{id:73,cat:'special',
 title:{en:'Prayer for Perseverance',pt:'Oração pela Perseverança',la:'Pro Perseverantia'},
 text:{
  en:`O Lord God,\nyou have called me to walk in the way of faith.\nGrant me the gift of perseverance:\nthat I may remain faithful to you\nuntil the end of my life;\nthat I may never abandon\nyour holy grace;\nand that I may finally attain\nthe eternal happiness you have promised.\nAmen.`,
  pt:`Senhor Deus,\nVós me chamastes a caminhar na via da fé.\nConcedei-me o dom da perseverança:\npara que permaneça fiel a Vós\naté o fim da minha vida;\npara que nunca abandone\na Vossa santa graça;\ne para que finalmente alcance\na eterna felicidade que me prometestes.\nAmém.`,
  la:`Domine Deus,\nme vocavisti ut in via fidei ambulerem.\nDa mihi donum perseverantiae:\nut tibi fidelis maneat\nusque ad finem vitae meae;\nut gratiam tuam sanctam\nnunquam derelinquam;\nut felicitatem aeternam quam promisisti\ndenique assequar.\nAmen.`}},

{id:74,cat:'special',
 title:{en:'Prayer for Conversion',pt:'Oração pela Conversão',la:'Pro Conversione'},
 text:{
  en:`Lord, our God,\ncreator and author of life,\nyou desire that all come to know you\nand be saved.\nWe pray for all those who have not yet heard your word\nor who have turned from you.\nSend your Spirit to soften their hearts,\nlead them to seek you,\nand grant them the grace\nof conversion and faith.\nAmen.`,
  pt:`Senhor, nosso Deus,\nCriador e Autor da vida,\nVós desejais que todos vos conheçam\ne sejam salvos.\nOramos por todos os que ainda não ouviram Vossa palavra\nou que se afastaram de Vós.\nEnviai Vosso Espírito para amolecer seus corações,\nconduzis-os a buscar-Vos\ne concedei-lhes a graça\nda conversão e da fé.\nAmém.`,
  la:`Domine Deus noster,\nconditor et auctor vitae,\nvis ut omnes te cognoscant\net salvi fiant.\nOremus pro omnibus qui verbum tuum\nnondum audierunt\nvel qui a te aversi sunt.\nMitte Spiritum tuum ut eorum corda mollescat,\ntribue eis te quaerere\net gratiam conversionis et fidei concede.\nAmen.`}},

{id:75,cat:'special',
 title:{en:"St. Patrick's Breastplate",pt:'Couraça de São Patrício',la:'Lorica Sancti Patricii'},
 text:{
  en:`I arise today\nthrough a mighty strength:\nthe invocation of the Trinity,\nthrough belief in the Threeness,\nthrough confession of the Oneness\nof the Creator of creation.\n\nChrist be with me, Christ within me,\nChrist behind me, Christ before me,\nChrist beside me, Christ to win me,\nChrist to comfort and restore me.\nChrist beneath me, Christ above me,\nChrist in quiet, Christ in danger,\nChrist in hearts of all that love me,\nChrist in mouth of friend and stranger.\nAmen.`,
  pt:`Levanto-me hoje\natravés de um poder poderoso:\na invocação da Trindade,\ncrer na Trindade,\nconfessar a Unidade\ndo Criador da criação.\n\nCristo comigo, Cristo dentro de mim,\nCristo atrás de mim, Cristo à minha frente,\nCristo ao meu lado, Cristo para me ganhar,\nCristo para me consolar e restaurar.\nCristo abaixo de mim, Cristo acima de mim,\nCristo na quietude, Cristo no perigo,\nCristo nos corações de todos que me amam,\nCristo na boca do amigo e do estranho.\nAmém.`,
  la:`Surgo hodie\nper potentiam validam:\ninvocationem Trinitatis,\nfidem in Trinitatem,\nprofessionem unitatis\nConditoris creationis.\n\nChristus mecum, Christus in me,\nChristus post me, Christus ante me,\nChristus iuxta me, Christus mihi vincere,\nChristus mihi solari et restituere.\nChristus sub me, Christus supra me,\nChristus in silentio, Christus in periculo,\nChristus in cordibus omnium me amantium,\nChristus in ore amici et advenae.\nAmen.`}},

{id:76,cat:'special',
 title:{en:'O Salutaris Hostia',pt:'Ó Hóstia Salvadora',la:'O Salutaris Hostia'},
 text:{
  en:`O saving Victim, opening wide\nthe gate of Heaven to man below;\nour foes press hard on every side;\nThine aid supply, Thy strength bestow.\nTo Thy great Name be endless praise,\nimmortal Godhead, One in Three!\nOh grant us endless length of days\nin our true native land with Thee.\nAmen.`,
  pt:`Ó Hóstia salvadora,\nque abriste aos mortais as portas do céu;\nassolam-nos as guerras inimigas;\ndai-nos o vosso socorro.\nAo Vosso nome seja louvor perpétuo;\nDeus imortal, uno e trino!\nConcedei-nos a vida sem término\nnossa pátria verdadeira convosco.\nAmém.`,
  la:`O salutaris Hostia,\nquae caeli pandis ostium,\nbella premunt hostilia;\nda robur, fer auxilium.\nUni trinoque Domino\nsit sempiterna gloria,\nqui vitam sine termino\nnobis donet in patria.\nAmen.`}},

{id:77,cat:'special',
 title:{en:'Tantum Ergo',pt:'Tantum Ergo',la:'Tantum Ergo'},
 text:{
  en:`Down in adoration falling,\nLo! the sacred Host we hail,\nLo! o'er ancient forms departing,\nnewer rites of grace prevail;\nfaith for all defects supplying\nwhere the feeble senses fail.\nTo the everlasting Father,\nand the Son Who reigns on high\nwith the Holy Ghost proceeding\nforth from each eternally,\nbe salvation, honor, blessing,\nmight, and endless majesty.\nAmen.`,
  pt:`Curvemo-nos todos, pois,\ne ao grande Sacramento\nprestemos adoração;\ne a antigo documento\nceda o novo testamento;\nà fé, o juízo humano.\nAo Pai eterno e ao Filho\nloor e jubilação,\nglória também ao Santo\nEspírito, que os dois procedem;\ne os três uma igual salvação,\nbenedição e poder.\nAmém.`,
  la:`Tantum ergo Sacramentum\nveneremur cernui,\net antiquum documentum\nnovo cedat ritui;\npraestet fides supplementum\nsensuum defectui.\nGenitóri, Genitóque\nlaus et jubilatio,\nsalus, honor, virtus quoque\nsit et benedictio;\nprocedenti ab utroque\ncompar sit laudatio.\nAmen.`}},

{id:78,cat:'special',
 title:{en:'Prayer for Unity',pt:'Oração pela Unidade',la:'Pro Unitate'},
 text:{
  en:`O Lord Jesus Christ,\nwho said to your apostles:\n"Peace I leave with you, my peace I give to you,"\ngrant to your Church unity and peace.\nBring together what is divided,\nstrengthen what is weak,\nrenew what has grown old.\nMay all who believe in you be one,\nso that the world may believe\nthat you were sent by the Father.\nAmen.`,
  pt:`Senhor Jesus Cristo,\nque dissestes a Vossos apóstolos:\n"Deixo-vos a paz, dou-vos a minha paz,"\ndai à Vossa Igreja unidade e paz.\nReuni o que está dividido,\nfortificai o que está fraco,\nrenovai o que envelheceu.\nFazei que todos os que crêem em Vós sejam um,\npara que o mundo creia\nque Vós fostes enviado pelo Pai.\nAmém.`,
  la:`Domine Iesu Christe,\nqui apostolis dixisti:\n"Pacem relinquo vobis, pacem meam do vobis,"\nEcclesiae tuae unitatem et pacem da.\nQuod divisum est congrega,\nquod infirmum est robora,\nquod vetus est renova.\nFac ut omnes qui in te credunt unum sint,\nut mundus credat\nte a Patre missum esse.\nAmen.`}},

{id:79,cat:'special',
 title:{en:'Examination of Conscience Prayer',pt:'Oração para o Exame de Consciência',la:'Ad Examen Conscientiae'},
 text:{
  en:`Come, Holy Spirit,\nlight of my soul.\nHelp me to see clearly\nthe state of my soul before God.\nShow me where I have fallen short,\nwhere I have sinned in thought, word, or deed,\nwhere I have failed to do good.\nGive me true sorrow for my sins\nand a firm purpose of amendment.\nPrepare me to receive Your mercy\nin the Sacrament of Reconciliation.\nAmen.`,
  pt:`Vinde, Espírito Santo,\nluz da minha alma.\nAjudai-me a ver claramente\no estado da minha alma perante Deus.\nMostrai-me onde falhei,\nonde pequei em pensamentos, palavras ou obras,\nonde deixei de fazer o bem.\nDai-me verdadeiro arrependimento pelos meus pecados\ne firme propósito de emenda.\nPreparai-me para receber Vossa misericórdia\nno Sacramento da Reconciliação.\nAmém.`,
  la:`Veni, Sancte Spiritus,\nlux animae meae.\nDa mihi clare videre\nstatum animae meae coram Deo.\nOstende ubi defeci,\nubi peccavi cogitatione, verbo vel opere,\nubi bonum omisi.\nVeram paenitentiam mihi da\net firmum emendationis propositum.\nPraepara me ut misericordiam tuam\nin Sacramento Reconciliationis recipiam.\nAmen.`}},

{id:80,cat:'special',
 title:{en:'Final Blessing / Ite Missa Est',pt:'Ida e Bênção Final',la:'Ite Missa Est'},
 text:{
  en:`Priest: The Mass is ended, go in peace.\nPeople: Thanks be to God.\n\nMay almighty God bless you,\nthe Father, and the Son,\nand the Holy Spirit.\nAmen.\n\nGo and announce the Gospel of the Lord.\nOr: Go in peace, glorifying the Lord by your life.\nOr: Go in peace.\nThanks be to God.`,
  pt:`Sacerdote: Ide, a missa está encerrada.\nPovo: Graças a Deus.\n\nO Deus Todo-Poderoso vos abençoe:\nPai, Filho e Espírito Santo.\nAmém.\n\nIde anunciar o Evangelho do Senhor.\nOu: Ide em paz, glorificando o Senhor com a vossa vida.\nOu: Ide em paz.\nGraças a Deus.`,
  la:`Sacerdos: Ite missa est.\nPopulus: Deo gratias.\n\nBenedicat vos omnipotens Deus,\nPater et Filius\net Spiritus Sanctus.\nAmen.\n\nIte ad Evangelium Domini annuntiandum.\nVel: Ite in pace, glorificando vita vestra Dominum.\nVel: Ite in pace.\nDeo gratias.`}},

{id:81,cat:'mass',
 title:{en:'Eucharistic Prayer (Preface Dialogue)',pt:'Prefácio Eucarístico',la:'Praefatio Eucharistica'},
 text:{
  en:`Priest: The Lord be with you.\nPeople: And with your spirit.\nPriest: Lift up your hearts.\nPeople: We lift them up to the Lord.\nPriest: Let us give thanks to the Lord our God.\nPeople: It is right and just.\n\nIt is truly right and just,\nour duty and our salvation,\nalways and everywhere to give you thanks,\nLord, holy Father,\nalmighty and eternal God,\nthrough Christ our Lord.`,
  pt:`Sacerdote: O Senhor esteja convosco.\nPovo: Ele está no meio de nós.\nSacerdote: Corações ao alto.\nPovo: O nosso coração está em Deus.\nSacerdote: Demos graças ao Senhor nosso Deus.\nPovo: É nosso dever e nossa salvação.\n\nÉ verdadeiramente nosso dever,\ne caminho de salvação,\ngratificar-Vos em todo tempo e lugar,\nSenhor, Pai Santo,\nDeus Todo-Poderoso e Eterno,\npor Cristo Nosso Senhor.`,
  la:`Sacerdos: Dominus vobiscum.\nPopulus: Et cum spiritu tuo.\nSacerdos: Sursum corda.\nPopulus: Habemus ad Dominum.\nSacerdos: Gratias agamus Domino Deo nostro.\nPopulus: Dignum et iustum est.\n\nVere dignum et iustum est,\naequum et salutare,\nnos tibi semper et ubique gratias agere:\nDomine, sancte Pater,\nomnipoens aeterne Deus,\nper Christum Dominum nostrum.`}},

{id:82,cat:'mass',
 title:{en:'Lamb of God (Extended)',pt:'Cordeiro de Deus (Completo)',la:'Agnus Dei (Plena)'},
 text:{
  en:`Behold the Lamb of God,\nbehold him who takes away the sins of the world.\nBlessed are those called to the supper of the Lamb.\n\nLord, I am not worthy\nthat you should enter under my roof,\nbut only say the word\nand my soul shall be healed.\n\nLamb of God, you take away the sins of the world,\nhave mercy on us.\nLamb of God, you take away the sins of the world,\nhave mercy on us.\nLamb of God, you take away the sins of the world,\ngrant us peace.`,
  pt:`Eis o Cordeiro de Deus,\neis aquele que tira o pecado do mundo.\nBem-aventurados os convidados para a ceia do Senhor.\n\nSenhor, não sou digno\nde que entreis em minha morada,\nmas dizei uma só palavra\ne serei salvo.\n\nCordeiro de Deus, que tirais o pecado do mundo,\ntende piedade de nós.\nCordeiro de Deus, que tirais o pecado do mundo,\ntende piedade de nós.\nCordeiro de Deus, que tirais o pecado do mundo,\ndai-nos a paz.`,
  la:`Ecce Agnus Dei,\necce qui tollit peccata mundi.\nBeati qui ad cenam Agni vocati sunt.\n\nDomine, non sum dignus,\nut intres sub tectum meum,\nsed tantum dic verbo,\net sanabitur anima mea.\n\nAgnus Dei, qui tollis peccata mundi,\nmiserere nobis.\nAgnus Dei, qui tollis peccata mundi,\nmiserere nobis.\nAgnus Dei, qui tollis peccata mundi,\ndona nobis pacem.`}},

{id:83,cat:'daily',
 title:{en:'Prayer for the Pope',pt:'Oração pelo Papa',la:'Pro Summo Pontifice'},
 text:{
  en:`O Lord, source of eternal life and truth,\ngive to your shepherd, our Pope,\na spirit of courage and right judgment,\na spirit of knowledge and love.\nBy governing with fidelity those entrusted to his care,\nmay he, as successor to the Apostle Peter\nand Vicar of Christ,\nbuild your Church into a sacrament of unity, love, and peace.\nAmen.`,
  pt:`Senhor, fonte da vida eterna e da verdade,\ndai a Vosso pastor, nosso Papa,\num espírito de coragem e discernimento,\num espírito de conhecimento e amor.\nGoverrnado com fidelidade os que lhe são confiados,\npossa ele, como sucessor do Apóstolo Pedro\ne Vigário de Cristo,\nconstruir Vossa Igreja como sacramento de unidade,\namor e paz.\nAmém.`,
  la:`Domine, fons vitae aeternae et veritatis,\nda pastori tuo, Summo Pontifici nostro,\nspiritum fortitudinis et recti iudicii,\nspiritum scientiae et amoris.\nIn fidelitate gubernando creditos sibi,\nut successor Apostoli Petri\net Vicarius Christi\nEcclesiam tuam in sacramentum\nunitatis, amoris et pacis aedificet.\nAmen.`}},

{id:84,cat:'special',
 title:{en:'Prayer for the Sick',pt:'Oração pelos Doentes',la:'Pro Infirmis'},
 text:{
  en:`Most merciful Jesus, lover of souls,\nI pray You, by the agony of Your most Sacred Heart\nand by the sorrows of Your Immaculate Mother,\ncleanse in Your Blood the sinners of the whole world\nwho are now in their agony\nand who are to die today.\nHeart of Jesus, once in agony, have mercy on the dying.\nHave mercy also on all who are sick in body or soul.\nAmen.`,
  pt:`Misericordiosíssimo Jesus, amante das almas,\npesso-Vos, pela agonia do Vosso Santíssimo Coração\ne pela dor de Vossa Mãe Imaculada,\npurificai no Vosso Sangue\nos pecadores de todo o mundo\nque agora estão em agonia e morrerão hoje.\nCoração de Jesus, que tantas angústias sofreu,\ntende piedade dos agonizantes.\nTende piedade também de todos os que sofrem\nem corpo ou em alma.\nAmém.`,
  la:`Iesu misericordiosissime, amator animarum,\nrogo te per agoniam Cordis tui Sacratissimi\net per dolores Matris tuae Immaculatae,\nlava in Sanguine tuo peccatores totius mundi\nqui nunc in agonia sunt et hodie morituri sunt.\nCor Iesu, in agonia positu, miserere morientium.\nMiserere quoque omnibus qui in corpore vel anima aegrotant.\nAmen.`}},

{id:85,cat:'special',
 title:{en:'Prayer for the Dying',pt:'Oração pelos Moribundos',la:'Pro Moribundis'},
 text:{
  en:`Go forth, Christian soul,\nfrom this world\nin the name of God the almighty Father,\nwho created you,\nin the name of Jesus Christ, Son of the living God,\nwho suffered for you,\nin the name of the Holy Spirit,\nwho was poured out upon you.\nGo forth, faithful Christian!\nMay you live in peace this day,\nmay your home be with God in Zion,\nwith Mary, the virgin Mother of God,\nwith Joseph and all the angels and saints.\nAmen.`,
  pt:`Parte desta vida, alma cristã,\nem nome de Deus Pai Todo-Poderoso,\nque te criou;\nem nome de Jesus Cristo, Filho do Deus vivo,\nque sofreu por ti;\nem nome do Espírito Santo,\nque foi derramado sobre ti.\nParte, cristão fiel!\nViva em paz neste dia;\nseja a tua morada em Deus, em Sião,\ncom Maria, Mãe virgem de Deus,\ncom José e com todos os anjos e santos.\nAmém.`,
  la:`Proficiscere, anima Christiana, de hoc mundo!\nIn nomine Dei Patris omnipotentis,\nqui te creavit;\nin nomine Iesu Christi, Filii Dei vivi,\nqui pro te passus est;\nin nomine Spiritus Sancti,\nqui in te effusus est.\nProficiscere, Christiane!\nIn pace sis hodie;\nsit locus tuus in Deo, in Sion,\ncum Maria, Matre Dei Virgine,\ncum Ioseph et omnibus Angelis et Sanctis.\nAmen.`}},

// round up to 100+
{id:86,cat:'marian',
 title:{en:'Immaculate Conception Prayer',pt:'Oração à Imaculada Conceição',la:'Ad Immaculatam Conceptionem'},
 text:{
  en:`O God, who by the Immaculate Conception of the Virgin\nprepared a worthy dwelling for Your Son,\ngrant, we pray, that as You preserved her\nfrom every stain of sin,\nso, through her intercession,\nwe, too, may be cleansed and admitted to Your presence.\nThrough our Lord Jesus Christ, Your Son,\nwho lives and reigns with You\nin the unity of the Holy Spirit,\none God, for ever and ever.\nAmen.`,
  pt:`Ó Deus, que pela Imaculada Conceição da Virgem\npreparastes uma digna morada para o Vosso Filho,\nconcedei-nos, pedimos,\nque, como a preservastes de toda mancha de pecado,\nassim também, por Sua intercessão,\npossamos ser purificados e admitidos à Vossa presença.\nPelo nosso Senhor Jesus Cristo, Vosso Filho,\nque convosco vive e reina\nna unidade do Espírito Santo,\nDeus, por todos os séculos dos séculos.\nAmém.`,
  la:`Deus, qui per Immaculatam Virginis Conceptionem\ndignum Filio tuo habitaculum praeparasti,\nquaesumus ut qui ex morte eiusdem Filii tui praevisa\neam ab omni labe praeservasti,\nnos quoque mundos eius intercessione\nad te pervenire concedas.\nPer Dominum nostrum Iesum Christum Filium tuum,\nqui tecum vivit et regnat\nin unitate Spiritus Sancti,\nDeus per omnia saecula saeculorum.\nAmen.`}},

{id:87,cat:'basic',
 title:{en:'Act of Spiritual Communion (St. Alphonsus)',pt:'Comunhão Espiritual de São Afonso',la:'Communio Spiritualis S. Alfonsi'},
 text:{
  en:`My Jesus, I believe that You are present\nin the Most Holy Sacrament.\nI love You above all things\nand I desire to receive You into my soul.\nSince I cannot at this moment\nreceive You sacramentally,\ncome at least spiritually into my heart.\nI embrace You as if You were already there\nand unite myself wholly to You.\nNever permit me to be separated from You.\nAmen.`,
  pt:`Meu Jesus, acredito que estais presente\nno Santíssimo Sacramento.\nAmo-Vos sobre todas as coisas\ne desejo receber-Vos em minha alma.\nJá que não posso neste momento\nreceber-Vos sacramentalmente,\nvinde ao menos espiritualmente ao meu coração.\nAbraço-Vos como se já tivésseis vindo\ne uno-me inteiramente a Vós.\nJamais permitais que me separe de Vós.\nAmém.`,
  la:`Mi Iesu, credo te in Sanctissimo Sacramento praesentem esse.\nTe amo super omnia et animam meam tibi desidero.\nSacramentaliter te suscipere cum modo non possim,\nveni saltem spiritualiter in cor meum.\nTe amplecto, quasi iam adveneris,\nmeque tibi penitus unio.\nPermitte ne umquam a te separar.\nAmen.`}},

{id:88,cat:'daily',
 title:{en:'De Profundis (Psalm 130)',pt:'De Profundis (Salmo 130)',la:'De Profundis (Psalmus 129)'},
 text:{
  en:`Out of the depths I cry to You, O Lord;\nLord, hear my voice!\nLet Your ears be attentive\nto the voice of my supplication.\nIf You, O Lord, mark our iniquities,\nLord, who can stand?\nBut with You there is forgiveness,\nthat You may be revered.\nI trust in the Lord;\nmy soul trusts in His word.\nMore than sentinels wait for the dawn,\nlet Israel wait for the Lord.\nFor with the Lord there is kindness\nand with Him full redemption;\nAnd He will redeem Israel\nfrom all their iniquities.\nEternal rest grant unto them, O Lord,\nand let perpetual light shine upon them.\nAmen.`,
  pt:`Das profundezas clamo a Vós, Senhor;\nSenhor, ouvi a minha voz!\nEstejam os Vossos ouvidos atentos\nà voz da minha súplica.\nSe guardardes, Senhor, as nossas faltas,\nquem poderá subsistir?\nMas em Vós encontra-se o perdão,\npara que Vos possamos temer.\nConfio no Senhor,\nminha alma confia em Sua palavra.\nMinha alma espera o Senhor\nmais do que os guardas esperam a aurora.\nPois com o Senhor há misericórdia\ne plena redenção;\nEle redimirá Israel\nde todas as suas iniquidades.\nEterno descanso concedei a eles, Senhor,\ne a luz perpétua brilhe sobre eles.\nAmém.`,
  la:`De profundis clamavi ad te, Domine;\nDomine, audi vocem meam!\nFiant aures tuae intendentes\nin vocem deprecationis meae.\nSi iniquitates observaveris, Domine,\nDomine, quis sustinebit?\nSed apud te propitiatio est,\nut timearis.\nSustinui te, Domine;\nsustinuit anima mea in verbum eius.\nSperavit anima mea in Domino\nmagis quam custodes in aurora.\nQua apud Dominum misericordia\net copiosa apud eum redemptio;\net ipse redimet Israel\nex omnibus iniquitatibus eius.\nRequiem aeternam dona eis, Domine,\net lux perpetua luceat eis.\nAmen.`}},

{id:89,cat:'saints',
 title:{en:'Prayer to St. Christopher',pt:'Oração a São Cristóvão',la:'Ad Sanctum Christophorum'},
 text:{
  en:`O glorious Saint Christopher,\nyou have inherited a name\nthat reminds us that you once carried Christ.\nCarry us also through all our trials and tribulations,\nguide us in our travels, both physical and spiritual,\nand help us to bear our crosses\nwith patience and fortitude\nas we journey toward our eternal home.\nAmen.`,
  pt:`Ó glorioso São Cristóvão,\nvós herdiastes um nome\nque nos lembra que outrora carregastes Cristo.\nCarregai-nos também por todas as nossas provações,\nguiai-nos em nossas viagens, tanto físicas quanto espirituais,\ne ajudai-nos a carregar nossas cruzes\ncom paciência e fortaleza\nenquanto caminhamos para nossa morada eterna.\nAmém.`,
  la:`O gloriose Sancte Christophore,\ntuo nomine haereditavisti\nquod nos admonet te olim Christum portavisse.\nNos quoque per omnes tribulationes porta,\nter in itineribus sive corporalibus sive spiritualibus duc,\net nos in crucibus portandis\npatientia et fortitudine adiuva\ndum ad patriam aeternam pergimus.\nAmen.`}},

{id:90,cat:'special',
 title:{en:'Prayer for Divine Guidance',pt:'Oração para a Orientação Divina',la:'Pro Divina Directione'},
 text:{
  en:`O Lord God,\nyou are the source of all wisdom and truth.\nAs I face the decisions before me,\ngrant me clarity of mind,\npurity of heart,\nand strength of will\nto discern Your will.\nLet your Holy Spirit be my guide,\nthat all I do may be according to Your perfect plan.\nAmen.`,
  pt:`Senhor Deus,\nVós sois a fonte de toda sabedoria e verdade.\nDiante das decisões que tenho de tomar,\nconcedei-me clareza de mente,\npureza de coração\ne força de vontade\npara discernir a Vossa vontade.\nSeja o Vosso Espírito Santo meu guia,\npara que tudo o que faça esteja de acordo\ncom o Vosso plano perfeito.\nAmém.`,
  la:`Domine Deus,\ntu es fons omnis sapientiae et veritatis.\nDum decisiones ante me sunt,\nda mihi claritatem mentis,\npuritatem cordis\net robur voluntatis\nut voluntatem tuam discernam.\nSit Spiritus tuus Sanctus dux meus,\nut omnia quae facio\niuxta perfectum consilium tuum sint.\nAmen.`}},

{id:91,cat:'rosary',
 title:{en:'Rosary Closing Prayer',pt:'Oração Final do Rosário',la:'Ad Finem Rosarii'},
 text:{
  en:`O God, whose Only-begotten Son\nby His life, death, and resurrection\nhas purchased for us the rewards of eternal salvation,\ngrant we beseech Thee\nthat meditating upon these mysteries\nof the most holy Rosary of the Blessed Virgin Mary,\nwe may imitate what they contain\nand obtain what they promise.\nThrough Christ our Lord.\nAmen.`,
  pt:`Ó Deus, cujo Filho Unigênito\npela Sua vida, morte e ressurreição\nnos mereceu as recompensas da salvação eterna,\nconcedei-nos, pedimos,\nque, meditando sobre esses mistérios\ndo Santíssimo Rosário da Bem-Aventurada Virgem Maria,\npossamos imitar o que eles contêm\ne obter o que prometem.\nPelo Cristo Nosso Senhor.\nAmém.`,
  la:`Deus, cuius unigenitus Filius\nper vitam, mortem et resurrectionem suam\nnobis salutis aeternae praemia comparavit,\nconcede quaesumus\nut haec mysteria Sanctissimo Rosario\nBeatae Mariae Virginis recolentes,\net imitemur quod continent\net quod promittunt assequamur.\nPer Christum Dominum nostrum.\nAmen.`}},

{id:92,cat:'basic',
 title:{en:"Lord's Prayer (Traditional)",pt:'Padre-Nosso (Tradicional)',la:'Pater Noster (Classicus)'},
 text:{
  en:`Our Father, which art in heaven,\nHallowed be thy Name.\nThy Kingdom come.\nThy will be done in earth,\nAs it is in heaven.\nGive us this day our daily bread.\nAnd forgive us our trespasses,\nAs we forgive them that trespass against us.\nAnd lead us not into temptation,\nBut deliver us from evil.\nFor thine is the kingdom,\nthe power, and the glory,\nFor ever and ever.\nAmen.`,
  pt:`Pai nosso que estais no Céu,\nsantificado seja o Vosso nome.\nVenha o Vosso reino,\nseja feita a Vossa vontade,\nassim na terra como no Céu.\nO pão nosso de cada dia nos dai hoje.\nPerdoai-nos as nossas ofensas,\nassim como nós perdoamos\na quem nos tem ofendido.\nE não nos deixeis cair em tentação,\nmas livrai-nos do mal.\nPois Vosso é o reino,\no poder e a glória,\npara sempre.\nAmém.`,
  la:`Pater noster, qui es in caelis,\nsanctificetur nomen tuum.\nAdveniat regnum tuum.\nFiat voluntas tua,\nsicut in caelo et in terra.\nPanem nostrum quotidianum da nobis hodie.\nEt dimitte nobis debita nostra,\nsicut et nos dimittimus\ndebitoribus nostris.\nEt ne nos inducas in tentationem,\nsed libera nos a malo.\nQuia tuum est regnum,\net potestas et gloria,\nin saecula.\nAmen.`}},

{id:93,cat:'daily',
 title:{en:'Prayer for the Souls in Purgatory',pt:'Oração pelas Almas do Purgatório',la:'Pro Animabus Purgatorii'},
 text:{
  en:`O God of mercy and compassion,\nlook with pity on the souls of the faithful\nwho have departed this life in Your grace,\nbut who are still detained in Purgatory.\nGrant them the full payment of their debt,\nthat they may be released\nand come swiftly to that place of perfect rest and peace,\nwhere You live and reign for ever and ever.\nAmen.`,
  pt:`Ó Deus de misericórdia e compaixão,\nolhai com piedade pelas almas dos fiéis\nque partiram desta vida na Vossa graça,\nmas que ainda estão detidas no Purgatório.\nConcedei-lhes o pleno pagamento de sua dívida,\npara que possam ser libertadas\ne virem rapidamente ao lugar de descanso e paz perfeitos,\nonde Vós viveis e reinais por todos os séculos dos séculos.\nAmém.`,
  la:`Deus misericordiae et pietatis,\nrespice propitius animas fidelium\nqui de hac vita in gratia tua transierunt,\nqui tamen adhuc in purgatorio detinentur.\nDa eis plenam solutionem debiti,\nut liberentur\net velociter ad locum perfectae quietis et pacis perveniant\nubi tu vivis et regnas in saecula saeculorum.\nAmen.`}},

{id:94,cat:'marian',
 title:{en:'Hail Holy Queen (Long Version)',pt:'Salve Rainha (Versão Longa)',la:'Salve Regina (Plena)'},
 text:{
  en:`Hail, holy Queen, Mother of mercy,\nour life, our sweetness, and our hope!\nTo thee do we cry, poor banished children of Eve;\nto thee do we send up our sighs,\nmourning and weeping in this valley of tears.\nTurn, then, most gracious Advocate,\nthine eyes of mercy toward us;\nand after this, our exile,\nshow unto us the blessed fruit of thy womb, Jesus.\nO clement, O loving, O sweet Virgin Mary!\n\nPray for us, O Holy Mother of God,\nthat we may be made worthy\nof the promises of Christ.\nAmen.`,
  pt:`Salve, Rainha, Mãe de misericórdia,\nvida, doçura e esperança nossa, salve!\nA Vós bradamos, os degredados filhos de Eva;\na Vós suspiramos, gemendo e chorando\nneste vale de lágrimas.\nEia, pois, advogada nossa,\nesses Vossos olhos misericordiosos a nós volvei;\ne depois deste desterro,\nmostrai-nos Jesus, o bendito fruto do vosso ventre.\nÓ clemente, ó piedosa, ó doce sempre Virgem Maria!\n\nRogai por nós, Santa Mãe de Deus,\npara que sejamos dignos das promessas de Cristo.\nAmém.`,
  la:`Salve, Regina, Mater misericordiae,\nvita, dulcedo et spes nostra, salve!\nAd te clamamus, exsules filii Hevae;\nad te suspiramus, gementes et flentes\nin hac lacrimarum valle.\nEia ergo, Advocata nostra,\nillos tuos misericordes oculos ad nos converte;\net Iesum, benedictum fructum ventris tui,\nnobis post hoc exsilium ostende.\nO clemens, O pia, O dulcis Virgo Maria!\n\nOra pro nobis, Sancta Dei Genitrix,\nut digni efficiamur promissionibus Christi.\nAmen.`}},

{id:95,cat:'special',
 title:{en:'Novena Prayer (General)',pt:'Oração de Novena (Geral)',la:'Oratio Novenalis'},
 text:{
  en:`O Lord, I come before you\nfor nine days of prayer,\ntrusting in Your mercy and love.\nYou know my needs before I speak them.\nGrant me the grace to pray with faith,\nto wait with patience,\nand to accept Your will with joy.\nHear my petition (mention intention)\nif it is according to Your will.\nAnd above all, grant me the grace\nto love You and serve You always.\nAmen.`,
  pt:`Ó Senhor, venho diante de Vós\npara nove dias de oração,\nconfiando em Vossa misericórdia e amor.\nVós conheceis minhas necessidades antes que as diga.\nConcedei-me a graça de orar com fé,\nde aguardar com paciência\ne de aceitar a Vossa vontade com alegria.\nEscutai minha petição (mencionar intenção)\nse for de acordo com Vossa vontade.\nE, sobretudo, concedei-me a graça\nde Vos amar e servir sempre.\nAmém.`,
  la:`Domine, coram te venio\npro novem diebus orationis,\nin misericordia et amore tuo confidens.\nNecessitates meas antequam eas dico nosti.\nDa mihi gratiam fide orandi,\npatienter expectandi\net voluntatem tuam cum laetitia accipiendi.\nAudi petitionem meam (intentionem dices)\nsi secundum voluntatem tuam sit.\nEt super omnia, da mihi gratiam\nte amare et tibi semper servire.\nAmen.`}},

{id:96,cat:'saints',
 title:{en:'Prayer to St. Anne',pt:'Oração a Santa Ana',la:'Ad Sanctam Annam'},
 text:{
  en:`Good Saint Anne,\nmother of the Blessed Virgin Mary\nand grandmother of Our Lord Jesus Christ,\nI come to you with confidence.\nYou know the joys and sorrows of family life.\nIntercede for my family,\nfor all parents and grandparents,\nand for all who are searching\nfor the meaning of their lives.\nObtain for us the grace to love God\nwith our whole heart.\nAmen.`,
  pt:`Boa Santa Ana,\nmãe da Santíssima Virgem Maria\ne avó de Nosso Senhor Jesus Cristo,\nvenho a Vós com confiança.\nConheceis as alegrias e tristezas da vida familiar.\nIntercedei pela minha família,\npor todos os pais e avós,\ne por todos que buscam\no sentido de suas vidas.\nAlcancei-nos a graça de amar a Deus\nde todo o coração.\nAmém.`,
  la:`Bona Sancta Anna,\nMater Beatae Virginis Mariae\net Avia Domini nostri Iesu Christi,\nad te cum fiducia accedo.\nGaudia et dolores vitae familiaris nosti.\nPro familia mea intercede,\npro parentibus et avis omnibus,\net pro omnibus qui\nsensus vitae suae quaerunt.\nGratiam nobis impetres\nut Deum toto corde amemus.\nAmen.`}},

{id:97,cat:'daily',
 title:{en:'Prayer for God\'s Presence',pt:'Oração pela Presença de Deus',la:'Pro Praesentia Dei'},
 text:{
  en:`Lord God,\nhelpme to be aware of Your presence\nthroughout this day.\nIn the midst of my busyness,\nlet me pause to remember You.\nIn my joys, let me thank You.\nIn my sorrows, let me trust You.\nIn my decisions, let me seek Your wisdom.\nNever let me forget that I am Your child\nand that You are always with me.\nAmen.`,
  pt:`Senhor Deus,\najudai-me a estar consciente da Vossa presença\ndurante todo este dia.\nNo meio da minha agitação,\nfazei-me parar para me lembrar de Vós.\nNas minhas alegrias, deixai-me agradecer-Vos.\nNas minhas tristezas, deixai-me confiar em Vós.\nNas minhas decisões, deixai-me buscar Vossa sabedoria.\nNunca me deixeis esquecer que sou Vosso filho\ne que estais sempre comigo.\nAmém.`,
  la:`Domine Deus,\nadiuva me praesentiam tuam\nper totum hunc diem agnoscere.\nIn medio occupationum mearum,\nme sistere iube ut tui meminerim.\nIn gaudiis meis, gratias tibi agam.\nIn doloribus meis, tibi confidam.\nIn decisionibus meis, sapientiam tuam quaeram.\nNumquam me oblivisci sine me sis filium tuum esse\net te semper mecum esse.\nAmen.`}},

{id:98,cat:'saints',
 title:{en:'Prayer to St. Peter',pt:'Oração a São Pedro',la:'Ad Sanctum Petrum'},
 text:{
  en:`O glorious Apostle Saint Peter,\nwho by the special grace of God\nand the singular privilege of Christ\nwas constituted the foundation and head of the Church,\nI humbly implore your powerful intercession.\nObtain for me a living and steadfast faith,\na burning love for God and neighbor,\nand the courage to profess my faith openly.\nAmen.`,
  pt:`Ó glorioso Apóstolo São Pedro,\nque pela graça especial de Deus\ne pelo singular privilégio de Cristo\nfostes constituído fundamento e cabeça da Igreja,\nhumblement imploro vossa poderosa intercessão.\nAlcancei-me uma fé viva e firme,\num amor ardente a Deus e ao próximo\ne a coragem de professar minha fé abertamente.\nAmém.`,
  la:`O gloriose Apostole Sancte Petre,\nqui speciali gratia Dei\net singulari Christi privilegio\nfundamentum et caput Ecclesiae constitutus es,\npotentiam intercessionem tuam humiliter imploro.\nFidem vivam et stabilem,\namorem ardentem Dei et proximi\net animum fidei meae aperte profitendae nobis impetres.\nAmen.`}},

{id:99,cat:'special',
 title:{en:'Prayer Before a Journey',pt:'Oração Antes de uma Viagem',la:'Ante Iter'},
 text:{
  en:`Lord God, you guided Abraham and Sarah\non all their wanderings;\nyou led Moses and the Hebrew people\nthrough the desert.\nBless me as I begin this journey.\nBe with me along the way,\nguard me from all dangers,\nbring me safely to my destination,\nand home again in Your own good time.\nAmen.`,
  pt:`Senhor Deus, Vós guiastes Abraão e Sara\nem todos os seus caminhos;\nconduzistes Moisés e o povo hebreu\npelo deserto.\nAbençoai-me ao iniciar esta viagem.\nEstai comigo ao longo do caminho,\nguardai-me de todos os perigos,\nconduzis-me em segurança ao meu destino\ne de volta ao lar a seu devido tempo.\nAmém.`,
  la:`Domine Deus, qui Abraham et Saram\nin omnibus peregrinationibus duxisti;\nqui Moysen et populum Hebraeum\nper desertum duxisti.\nBenedic mihi dum iter incipiam.\nMecum per viam sis,\na periculis omnibus me tege,\nad destinationem tuto me perducas\net domum iterum suo tempore.\nAmen.`}},

{id:100,cat:'special',
 title:{en:'Prayer of Consecration (Final Blessing)',pt:'Oração de Consagração Final',la:'Consecratio Finalis'},
 text:{
  en:`Lord Jesus Christ,\nI consecrate to You this day\nmy mind and its thoughts,\nmy heart and its affections,\nmy will and its decisions,\nmy body and its actions,\nmy soul and all that I am.\nMay everything I think and say and do today\nbe for Your glory and in accord with Your will.\nMary, my Mother, protect me.\nMy Guardian Angel, guide me.\nAll the saints, pray for me.\nAmen.`,
  pt:`Senhor Jesus Cristo,\nconsagro-Vos neste dia\nminha mente e seus pensamentos,\nmeu coração e seus afetos,\nminha vontade e suas decisões,\nmeu corpo e suas ações,\nminha alma e tudo o que sou.\nQue tudo o que pensar, disser e fizer hoje\nseja para Vossa glória e em conformidade com Vossa vontade.\nMaria, minha Mãe, protegei-me.\nMeu Anjo da Guarda, guiai-me.\nTodos os santos, orai por mim.\nAmém.`,
  la:`Domine Iesu Christe,\nhidie tibi consacro\nmentem meam et cogitationes eius,\ncor meum et affectus eius,\nvoluntatem meam et decisiones eius,\ncorpus meum et actiones eius,\nanimam meam et quidquid sum.\nOmnia quae hodie cogito, dico et facio\nsin ad gloriam tuam et secundum voluntatem tuam.\nMaria, Mater mea, me protege.\nAngele Custode mi, me duc.\nOmnes Sancti, orate pro me.\nAmen.`}},

// Bonus prayers 101-110
{id:101,cat:'virtue',
 title:{en:'Act of Contrition (Short)',pt:'Ato de Contrição (Curto)',la:'Actus Contritionis Brevis'},
 text:{
  en:`O my God, I am sorry for my sins\nbecause I have offended You.\nI know I should love You above all things.\nHelp me to do penance,\nto do better,\nand to avoid anything\nthat might lead me to sin.\nAmen.`,
  pt:`Ó meu Deus, estou arrependido dos meus pecados\nporquanto Vos ofendi.\nSei que devo Vos amar acima de todas as coisas.\nAjudai-me a fazer penitência,\na melhorar,\ne a evitar tudo\nque me possa levar ao pecado.\nAmém.`,
  la:`O Deus meus, doleo pro peccatis meis\nquia te offendi.\nScio me te supra omnia amare debere.\nAdiuva me poenitentiam agere,\nmelius facere,\net omnia vitare\nquae me ad peccandum inducere possint.\nAmen.`}},

{id:102,cat:'rosary',
 title:{en:'Mysteries of Light Meditation',pt:'Meditação dos Mistérios Luminosos',la:'Meditatio Mysteriorum Luminosorum'},
 text:{
  en:`Lord Jesus,\nas we meditate on the Mysteries of Light,\nwe recall your Baptism in the Jordan,\nwhere the Father declared you His beloved Son.\nWe remember Cana,\nwhere your Mother's intercession began your signs.\nWe contemplate your proclamation of the Kingdom,\nyour Transfiguration on the mountain,\nand the gift of yourself in the Eucharist.\nMay these Luminous Mysteries\nilluminate our path to You.\nAmen.`,
  pt:`Senhor Jesus,\nao meditarmos nos Mistérios Luminosos,\nrecordamos Vosso Batismo no Jordão,\nonde o Pai Vos proclamou Seu Filho amado.\nRecordamos Caná,\nonde a intercessão de Vossa Mãe iniciou Vossos sinais.\nContemplamos Vosso anúncio do Reino,\nVossa Transfiguração no monte,\ne o dom de Vós mesmos na Eucaristia.\nQue estes Mistérios Luminosos\niluminem nosso caminho até Vós.\nAmém.`,
  la:`Domine Iesu,\ndum Mysteria Luminosa meditamur,\nBaptismum tuum in Iordane recolimus,\nubi Pater te Filium suum dilectum proclamavit.\nCanam meminimus,\nubi intercessio Matris tuae signa tua inchoavit.\nRegni tui proclamationem contemplamur,\nTransfigurationem tuam in monte,\net donum tui ipsius in Eucharistia.\nHaec Mysteria Luminosa\nviam nostram ad te illuminent.\nAmen.`}},

{id:103,cat:'saints',
 title:{en:'Prayer to Our Lady of Aparecida',pt:'Oração a Nossa Senhora Aparecida',la:'Ad Dominam Nostram Aparecidensem'},
 text:{
  en:`Our Lady Aparecida,\nMother of God and our Mother,\nyou were found by simple fishermen\nand have blessed Brazil with your presence.\nLook with love upon your people.\nProtect our families,\nstrengthen the faith of your children,\nand intercede for us before your Son Jesus.\nMay Brazil always be\nunder your mantle of protection.\nAmen.`,
  pt:`Nossa Senhora Aparecida,\nMãe de Deus e nossa Mãe,\nfostes encontrada por simples pescadores\ne abençoastes o Brasil com Vossa presença.\nOlhai com amor para o Vosso povo.\nProtegeis nossas famílias,\nfortaleceis a fé de Vossos filhos\ne intercedei por nós diante de Vosso Filho Jesus.\nQue o Brasil esteja sempre\nsob Vosso manto de proteção.\nAmém.`,
  la:`Domina Nostra Aparecidensis,\nMater Dei et Mater nostra,\na piscatoribus simplicibus inventa es\net Brasiliam praesentia tua benedixisti.\nCum amore respice in populum tuum.\nFamilias nostras protege,\nfidem filiorum tuorum robora\net pro nobis apud Filium tuum Iesum intercede.\nSit Brasilia semper\nsub pallio tuo protectionis.\nAmen.`}},

{id:104,cat:'daily',
 title:{en:'Prayer for Generosity',pt:'Oração pela Generosidade',la:'Pro Generositate'},
 text:{
  en:`Teach us, Lord,\nto serve You as You deserve;\nto give and not to count the cost;\nto fight and not to heed the wounds;\nto toil and not to seek for rest;\nto labor and not to ask for reward,\nsave that of knowing\nthat we do Your will.\nAmen.`,
  pt:`Ensinai-nos, Senhor,\na servi-Vos como mereceis;\na dar sem contar o custo;\na combater sem atender às feridas;\na trabalhar sem buscar repouso;\na servir sem pedir recompensa,\nsenão a de saber\nque fazemos Vossa vontade.\nAmém.`,
  la:`Doce nos, Domine,\ntibi servire sicut mereris;\ndare et non computare sumptum;\npugnare et non curare vulnera;\nlaborare et non quaerere requiem;\noperari et non petere mercedem,\nnisi id scire\nnos voluntatem tuam facere.\nAmen.`}},

{id:105,cat:'special',
 title:{en:'Prayer for God\'s Mercy',pt:'Oração pela Misericórdia de Deus',la:'Pro Misericordia Dei'},
 text:{
  en:`O Lord, whose mercy is without limit\nand whose love endures for ever,\nhave mercy on me, a sinner.\nRemember not my offenses\nbut remember me in Your love.\nCleanse me of all my sins,\nrenew my heart,\nand fill me with Your Holy Spirit.\nMay I experience Your mercy\nand share it with others.\nAmen.`,
  pt:`Senhor, cuja misericórdia não tem limites\ne cujo amor dura eternamente,\ntende piedade de mim, pecador.\nNão Vos lembreis das minhas ofensas\nmas lembrai-vos de mim no Vosso amor.\nLimpai-me de todos os meus pecados,\nrenovai meu coração\ne enchei-me de Vosso Espírito Santo.\nQue eu experencie Vossa misericórdia\ne a compartilhe com os outros.\nAmém.`,
  la:`Domine, cuius misericordia sine fine est\net amor in aeternum manet,\nmiserere mei peccatoris.\nNe meminisse offensarum mearum\nverum mei in amore tuo memento.\nA peccatis omnibus me purga,\ncor meum rénova\net Spiritu Sancto tuo me imple.\nMisericordiam tuam experiar\neamque cum aliis communicem.\nAmen.`}},

// ── NOVAS ORAÇÕES (106-120) ──────────────────────────────────────
{id:106,cat:'basic',
 title:{en:'Come Holy Spirit (Veni Sancte Spiritus)',pt:'Vinde, Espírito Santo',la:'Veni Sancte Spiritus'},
 text:{
  en:`Come, Holy Spirit, fill the hearts of your faithful\nand kindle in them the fire of your love.\nSend forth your Spirit and they shall be created,\nand you shall renew the face of the earth.\n\nO God, who by the light of the Holy Spirit\ndid instruct the hearts of your faithful,\ngrant us in the same Spirit to be truly wise,\nand ever to rejoice in His consolation.\nThrough Christ our Lord.\nAmen.`,
  pt:`Vinde, Espírito Santo,\nenchei os corações dos Vossos fiéis\ne acendei neles o fogo do Vosso amor.\nEnviai o Vosso Espírito e serão criados,\ne renovareis a face da terra.\n\nÓ Deus, que iluminastes os corações dos fiéis\npela luz do Espírito Santo,\nconcedei-nos que pelo mesmo Espírito\npossamos saber o que é reto\ne sempre nos alegrarmos\ncom o Seu consolo.\nPelo Cristo Nosso Senhor.\nAmém.`,
  la:`Veni, Sancte Spiritus,\nreple tuorum corda fidelium,\net tui amoris in eis ignem accende.\nEmitte Spiritum tuum et creabuntur,\net renovabis faciem terrae.\n\nDeus, qui corda fidelium\nSancti Spiritus illustratione docuisti,\nda nobis in eodem Spiritu\nrecta sapere\net de eius semper consolatione gaudere.\nPer Christum Dominum nostrum.\nAmen.`}},

{id:107,cat:'special',
 title:{en:'Prayer Before Confession',pt:'Oração Antes da Confissão',la:'Ante Confessionem'},
 text:{
  en:`O Lord Jesus Christ,\nYou are the Good Shepherd who came to seek the lost.\nI come to You in the Sacrament of Reconciliation,\nhumbly asking for Your mercy.\nGrant me a contrite heart,\na clear mind to confess my sins completely,\nand the grace of true conversion.\nMay this sacrament restore me to full communion\nwith You and Your Church.\nAmen.`,
  pt:`Senhor Jesus Cristo,\nVós sois o Bom Pastor que veio buscar a ovelha perdida.\nVenho a Vós no Sacramento da Reconciliação,\npedindo humildemente Vossa misericórdia.\nConcedei-me um coração contrito,\numa mente clara para confesar completamente meus pecados\ne a graça da verdadeira conversão.\nFazei que este sacramento me restaure\nà plena comunhão convosco e com Vossa Igreja.\nAmém.`,
  la:`Domine Iesu Christe,\ntu es Pastor bonus qui periisse quaesivisti.\nAd te venio in Sacramento Reconciliationis,\nhumiliter misericordiam tuam implorans.\nDa mihi cor contritum,\nmentem claram ad peccata mea plene confitenda\net gratiam verae conversionis.\nHoc sacramentum me in plenam communionem\ntecum et Ecclesia tua restituat.\nAmen.`}},

{id:108,cat:'special',
 title:{en:'Prayer After Confession',pt:'Oração Após a Confissão',la:'Post Confessionem'},
 text:{
  en:`Lord Jesus, thank You for the gift of Your forgiveness.\nI believe in Your mercy which has cleansed me\nfrom all my sins.\nGrant me the grace to sin no more\nand to avoid the near occasions of sin.\nStrengthen my will to follow Your commandments\nand to live in Your grace.\nMay I always be grateful\nfor the gift of reconciliation.\nAmen.`,
  pt:`Senhor Jesus, obrigado pelo dom do Vosso perdão.\nCreio na Vossa misericórdia que me purificou\nde todos os meus pecados.\nConcedei-me a graça de não mais pecar\ne de evitar as ocasiões próximas de pecado.\nFortificai a minha vontade para seguir\nVossos mandamentos e viver na Vossa graça.\nFazei que eu seja sempre grato\npelo dom da reconciliação.\nAmém.`,
  la:`Domine Iesu, gratias tibi pro dono veniae tuae.\nCredo in misericordiam tuam quae me purgavit\nab omnibus peccatis meis.\nDa mihi gratiam ne amplius peccem\net occasiones peccati proximas evitem.\nVoluntatem meam firma ut mandata tua sequar\net in gratia tua vivam.\nFac me semper gratum\npro dono reconciliationis.\nAmen.`}},

{id:109,cat:'virtue',
 title:{en:'Litany of Humility',pt:'Ladainha da Humildade',la:'Litania Humilitatis'},
 text:{
  en:`O Jesus, meek and humble of heart, hear me.\nFrom the desire of being esteemed — deliver me.\nFrom the desire of being loved — deliver me.\nFrom the desire of being praised — deliver me.\nFrom the desire of being preferred — deliver me.\nFrom the desire of being consulted — deliver me.\nFrom the fear of being humiliated — deliver me.\nFrom the fear of being despised — deliver me.\nFrom the fear of being forgotten — deliver me.\nThat others may be esteemed more than I — grant this.\nThat others may be loved more than I — grant this.\nThat others may be praised and I forgotten — grant this.\nThat I may become holier than I am — grant this.\nJesus, grant me the grace to desire it.\nAmen.`,
  pt:`Ó Jesus, manso e humilde de coração, ouvi-me.\nDo desejo de ser estimado — livrai-me.\nDo desejo de ser amado — livrai-me.\nDo desejo de ser elogiado — livrai-me.\nDo desejo de ser preferido — livrai-me.\nDo temor de ser humilhado — livrai-me.\nDo temor de ser desprezado — livrai-me.\nDo temor de ser esquecido — livrai-me.\nQue os outros sejam mais estimados que eu — concedei-me.\nQue os outros sejam mais amados que eu — concedei-me.\nQue os outros sejam elogiados e eu esquecido — concedei-me.\nQue eu me torne mais santo do que sou — concedei-me.\nJesus, dai-me a graça de desejá-lo.\nAmém.`,
  la:`O Iesu, mitis et humilis corde, exaudi me.\nA desiderio aestimandi — libera me.\nA desiderio amandi — libera me.\nA desiderio laudandi — libera me.\nA desiderio praeferendi — libera me.\nA timore humiliandi — libera me.\nA timore contemnendi — libera me.\nA timore oblivionis — libera me.\nUt alii aestimentur plus quam ego — da mihi.\nUt alii amentur plus quam ego — da mihi.\nUt alii laudentur et ego obliviscar — da mihi.\nUt sanctior fiam quam sum — da mihi.\nIesu, da mihi gratiam id desiderandi.\nAmen.`}},

{id:110,cat:'special',
 title:{en:'Consecration to the Sacred Heart',pt:'Consagração ao Sagrado Coração',la:'Ad Cor Sacratissimum Consecratio'},
 text:{
  en:`O Sacred Heart of Jesus,\nto whom I owe everything,\nI consecrate and dedicate myself\nentirely and forever.\nI give you my heart, my mind, my soul, my body,\nmy joys and my sorrows,\nmy merits and my faults.\nBe my strength in temptation,\nmy refuge in sorrow,\nmy consolation in every moment.\nSacred Heart of Jesus, I trust in You.\nAmen.`,
  pt:`Ó Sagrado Coração de Jesus,\na quem tudo devo,\nconsagro-me e dedico-me\ninteiramente e para sempre.\nDou-Vos meu coração, mente, alma e corpo,\nminhas alegrias e sofrimentos,\nmeus méritos e faltas.\nSedeis minha força na tentação,\nmeu refúgio na dor,\nminha consolação em todo momento.\nSagrado Coração de Jesus, eu confio em Vós!\nAmém.`,
  la:`O Cor Sacratissimum Iesu,\ncui omnia debeo,\nme totum et in perpetuum\ntibi consecro et dedico.\nCor meum, mentem, animam, corpus tibi do,\ngaudia et dolores,\nmerita et culpas.\nSis fortitudo mea in tentatione,\nrefugium in dolore,\nsolatium in omni momento.\nCor Sacratissimum Iesu, in te confido.\nAmen.`}},

{id:111,cat:'marian',
 title:{en:'Prayer to Our Lady of Perpetual Help',pt:'Oração a Nossa Senhora do Perpétuo Socorro',la:'Ad Dominam Nostram Perpetui Auxilii'},
 text:{
  en:`O Mother of Perpetual Help,\ngrant that I may ever invoke\nyour most powerful name,\nwhich is the safeguard of the living\nand the salvation of the dying.\nPurest Mary, let your name henceforth be\nunceasingly on my lips.\nBe my strength in temptation.\nArise and come to my assistance.\nOur Lady of Perpetual Help, never let me lose\nyou through my own fault.\nAmen.`,
  pt:`Ó Mãe do Perpétuo Socorro,\nconcedei que eu invoque sempre\nvosso poderoso nome,\nque é salvaguarda dos vivos\ne salvação dos moribundos.\nPuríssima Maria, que vosso nome esteja\nde agora em diante incessantemente em meus lábios.\nSedeis minha força na tentação.\nLevantai-vos e vinde em meu auxílio.\nNossa Senhora do Perpétuo Socorro,\nnunca permitais que eu vos perca por minha culpa.\nAmém.`,
  la:`O Mater Perpetui Auxilii,\nda mihi ut nomen tuum potentissimum\nsemper invocarem,\nquod est tutela viventium\net salvatio morientium.\nPurissima Maria, nomen tuum\nde cetero iugiter in labiis meis sit.\nSis fortitudo mea in tentatione.\nSurge et veni ad auxilium meum.\nDomina Nostra Perpetui Auxilii,\nnunquam permittas me te per culpam meam amittere.\nAmen.`}},

{id:112,cat:'saints',
 title:{en:'Prayer to the Infant Jesus of Prague',pt:'Oração ao Menino Jesus de Praga',la:'Ad Infantem Iesum Pragensem'},
 text:{
  en:`O Infant Jesus of Prague,\nyou who said: "The more you honor me,\nthe more I will bless you,"\nI humbly come before your image\nto invoke your powerful intercession.\nHeal what is sick in me,\nstrengthen what is weak,\nand guide me in the way of your peace.\nInfant Jesus of Prague, have mercy on me.\nAmen.`,
  pt:`Ó Menino Jesus de Praga,\nVós que dissestes: "Quanto mais me honrardes,\nmais vos abençoarei,"\nvenho humildemente diante de Vossa imagem\npara invocar Vossa poderosa intercessão.\nCurai o que em mim está doente,\nfortificai o que está fraco\ne guiai-me pelo caminho de Vossa paz.\nMenino Jesus de Praga, tende misericórdia de mim.\nAmém.`,
  la:`O Infante Iesu Pragensi,\nqui dixisti: "Quanto magis me honoratis,\ntanto magis vos benedicam,"\nhumiliter coram imagine tua venio\nut potenti intercessioni tuae supplicem.\nSana quod in me aegrotat,\nrobora quod infirmum est,\net in via pacis tuae me duc.\nInfans Iesu Pragensis, miserere mei.\nAmen.`}},

{id:113,cat:'saints',
 title:{en:'Prayer to St. John Paul II',pt:'Oração a São João Paulo II',la:'Ad Sanctum Ioannem Paulum II'},
 text:{
  en:`Blessed John Paul II,\nPilgrim of hope and herald of the New Evangelization,\nyou crossed the thresholds of nations\nproclaiming: "Be not afraid!"\nObtain for us from God\nthe grace to open our hearts to Christ,\nto make of our lives\na total gift to Him and to others,\nand to work with courage\nfor a civilization of love.\nAmen.`,
  pt:`São João Paulo II,\nperegrino da esperança e arauto da Nova Evangelização,\nvós cruzastes os limiares das nações\nproclamando: "Não tenhais medo!"\nObtende para nós de Deus\na graça de abrir nossos corações a Cristo,\nde fazer de nossas vidas\numa doação total a Ele e aos outros\ne trabalhar com coragem\npor uma civilização do amor.\nAmém.`,
  la:`Beate Ioannes Paule II,\nperegrine spei et nuntius Novae Evangelizationis,\nper limina nationum transisti\nclamans: "Nolite timere!"\nImpetres nobis a Deo\ngratiam corda nostra Christo aperire,\nvitas nostras\ntotalem donationem Illi et aliis facere\net pro civilizatione amoris\nanimose laborare.\nAmen.`}},

{id:114,cat:'virtue',
 title:{en:'Act of Reparation',pt:'Ato de Reparação',la:'Actus Reparationis'},
 text:{
  en:`O most Holy Trinity,\nI adore You! My God, my God,\nI love You in the Most Blessed Sacrament.\nI love You!\nFor all those who do not adore You,\nfor all those who do not love You,\nfor all those who have offended You,\nfor all those who do not believe in You —\nI adore, I love, I believe and I hope.\nAmen.`,
  pt:`Ó Santíssima Trindade,\nadoro-Vos! Meu Deus, meu Deus,\namo-Vos no Santíssimo Sacramento.\nAmo-Vos!\nPor todos os que não Vos adoram,\npor todos os que não Vos amam,\npor todos os que Vos ofenderam,\npor todos os que não acreditam em Vós —\nadoro, amo, creio e espero.\nAmém.`,
  la:`O Sanctissima Trinitas,\nte adoro! Deus meus, Deus meus,\nte in Sanctissimo Sacramento diligo.\nAmo te!\nPro omnibus qui te non adorant,\npro omnibus qui te non amant,\npro omnibus qui te offenderunt,\npro omnibus qui in te non credunt —\nadoro, amo, credo et spero.\nAmen.`}},

{id:115,cat:'special',
 title:{en:'Prayer for Priests',pt:'Oração pelos Sacerdotes',la:'Pro Sacerdotibus'},
 text:{
  en:`Lord Jesus Christ, eternal High Priest,\npreserve your priests within the shelter of Your Sacred Heart,\nwhere none may touch them.\nKeep unstained their anointed hands,\nwhich daily touch Your Sacred Body.\nKeep unsullied their lips, daily purpled with Your Precious Blood.\nKeep pure and unearthly their hearts,\nsealed with the sublime mark of the priesthood.\nAmen.`,
  pt:`Senhor Jesus Cristo, eterno Sumo Sacerdote,\nprotegei Vossos sacerdotes no abrigo do Vosso Sagrado Coração,\nonده nenhum os possa tocar.\nConservai imaculadas as mãos ungidas\nque diariamente tocam Vosso Sagrado Corpo.\nConservai imaculados os lábios\ndiariamente purpurados com Vosso Precioso Sangue.\nConservai puros e sublimes seus corações,\nselo com a marca sublime do sacerdócio.\nAmém.`,
  la:`Domine Iesu Christe, Pontifex aeterne,\nsacerdotes tuos in praesidio Cordis tui Sacratissimi conserva,\nubi nemo eos tangere possit.\nManus unctas incontaminatas serva\nquae quotidie Corpus tuum Sacratissimum tangunt.\nLabia purpurata Sanguine tuo Pretiosissimo immaculata serva.\nCorda eorum pura et sublimia conserva,\nsigno sublime sacerdotii obsignata.\nAmen.`}},

{id:116,cat:'daily',
 title:{en:'Prayer for Wisdom',pt:'Oração pela Sabedoria',la:'Pro Sapientia'},
 text:{
  en:`O God, source of all wisdom,\ngive me the grace to know Your will\nand the courage to follow it.\nMake me wise enough to recognize the truth,\nhonest enough to live by it,\nand humble enough to acknowledge\nhow much I still have to learn.\nFill me with Your Holy Spirit\nthat I may grow in wisdom every day.\nAmen.`,
  pt:`Ó Deus, fonte de toda sabedoria,\ndai-me a graça de conhecer Vossa vontade\ne a coragem de segui-la.\nFazei-me suficientemente sábio para reconhecer a verdade,\nhonesto para viver por ela\ne humilde para reconhecer\nquanto ainda tenho a aprender.\nEnchai-me do Vosso Espírito Santo\npara que eu cresça em sabedoria a cada dia.\nAmém.`,
  la:`Deus, fons omnis sapientiae,\nda mihi gratiam voluntatem tuam cognoscendi\net animum eam sequendi.\nFac me satis sapientem ut veritatem agnoscam,\nsatis honestum ut per eam vivam\net satis humilem ut agnoscam\nquantum adhuc discendum sit.\nImple me Spiritu tuo Sancto\nut in sapientia quotidie crescam.\nAmen.`}},

{id:117,cat:'special',
 title:{en:'Prayer for a New Beginning',pt:'Oração por um Novo Começo',la:'Pro Novo Initio'},
 text:{
  en:`Lord God, You who make all things new,\ngrant me the grace to begin again.\nFree me from the weight of past failures,\nfrom bitterness and regret.\nFill my heart with fresh hope\nand my soul with renewed purpose.\nAs each morning brings new mercy,\nso let this day bring me\ncloser to You and to the person\nYou call me to be.\nAmen.`,
  pt:`Senhor Deus, Vós que renovais todas as coisas,\nconcedei-me a graça de recomeçar.\nLibertai-me do peso dos fracassos passados,\nda amargura e do arrependimento.\nEnchai meu coração de nova esperança\ne minha alma de propósito renovado.\nAssim como cada manhã traz nova misericórdia,\nfazei que este dia me traga\nmais perto de Vós e da pessoa\nque me chamais a ser.\nAmém.`,
