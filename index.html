<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Orações Católicas · Catholic Prayers · Orationes Catholicae</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=Cinzel+Decorative:wght@400;700&display=swap" rel="stylesheet"/>
<style>
:root {
  --navy: #080f1e;
  --navy2: #0d1a30;
  --navy3: #122040;
  --gold: #c9a84c;
  --gold2: #e6c46a;
  --gold3: #f0d080;
  --cream: #f5ead8;
  --cream2: #ede0c8;
  --crimson: #8b1c1c;
  --crimson2: #a52424;
  --silver: #b8c0d0;
  --panel: rgba(255,255,255,0.03);
  --border: rgba(201,168,76,0.2);
  --border2: rgba(201,168,76,0.4);
  --shadow: 0 8px 32px rgba(0,0,0,0.5);
  --radius: 12px;
  --font-title: 'Cinzel', serif;
  --font-body: 'EB Garamond', serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  background: var(--navy);
  color: var(--cream);
  font-family: var(--font-body);
  font-size: 18px;
  min-height: 100vh;
  overflow-x: hidden;
}
body::before{
  content:'';position:fixed;inset:0;
  background:
    radial-gradient(ellipse 60% 40% at 20% 20%, rgba(201,168,76,0.06) 0%, transparent 60%),
    radial-gradient(ellipse 50% 60% at 80% 80%, rgba(139,28,28,0.08) 0%, transparent 60%),
    radial-gradient(ellipse 80% 80% at 50% 50%, rgba(13,26,48,0.9) 0%, transparent 100%);
  pointer-events:none;z-index:0;
}

/* SCROLLBAR */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--navy2)}
::-webkit-scrollbar-thumb{background:rgba(201,168,76,0.3);border-radius:3px}

/* LAYOUT */
.app{display:grid;grid-template-columns:280px 1fr;height:100vh;overflow:hidden;position:relative;z-index:1}
@media(max-width:768px){.app{grid-template-columns:1fr;height:calc(100vh - 62px);overflow:hidden}}

/* SIDEBAR */
.sidebar{
  background: linear-gradient(180deg, rgba(13,26,48,0.98) 0%, rgba(8,15,30,0.98) 100%);
  border-right: 1px solid var(--border);
  display:flex;flex-direction:column;
  position:sticky;top:0;height:100vh;overflow:hidden;
  box-shadow: 4px 0 24px rgba(0,0,0,0.4);
}
@media(max-width:768px){
  .sidebar{position:relative;height:auto;max-height:45vh;border-right:none;border-bottom:1px solid var(--border)}
}

.sidebar-logo{
  padding:28px 24px 20px;
  border-bottom:1px solid var(--border);
  text-align:center;
}
.logo-cross{font-size:28px;margin-bottom:6px;filter:drop-shadow(0 0 8px rgba(201,168,76,0.5))}
.logo-title{
  font-family:var(--font-title);font-size:15px;letter-spacing:0.15em;
  color:var(--gold);font-weight:700;text-transform:uppercase;
  text-shadow:0 0 20px rgba(201,168,76,0.4);
}
.logo-sub{font-size:11px;color:var(--silver);letter-spacing:0.08em;margin-top:3px;opacity:0.7}

.search-wrap{padding:16px 16px 8px}
.search-box{
  width:100%;background:rgba(255,255,255,0.05);
  border:1px solid var(--border);border-radius:8px;
  padding:9px 14px 9px 36px;color:var(--cream);
  font-family:var(--font-body);font-size:15px;outline:none;
  position:relative;transition:border-color .2s,background .2s;
}
.search-box::placeholder{color:rgba(245,234,216,0.4)}
.search-box:focus{border-color:var(--gold2);background:rgba(255,255,255,0.08)}
.search-icon{
  position:absolute;left:28px;top:50%;transform:translateY(-50%);
  color:var(--silver);font-size:14px;pointer-events:none;
}
.search-rel{position:relative}

.sidebar-stats{
  display:flex;gap:8px;padding:8px 16px;
}
.stat-chip{
  flex:1;background:rgba(201,168,76,0.08);border:1px solid var(--border);
  border-radius:6px;padding:6px 8px;text-align:center;
}
.stat-n{font-family:var(--font-title);font-size:16px;color:var(--gold2);font-weight:700}
.stat-l{font-size:10px;color:var(--silver);letter-spacing:0.05em;text-transform:uppercase}

.cat-list{
  flex:1;overflow-y:auto;padding:8px 12px 80px;
}
.cat-header{
  font-family:var(--font-title);font-size:9px;letter-spacing:0.2em;
  color:rgba(201,168,76,0.5);text-transform:uppercase;
  padding:10px 8px 6px;margin-top:4px;
}
.cat-btn{
  width:100%;display:flex;align-items:center;gap:10px;
  padding:9px 12px;border-radius:8px;border:none;
  background:transparent;color:var(--cream2);cursor:pointer;
  font-family:var(--font-body);font-size:15px;text-align:left;
  transition:all .15s;position:relative;
}
.cat-btn:hover{background:rgba(201,168,76,0.08);color:var(--gold3)}
.cat-btn.active{background:rgba(201,168,76,0.12);color:var(--gold2)}
.cat-btn.active::before{
  content:'';position:absolute;left:0;top:20%;bottom:20%;
  width:3px;background:var(--gold);border-radius:2px;
}
.cat-icon{font-size:16px;width:22px;text-align:center}
.cat-name{flex:1;font-size:14px}
.cat-count{font-size:11px;color:var(--silver);opacity:0.6;
  background:rgba(255,255,255,0.06);padding:2px 7px;border-radius:20px}

/* MAIN */
.main{display:flex;flex-direction:column;overflow:hidden;height:100%}

.topbar{
  background:rgba(8,15,30,0.95);border-bottom:1px solid var(--border);
  padding:16px 28px;display:flex;align-items:center;gap:16px;
  position:sticky;top:0;z-index:50;flex-shrink:0;
  backdrop-filter:blur(12px);flex-wrap:wrap;
}
.topbar-title{
  flex:1;
  font-family:var(--font-title);font-size:14px;color:var(--silver);
  letter-spacing:0.1em;text-transform:uppercase;
}
.topbar-title span{color:var(--gold2)}

.lang-tabs{display:flex;gap:4px;background:rgba(255,255,255,0.05);padding:4px;border-radius:8px;border:1px solid var(--border)}
.lang-tab{
  padding:6px 14px;border-radius:6px;border:none;background:transparent;
  font-family:var(--font-title);font-size:11px;letter-spacing:0.1em;
  color:var(--silver);cursor:pointer;transition:all .15s;text-transform:uppercase;
}
.lang-tab:hover{color:var(--gold2)}
.lang-tab.active{background:var(--gold);color:var(--navy);font-weight:700}

.sort-btn{
  padding:7px 14px;background:rgba(255,255,255,0.05);border:1px solid var(--border);
  border-radius:8px;color:var(--silver);font-family:var(--font-title);
  font-size:10px;letter-spacing:0.1em;cursor:pointer;transition:all .15s;
}
.sort-btn:hover{border-color:var(--gold2);color:var(--gold2)}

/* PRAYER LIST */
.prayer-list{
  flex:1;min-height:0;overflow-y:auto;padding:20px 28px 80px;
  display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
  gap:12px;align-content:start;
}
@media(max-width:900px){.prayer-list{grid-template-columns:1fr}}
@media(max-width:768px){.prayer-list{padding:14px 14px 80px}}

.prayer-card{
  background:var(--panel);border:1px solid var(--border);
  border-radius:var(--radius);padding:18px 20px;
  cursor:pointer;transition:all .2s;position:relative;overflow:hidden;
}
.prayer-card::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(201,168,76,0.0),rgba(201,168,76,0.04));
  opacity:0;transition:opacity .2s;
}
.prayer-card:hover{border-color:var(--border2);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,0.4)}
.prayer-card:hover::after{opacity:1}
.prayer-card.selected{border-color:var(--gold);background:rgba(201,168,76,0.07)}

.card-num{
  font-family:var(--font-title);font-size:10px;color:var(--gold);
  letter-spacing:0.15em;opacity:0.7;margin-bottom:4px;
}
.card-title{font-family:var(--font-title);font-size:16px;color:var(--cream);font-weight:600;margin-bottom:2px}
.card-sub{font-size:13px;color:var(--silver);opacity:0.7;font-style:italic}
.card-preview{
  font-size:13px;color:rgba(245,234,216,0.5);margin-top:8px;
  line-height:1.5;overflow:hidden;display:-webkit-box;
  -webkit-line-clamp:2;-webkit-box-orient:vertical;
}
.card-tag{
  display:inline-block;margin-top:10px;
  background:rgba(201,168,76,0.1);border:1px solid rgba(201,168,76,0.2);
  border-radius:20px;padding:2px 10px;font-size:11px;color:var(--gold);
  font-family:var(--font-title);letter-spacing:0.05em;
}

/* PRAYER DETAIL */
.prayer-detail{
  position:fixed;inset:0;z-index:100;
  background:rgba(5,10,20,0.95);backdrop-filter:blur(16px);
  display:flex;align-items:flex-start;justify-content:center;
  padding:24px 16px;overflow-y:auto;
  animation:fadeIn .2s ease;
}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

.detail-card{
  width:100%;max-width:760px;
  background:linear-gradient(160deg, rgba(13,26,48,0.99) 0%, rgba(8,15,30,0.99) 100%);
  border:1px solid var(--border2);border-radius:16px;
  overflow:hidden;box-shadow: 0 24px 80px rgba(0,0,0,0.7), 0 0 0 1px rgba(201,168,76,0.1);
  animation:slideUp .25s ease;
}
@keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}

.detail-header{
  background:linear-gradient(135deg, rgba(201,168,76,0.1) 0%, rgba(139,28,28,0.08) 100%);
  border-bottom:1px solid var(--border);
  padding:28px 32px 24px;position:relative;
}
.detail-close{
  position:absolute;top:20px;right:20px;
  width:36px;height:36px;border-radius:50%;border:1px solid var(--border);
  background:rgba(255,255,255,0.05);color:var(--silver);
  font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all .15s;
}
.detail-close:hover{border-color:var(--gold);color:var(--gold);background:rgba(201,168,76,0.1)}

.detail-num{
  font-family:var(--font-title);font-size:10px;letter-spacing:0.2em;
  color:var(--gold);text-transform:uppercase;opacity:0.8;margin-bottom:6px;
}
.detail-title{
  font-family:'Cinzel Decorative',serif;font-size:22px;color:var(--gold2);
  font-weight:700;line-height:1.2;margin-bottom:4px;
  text-shadow:0 0 30px rgba(201,168,76,0.3);
}
.detail-subtitle{font-size:16px;color:var(--silver);font-style:italic;opacity:0.8}

.detail-lang-tabs{
  display:flex;gap:6px;padding:16px 32px;
  background:rgba(0,0,0,0.2);border-bottom:1px solid var(--border);
  flex-wrap:wrap;
}
.detail-lang-tab{
  padding:7px 18px;border-radius:20px;border:1px solid var(--border);
  background:transparent;color:var(--silver);cursor:pointer;
  font-family:var(--font-title);font-size:11px;letter-spacing:0.12em;text-transform:uppercase;
  transition:all .15s;
}
.detail-lang-tab:hover{border-color:var(--gold);color:var(--gold2)}
.detail-lang-tab.active{background:var(--gold);color:var(--navy);border-color:var(--gold);font-weight:700}

.detail-body{padding:28px 32px 20px}
.prayer-text{
  font-family:var(--font-body);font-size:20px;line-height:1.9;
  color:var(--cream);white-space:pre-wrap;
  letter-spacing:0.01em;
}
.prayer-text.latin{font-style:italic;color:var(--cream2)}

.detail-audio{
  border-top:1px solid var(--border);padding:20px 32px;
  display:flex;align-items:center;gap:14px;flex-wrap:wrap;
}
.audio-play{
  width:48px;height:48px;border-radius:50%;
  background:linear-gradient(135deg,var(--gold),var(--crimson));
  border:none;color:white;font-size:18px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .2s;box-shadow:0 4px 16px rgba(201,168,76,0.3);
  flex-shrink:0;
}
.audio-play:hover{transform:scale(1.08);box-shadow:0 6px 24px rgba(201,168,76,0.4)}
.audio-play.playing{background:linear-gradient(135deg,var(--crimson),var(--crimson2))}

.audio-info{flex:1}
.audio-label{font-family:var(--font-title);font-size:11px;letter-spacing:0.1em;color:var(--gold);margin-bottom:2px}
.audio-lang{font-size:13px;color:var(--silver);opacity:0.7}

.audio-bar{
  flex:2;height:4px;background:rgba(255,255,255,0.1);
  border-radius:2px;position:relative;min-width:100px;
}
.audio-progress{height:100%;background:var(--gold);border-radius:2px;transition:width .1s}

.rate-select{
  background:rgba(255,255,255,0.05);border:1px solid var(--border);
  border-radius:6px;padding:5px 10px;color:var(--silver);
  font-family:var(--font-title);font-size:11px;cursor:pointer;outline:none;
}
.rate-select option{background:var(--navy2)}

.detail-nav{
  display:flex;gap:8px;padding:12px 32px 24px;
}
.nav-btn{
  flex:1;padding:10px 16px;border-radius:8px;
  border:1px solid var(--border);background:rgba(255,255,255,0.04);
  color:var(--silver);font-family:var(--font-title);font-size:11px;
  letter-spacing:0.1em;cursor:pointer;transition:all .15s;text-align:center;
}
.nav-btn:hover{border-color:var(--gold2);color:var(--gold2);background:rgba(201,168,76,0.06)}
.nav-btn:disabled{opacity:0.3;cursor:not-allowed}

/* ─── BOTTOM NAVIGATION ─────────────────────────────────────────── */
.bottom-nav{
  position:fixed;bottom:0;left:0;right:0;height:62px;z-index:500;
  background:rgba(6,12,24,0.97);
  border-top:1px solid rgba(201,168,76,0.25);
  display:flex;
  backdrop-filter:blur(20px);
  box-shadow:0 -4px 30px rgba(0,0,0,0.6);
}
.bnav-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:3px;border:none;background:transparent;color:var(--silver);
  cursor:pointer;font-family:var(--font-title);font-size:9px;
  letter-spacing:0.08em;text-transform:uppercase;transition:all .2s;
  position:relative;padding:0;
}
.bnav-btn:hover{color:var(--gold2)}
.bnav-btn.active{color:var(--gold)}
.bnav-btn.active::before{
  content:'';position:absolute;bottom:0;left:20%;right:20%;
  height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);
  border-radius:2px 2px 0 0;
}
.bnav-icon{font-size:21px;line-height:1;transition:transform .2s}
.bnav-btn:hover .bnav-icon{transform:scale(1.1)}
.bnav-btn.active .bnav-icon{transform:scale(1.05)}
.bnav-label{font-size:9px}
.fav-badge{
  position:absolute;top:5px;right:calc(50% - 22px);
  background:var(--crimson);color:white;
  font-size:9px;min-width:15px;height:15px;
  border-radius:8px;display:none;align-items:center;justify-content:center;
  padding:0 3px;font-family:var(--font-title);font-weight:700;
  box-shadow:0 2px 6px rgba(139,28,28,0.5);
}
.fav-badge.show{display:flex}

/* ─── FAVORITE BUTTON ───────────────────────────────────────────── */
.card-fav{
  position:absolute;top:10px;right:10px;z-index:2;
  background:none;border:none;cursor:pointer;
  font-size:17px;color:var(--silver);opacity:0.3;
  transition:all .15s;padding:5px;line-height:1;
}
.card-fav:hover{opacity:0.8;color:var(--crimson2);transform:scale(1.2)}
.card-fav.is-fav{opacity:1;color:var(--crimson);filter:drop-shadow(0 0 5px rgba(200,50,50,0.4))}
.detail-fav{
  position:absolute;top:20px;right:62px;
  width:36px;height:36px;border-radius:50%;
  border:1px solid var(--border);background:rgba(255,255,255,0.05);
  color:var(--silver);font-size:16px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .15s;
}
.detail-fav:hover{border-color:var(--crimson2);color:var(--crimson2);background:rgba(139,28,28,0.1)}
.detail-fav.is-fav{border-color:var(--crimson);color:var(--crimson);background:rgba(139,28,28,0.15)}

/* ─── ROSARY GUIDE ──────────────────────────────────────────────── */
.rosary-guide{display:flex;flex-direction:column;height:100%}
.mystery-selector{
  display:flex;gap:6px;flex-wrap:wrap;
  padding:16px 28px 14px;
  border-bottom:1px solid var(--border);
  background:rgba(0,0,0,0.2);flex-shrink:0;
}
.mys-tab{
  padding:7px 14px;border-radius:20px;
  border:1px solid var(--border);background:transparent;
  color:var(--silver);font-family:var(--font-title);
  font-size:10px;letter-spacing:0.1em;cursor:pointer;
  transition:all .15s;text-transform:uppercase;
}
.mys-tab:hover{border-color:var(--gold2);color:var(--gold2)}
.mys-tab.active{background:rgba(201,168,76,0.15);border-color:var(--gold);color:var(--gold);font-weight:700}
.mys-day{opacity:0.5;font-size:9px}
.rosary-scroll{flex:1;min-height:0;overflow-y:auto;padding:12px 28px 80px}
.rosary-section-head{
  font-family:var(--font-title);font-size:10px;letter-spacing:0.2em;
  color:var(--gold);text-transform:uppercase;opacity:0.7;
  padding:16px 0 8px;
  border-bottom:1px solid rgba(201,168,76,0.12);margin-bottom:6px;
}
.rosary-step{
  display:flex;align-items:center;gap:10px;
  padding:9px 12px;border-radius:8px;border:1px solid transparent;
  margin-bottom:3px;transition:all .15s;
}
.rosary-step.clickable{cursor:pointer}
.rosary-step.clickable:hover{border-color:var(--border2);background:rgba(201,168,76,0.05);padding-left:16px}
.rosary-step.instruction{border-left:2px solid rgba(201,168,76,0.2);padding-left:12px;cursor:default}
.rosary-step.mystery-hdr{
  background:linear-gradient(135deg,rgba(201,168,76,0.08),rgba(139,28,28,0.05));
  border-color:rgba(201,168,76,0.18);margin-top:4px;cursor:default;
}
.step-icon{font-size:16px;width:24px;text-align:center;flex-shrink:0}
.step-body{flex:1}
.step-name{font-size:14px;color:var(--cream2)}
.step-sub{font-size:11px;color:var(--silver);opacity:0.6;font-style:italic;margin-top:1px}
.step-count{font-family:var(--font-title);font-size:11px;color:var(--gold);margin-left:6px}
.step-arr{font-size:15px;color:var(--silver);opacity:0.35;transition:opacity .15s}
.rosary-step.clickable:hover .step-arr{opacity:0.8;color:var(--gold2)}

/* EMPTY STATE */
.empty{
  grid-column:1/-1;text-align:center;padding:60px 20px;
  color:var(--silver);opacity:0.5;
}
.empty-icon{font-size:48px;margin-bottom:12px}
.empty-text{font-family:var(--font-title);font-size:14px;letter-spacing:0.1em}

/* HEADER DIVIDER */
.ornament{
  text-align:center;font-size:16px;color:var(--gold);
  opacity:0.5;letter-spacing:0.3em;margin:4px 0;
}

/* HIGHLIGHTED */
mark{background:rgba(201,168,76,0.2);color:var(--gold2);border-radius:2px;padding:0 2px}
</style>
</head>
<body>

<div class="app" id="app">
  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="logo-cross">✝</div>
      <div class="logo-title">Orações Católicas</div>
      <div class="logo-sub">Catholic Prayers · Orationes Catholicae</div>
    </div>

    <div class="search-wrap">
      <div class="search-rel">
        <span class="search-icon">🔍</span>
        <input class="search-box" type="text" id="searchInput" placeholder="Buscar oração · Search prayer…" oninput="filterPrayers()"/>
      </div>
    </div>

    <div class="sidebar-stats">
      <div class="stat-chip">
        <div class="stat-n" id="totalCount">—</div>
        <div class="stat-l">Orações</div>
      </div>
      <div class="stat-chip">
        <div class="stat-n">3</div>
        <div class="stat-l">Idiomas</div>
      </div>
      <div class="stat-chip">
        <div class="stat-n">🎧</div>
        <div class="stat-l">Áudio</div>
      </div>
    </div>

    <div class="cat-list" id="catList"></div>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <div class="topbar">
      <div class="topbar-title" id="topbarTitle">Todas as <span>Orações</span></div>
      <div class="lang-tabs">
        <button class="lang-tab active" onclick="setGlobalLang('pt')" id="gtab-pt">PT</button>
        <button class="lang-tab" onclick="setGlobalLang('en')" id="gtab-en">EN</button>
        <button class="lang-tab" onclick="setGlobalLang('la')" id="gtab-la">LA</button>
      </div>
    </div>
    <div class="prayer-list" id="prayerList"></div>

const CATEGORIES = [
  { id:'all',    icon:'✝',  en:'All Prayers',       pt:'Todas as Orações',    la:'Omnes Orationes'         },
  { id:'basic',  icon:'📖', en:'Basic Prayers',     pt:'Orações Básicas',     la:'Orationes Fundamentales' },
  { id:'marian', icon:'🌹', en:'Marian Prayers',    pt:'Orações Marianas',    la:'Orationes Marianae'      },
  { id:'mass',   icon:'🕯', en:'Mass Prayers',      pt:'Orações da Missa',    la:'Orationes Missae'        },
  { id:'virtue', icon:'❤',  en:'Acts of Virtue',    pt:'Atos de Virtude',     la:'Actus Virtutum'          },
  { id:'rosary', icon:'📿', en:'The Rosary',        pt:'O Rosário',           la:'Rosarium'                },
  { id:'saints', icon:'⭐', en:'Prayers to Saints', pt:'Orações aos Santos',  la:'Ad Sanctos'              },
  { id:'daily',  icon:'☀',  en:'Daily Prayers',     pt:'Orações Diárias',     la:'Orationes Quotidianae'   },
  { id:'special',icon:'🙏', en:'Special Occasions', pt:'Ocasiões Especiais',  la:'Pro Variis'              },
];

const PRAYERS = [
// ── BASIC ─────────────────────────────────────────────────────────────
{id:1,cat:'basic',
 title:{en:'Our Father',pt:'Pai Nosso',la:'Pater Noster'},
 text:{
  en:`Our Father, Who art in Heaven,\nhallowed be Thy name;\nThy Kingdom come,\nThy will be done on earth as it is in Heaven.\nGive us this day our daily bread;\nand forgive us our trespasses\nas we forgive those who trespass against us;\nand lead us not into temptation,\nbut deliver us from evil.\nAmen.`,
  pt:`Pai nosso que estais no céu,\nsantificado seja o Vosso nome;\nvenha a nós o Vosso reino;\nseja feita a Vossa vontade,\nassim na terra como no céu.\nO pão nosso de cada dia nos dai hoje;\nperdoai-nos as nossas ofensas,\nassim como nós perdoamos\na quem nos tem ofendido;\ne não nos deixeis cair em tentação,\nmas livrai-nos do mal.\nAmém.`,
  la:`Pater noster, qui es in caelis,\nsanctificetur nomen tuum;\nadveniat regnum tuum;\nfiat voluntas tua,\nsicut in caelo et in terra.\nPanem nostrum quotidianum da nobis hodie;\net dimitte nobis debita nostra,\nsicut et nos dimittimus\ndebitoribus nostris;\net ne nos inducas in tentationem;\nsed libera nos a malo.\nAmen.`}},

{id:2,cat:'basic',
 title:{en:'Hail Mary',pt:'Ave Maria',la:'Ave Maria'},
 text:{
  en:`Hail Mary, full of grace,\nthe Lord is with thee;\nblessed art thou amongst women,\nand blessed is the fruit of thy womb, Jesus.\nHoly Mary, Mother of God,\npray for us sinners,\nnow and at the hour of our death.\nAmen.`,
  pt:`Ave Maria, cheia de graça,\no Senhor é convosco;\nbendita sois vós entre as mulheres,\ne bendito é o fruto do vosso ventre, Jesus.\nSanta Maria, Mãe de Deus,\norai por nós pecadores,\nagora e na hora da nossa morte.\nAmém.`,
  la:`Ave Maria, gratia plena,\nDominus tecum;\nbedicta tu in mulieribus,\net benedictus fructus ventris tui, Iesus.\nSancta Maria, Mater Dei,\nora pro nobis peccatoribus,\nnunc et in hora mortis nostrae.\nAmen.`}},

{id:3,cat:'basic',
 title:{en:'Glory Be',pt:'Glória ao Pai',la:'Gloria Patri'},
 text:{
  en:`Glory be to the Father,\nand to the Son,\nand to the Holy Spirit;\nas it was in the beginning,\nis now, and ever shall be,\nworld without end.\nAmen.`,
  pt:`Glória ao Pai,\nao Filho\ne ao Espírito Santo;\ncomo era no princípio,\nagora e sempre,\npor todos os séculos dos séculos.\nAmém.`,
  la:`Gloria Patri,\net Filio,\net Spiritui Sancto;\nsicut erat in principio,\net nunc et semper,\net in saecula saeculorum.\nAmen.`}},

{id:4,cat:'basic',
 title:{en:"Apostles' Creed",pt:'Credo dos Apóstolos',la:'Symbolum Apostolorum'},
 text:{
  en:`I believe in God,\nthe Father almighty,\nCreator of heaven and earth,\nand in Jesus Christ, his only Son, our Lord,\nwho was conceived by the Holy Spirit,\nborn of the Virgin Mary,\nsuffered under Pontius Pilate,\nwas crucified, died and was buried;\nhe descended into hell;\non the third day he rose again from the dead;\nhe ascended into heaven,\nand is seated at the right hand of God the Father almighty;\nfrom there he will come to judge the living and the dead.\nI believe in the Holy Spirit,\nthe holy catholic Church,\nthe communion of saints,\nthe forgiveness of sins,\nthe resurrection of the body,\nand life everlasting.\nAmen.`,
  pt:`Creio em Deus Pai todo-poderoso,\nCriador do céu e da terra;\ne em Jesus Cristo,\nseu único Filho, nosso Senhor;\nque foi concebido pelo poder do Espírito Santo;\nnasceu da Virgem Maria;\npadeceu sob Pôncio Pilatos,\nfoi crucificado, morto e sepultado;\ndesceu à mansão dos mortos;\nressuscitou ao terceiro dia;\nsubiu aos céus,\nestá sentado à direita de Deus Pai todo-poderoso,\ndonde há de vir a julgar os vivos e os mortos.\nCreio no Espírito Santo,\nna santa Igreja católica,\nna comunhão dos santos,\nna remissão dos pecados,\nna ressurreição da carne\ne na vida eterna.\nAmém.`,
  la:`Credo in Deum Patrem omnipotentem,\nCreatorem caeli et terrae;\net in Iesum Christum,\nFilium eius unicum, Dominum nostrum;\nqui conceptus est de Spiritu Sancto,\nnatus ex Maria Virgine;\npassus sub Pontio Pilato,\ncrucifixus, mortuus et sepultus;\ndescendit ad inferos;\ntertia die resurrexit a mortuis;\nascendit ad caelos;\nsedet ad dexteram Dei Patris omnipotentis;\ninde venturus est iudicare vivos et mortuos.\nCredo in Spiritum Sanctum,\nsanctam Ecclesiam catholicam,\nsanctorum communionem,\nremissionem peccatorum,\ncarnis resurrectionem,\nvitam aeternam.\nAmen.`}},

{id:5,cat:'basic',
 title:{en:'Act of Contrition',pt:'Ato de Contrição',la:'Actus Contritionis'},
 text:{
  en:`O my God, I am heartily sorry\nfor having offended Thee,\nand I detest all my sins,\nbecause I dread the loss of heaven and the pains of hell;\nbut most of all because they offend Thee, my God,\nWho art all good and deserving of all my love.\nI firmly resolve, with the help of Thy grace,\nto confess my sins, to do penance,\nand to amend my life.\nAmen.`,
  pt:`Meu Deus, estou arrependido\nde todos os meus pecados,\nnão só porque com eles mereço as penas do inferno,\nmas principalmente porque Vos ofendi,\nsumo Bem e meu extremoso Pai,\nque tanto me amais e tão digno sois de ser amado.\nTenho firme propósito,\ncom o auxílio da Vossa graça,\nde não Vos tornar a ofender,\ne de evitar as ocasiões próximas de pecado.\nAmém.`,
  la:`Deus meus, ex toto corde poenitet me\nomnium meorum peccatorum,\neaque detestor,\nquia peccando, non solum poenas a Te iuste statutas\npromeritus sum,\nsed praesertim quia offendi Te,\nsummum bonum ac dignum\nqui super omnia diligaris.\nIdeo firmiter propono,\nadiuvante gratia Tua,\nde cetero me non peccaturum\npeccandique occasiones proximas fugiturum.\nAmen.`}},

{id:6,cat:'basic',
 title:{en:'Prayer to Guardian Angel',pt:'Oração ao Anjo da Guarda',la:'Ad Angelum Custodem'},
 text:{
  en:`Angel of God,\nmy guardian dear,\nto whom God's love commits me here,\never this day be at my side,\nto light and guard, to rule and guide.\nAmen.`,
  pt:`Anjo de Deus,\nmeu zeloso guardador,\na quem a piedade divina\nme confiou:\nilumina-me, guarda-me,\nrege-me e governa-me.\nAmém.`,
  la:`Angele Dei,\nqui custos es mei,\nme tibi commissum pietate superna,\nhac nocte (hodie) illumina, custodi,\nrege et guberna.\nAmen.`}},

{id:7,cat:'basic',
 title:{en:'Confiteor',pt:'Confesso',la:'Confiteor'},
 text:{
  en:`I confess to almighty God\nand to you, my brothers and sisters,\nthat I have greatly sinned\nin my thoughts and in my words,\nin what I have done\nand in what I have failed to do,\nthrough my fault,\nthrough my fault,\nthrough my most grievous fault;\ntherefore I ask blessed Mary ever-Virgin,\nall the Angels and Saints,\nand you, my brothers and sisters,\nto pray for me to the Lord our God.`,
  pt:`Confesso a Deus Todo-Poderoso\ne a vós, irmãos e irmãs,\nque pequei muitas vezes\npor pensamentos e palavras,\natos e omissões,\npor minha culpa,\nminha culpa,\nminha tão grande culpa.\nPeço à Virgem Maria,\naos anjos, aos santos\ne a vós, irmãos e irmãs,\nque rogueis por mim\na Deus nosso Senhor.`,
  la:`Confiteor Deo omnipotenti\net vobis, fratres,\nquia peccavi nimis\ncogitation, verbo, opere et omissione:\nmea culpa, mea culpa,\nmea maxima culpa.\nIdeo precor beatam Mariam semper Virginem,\nomnes Angelos et Sanctos,\net vos, fratres,\norare pro me\nad Dominum Deum nostrum.`}},

{id:8,cat:'basic',
 title:{en:'Grace Before Meals',pt:'Bênção da Mesa',la:'Benedictio Mensae'},
 text:{
  en:`Bless us, O Lord,\nand these Thy gifts,\nwhich we are about to receive\nfrom Thy bounty,\nthrough Christ our Lord.\nAmen.`,
  pt:`Bendize-nos, Senhor,\ne a estes alimentos\nque vamos receber\nda Vossa bondade,\npor Cristo Senhor nosso.\nAmém.`,
  la:`Benedic, Domine, nos\net haec tua dona\nquae de tua largitate\nsumus sumpturi,\nper Christum Dominum nostrum.\nAmen.`}},

{id:9,cat:'basic',
 title:{en:'Grace After Meals',pt:'Ação de Graças após a Refeição',la:'Gratiarum Actio Post Cibum'},
 text:{
  en:`We give Thee thanks\nfor all Thy benefits,\nO almighty God,\nwho livest and reignest for ever;\nand may the souls of the faithful departed,\nthrough the mercy of God,\nrest in peace.\nAmen.`,
  pt:`Graças Te damos\npor todos os Teus benefícios,\nó Deus todo-poderoso,\nque vives e reinas para sempre;\ne as almas dos fiéis defuntos,\npela misericórdia de Deus,\ndescansem em paz.\nAmém.`,
  la:`Agimus tibi gratias\npro universis beneficiis tuis,\nOmnipotens Deus,\nqui vivis et regnas in saecula saeculorum;\net animae fidelium defunctorum\nper misericordiam Dei\nrequiescant in pace.\nAmen.`}},

{id:10,cat:'basic',
 title:{en:'Morning Offering',pt:'Oferecimento da Manhã',la:'Oblatio Matutina'},
 text:{
  en:`O Jesus, through the Immaculate Heart of Mary,\nI offer you my prayers, works, joys and sufferings\nof this day in union with the Holy Sacrifice of the Mass\nthroughout the world.\nI offer them for all the intentions of your Sacred Heart:\nthe salvation of souls, reparation for sin,\nthe reunion of all Christians.\nI offer them for the intentions\nof our bishops and of all Apostles of Prayer,\nand in particular for those recommended\nby our Holy Father this month.\nAmen.`,
  pt:`Ó Jesus, pelo Coração Imaculado de Maria,\nVos ofereço todas as minhas orações, obras,\njoias e sofrimentos deste dia,\nem união com o Sacrifício da Santa Missa\ncelebrado em todo o mundo.\nOferendo por todas as intenções\ndo Vosso Sagrado Coração:\na salvação das almas,\na reparação dos pecados\ne a união de todos os cristãos.\nOfereço em particular pela intenção apostólica\nrecomendada neste mês por nosso Santo Padre.\nAmém.`,
  la:`O Iesu, per Cor Immaculatum Mariae,\noffero tibi orationes, opera,\nguadia et passiones diei huius\nin unione cum Sacrificio Missae\nper universum orbem celebratae.\nOffero pro omnibus intentionibus\nCordis Tui Sacratissimi:\npro salute animarum,\npro reparatione peccatorum\net pro unitate omnium christianorum.\nAmen.`}},

{id:11,cat:'basic',
 title:{en:'Evening Prayer',pt:'Oração da Noite',la:'Completorium'},
 text:{
  en:`Watch, O Lord,\nwith those who wake or watch or weep tonight,\nand give Your angels and saints\ncharge over those who sleep.\nTend Your sick ones, O Lord Christ.\nRest Your weary ones.\nBless Your dying ones.\nSoothe Your suffering ones.\nPity Your afflicted ones.\nShield Your joyous ones.\nAnd all for Your love's sake.\nAmen.`,
  pt:`Velai, Senhor,\npor aqueles que velam, ou assistem, ou choram esta noite;\nedai a Vossos anjos e santos\ncuidado sobre aqueles que dormem.\nTendei carinhosamente Vossos enfermos, Senhor Cristo.\nDai repouso aos Vossos cansados.\nAbençoai os que estão à hora da morte.\nSuavizai os sofrimentos dos que padecem.\nPiedade para com os aflitos.\nProtegei os alegres.\nE isso tudo pelo Vosso amor.\nAmém.`,
  la:`Custodi, Domine,\nvigiliantes, ne dormiant in morte;\ncustos meus, vide vigilias meas.\nTuere infirmos Tuos, Christe Domine.\nRecrea fessos.\nBenedic morituris.\nSolare dolentes.\nMiserere afflictis.\nProtege gaudentes.\nOmnia propter amorem Tuum.\nAmen.`}},

{id:12,cat:'basic',
 title:{en:'Eternal Rest',pt:'Eterno Descanso',la:'Requiem Aeternam'},
 text:{
  en:`Eternal rest grant unto them, O Lord,\nand let perpetual light shine upon them.\nMay they rest in peace.\nAmen.`,
  pt:`Dai-lhes, Senhor, o eterno descanso\ne brilhe para eles a luz perpétua.\nDescansem em paz.\nAmém.`,
  la:`Requiem aeternam dona eis, Domine,\net lux perpetua luceat eis.\nRequiescant in pace.\nAmen.`}},

{id:13,cat:'basic',
 title:{en:'Prayer Before a Crucifix',pt:'Oração Diante do Crucifixo',la:'Ad Crucem'},
 text:{
  en:`Look down upon me, good and gentle Jesus,\nwhile before Thy face I humbly kneel,\nand with burning soul\npray and beseech Thee\nto fix deep in my heart\nlively sentiments of faith, hope and charity,\ntrue contrition for my sins,\nand a firm purpose of amendment;\nwhile I contemplate\nwith great love and tender pity\nThy five wounds,\npondering over them within me,\ncalling to mind the words\nwhich David Thy prophet said of Thee,\nmy good Jesus:\n"They have pierced my hands and my feet;\nthey have numbered all my bones."\nAmen.`,
  pt:`Olhai-me com bondade e benignidade, ó bom Jesus,\naqui ajoelhado humildemente diante de Vós,\ne com a alma ardente vos peço\nque imprimais no meu coração\nvivos sentimentos de fé, esperança e caridade,\nverdadeiro arrependimento dos meus pecados\ne firme propósito de emenda;\nenquanto contemplo, com grande amor e ternura,\nas vossas cinco chagas,\ntendo diante dos olhos\nas palavras que o profeta David disse de Vós,\nó Jesus meu:\n"Perfuraram minhas mãos e meus pés;\ncontaram todos os meus ossos."\nAmém.`,
  la:`Aspice in me, bone et dulcis Iesu,\ndum coram facie tua\nme abiecto in genua\nferventi animo te oro atque obsecro,\nut imprimere velis cordi meo\nvivos fidei, spei et charitatis sensus,\nveram peccatorum meorum paenitentiam,\nfirmumque emendandi voluntatem;\ndum magno animi affectu et dolore\ntua quinque vulnera mecum ipse considero,\nillud prae oculis habens,\nquod iam in ore ponebat tuo David propheta\nde te, O bone Iesu:\n"Foderunt manus meas et pedes meos;\ndinnumeraverunt omnia ossa mea."\nAmen.`}},

{id:14,cat:'basic',
 title:{en:'Nicene Creed',pt:'Credo de Niceia',la:'Symbolum Nicaenum'},
 text:{
  en:`I believe in one God,\nthe Father almighty,\nmaker of heaven and earth,\nof all things visible and invisible.\nI believe in one Lord Jesus Christ,\nthe Only Begotten Son of God,\nborn of the Father before all ages.\nGod from God, Light from Light,\ntrue God from true God,\nbegotten, not made, consubstantial with the Father;\nthrough him all things were made.\nFor us men and for our salvation\nhe came down from heaven,\nand by the Holy Spirit was incarnate of the Virgin Mary,\nand became man.\nFor our sake he was crucified under Pontius Pilate,\nhe suffered death and was buried,\nand rose again on the third day\nin accordance with the Scriptures.\nHe ascended into heaven\nand is seated at the right hand of the Father.\nHe will come again in glory\nto judge the living and the dead\nand his kingdom will have no end.\nI believe in the Holy Spirit, the Lord, the giver of life,\nwho proceeds from the Father and the Son,\nwho with the Father and the Son is adored and glorified,\nwho has spoken through the prophets.\nI believe in one, holy, catholic and apostolic Church.\nI confess one Baptism for the forgiveness of sins\nand I look forward to the resurrection of the dead\nand the life of the world to come.\nAmen.`,
  pt:`Creio em um só Deus,\nPai todo-poderoso,\ncriador do céu e da terra,\ndas coisas visíveis e invisíveis.\nCreio em um só Senhor, Jesus Cristo,\nFilho Unigênito de Deus,\ngerado pelo Pai antes de todos os séculos;\nDeus de Deus, Luz da Luz,\nDeus verdadeiro de Deus verdadeiro,\ngerado, não criado, consubstancial ao Pai.\nPor ele foram feitas todas as coisas.\nPor nós, homens, e para nossa salvação,\ndesceu dos céus e se encarnou\npelo Espírito Santo no seio da Virgem Maria\ne se fez homem.\nFoi crucificado por nós sob Pôncio Pilatos,\npadeceu e foi sepultado.\nRessuscitou ao terceiro dia,\ncomo predisseram as Escrituras.\nSubiu aos céus, onde está sentado\nà direita do Pai.\nE de novo há de vir em glória\npara julgar os vivos e os mortos;\ne o seu reino não terá fim.\nCreio no Espírito Santo,\nSenhor que dá a vida e que procede do Pai e do Filho,\ne com o Pai e o Filho é adorado e glorificado;\ne que falou pelos profetas.\nCreio na Igreja Una, Santa, Católica e Apostólica.\nProfesso um só Batismo para a remissão dos pecados.\nEspero a ressurreição dos mortos\ne a vida do século que há de vir.\nAmém.`,
  la:`Credo in unum Deum,\nPatrem omnipotentem,\nfactorem caeli et terrae,\nvisibilium omnium et invisibilium.\nEt in unum Dominum Iesum Christum,\nFilium Dei unigenitum,\net ex Patre natum ante omnia saecula.\nDeum de Deo, lumen de lumine,\nDeum verum de Deo vero,\ngenitum, non factum, consubstantialem Patri;\nper quem omnia facta sunt.\nQui propter nos homines et propter nostram salutem\ndescendit de caelis.\nEt incarnatus est de Spiritu Sancto\nex Maria Virgine,\net homo factus est.\nCrucifixus etiam pro nobis sub Pontio Pilato,\npassus et sepultus est.\nEt resurrexit tertia die, secundum Scripturas.\nEt ascendit in caelum, sedet ad dexteram Patris.\nEt iterum venturus est cum gloria\niudicare vivos et mortuos:\ncuius regni non erit finis.\nEt in Spiritum Sanctum, Dominum et vivificantem:\nqui ex Patre Filioque procedit.\nQui cum Patre et Filio simul adoratur et conglorificatur:\nqui locutus est per prophetas.\nEt unam, sanctam, catholicam et apostolicam Ecclesiam.\nConfiteor unum baptisma in remissionem peccatorum.\nEt expecto resurrectionem mortuorum.\nEt vitam venturi saeculi.\nAmen.`}},

{id:15,cat:'basic',
 title:{en:'Spiritual Communion',pt:'Comunhão Espiritual',la:'Communio Spiritualis'},
 text:{
  en:`My Jesus, I believe that You are present\nin the Most Holy Sacrament.\nI love You above all things\nand I desire to receive You into my soul.\nSince I cannot at this moment\nreceive You sacramentally,\ncome at least spiritually into my heart.\nI embrace You as if You were already there,\nand unite myself wholly to You.\nNever permit me to be separated from You.\nAmen.`,
  pt:`Meu Jesus, creio que estais\npresente no Santíssimo Sacramento.\nAmo-Vos sobre todas as coisas\ne desejo receber-Vos em minha alma.\nJá que não posso agora\nreceber-Vos sacramentalmente,\nvinde ao menos espiritualmente ao meu coração.\nAbraço-Vos como se já tivésseis vindo,\ne uno-me inteiramente a Vós.\nJamais permitais que me separe de Vós.\nAmém.`,
  la:`Mi Iesu, credo te praesentes esse\nin Sanctissimo Sacramento.\nAmo te supra omnia\net desidero te in anima mea recipere.\nCum nunc sacramentaliter\nte recipere nequeam,\nveni saltem spiritualiter in cor meum.\nTe amplector quasi iam advenisses,\nmeque tibi totum unio.\nNe permittas me unquam a te separari.\nAmen.`}},

// ── MARIAN ─────────────────────────────────────────────────────────────
{id:16,cat:'marian',
 title:{en:'Hail Holy Queen',pt:'Salve Rainha',la:'Salve Regina'},
 text:{
  en:`Hail, holy Queen, Mother of Mercy,\nhail, our life, our sweetness, and our hope.\nTo thee do we cry, poor banished children of Eve;\nto thee do we send up our sighs,\nmourning and weeping in this vale of tears.\nTurn then, most gracious advocate,\nthine eyes of mercy toward us,\nand after this our exile\nshow unto us the blessed fruit of thy womb, Jesus.\nO clement, O loving, O sweet Virgin Mary.\nAmen.`,
  pt:`Salve, Rainha, Mãe de misericórdia,\nvida, doçura e esperança nossa, salve!\nA Vós bradamos, os degredados filhos de Eva;\na Vós suspiramos, gemendo e chorando\nneste vale de lágrimas.\nEia, pois, advogada nossa,\nesses Vossos olhos misericordiosos\na nós volvei;\ne depois deste desterro\nmostrai-nos Jesus, o bendito fruto\ndo vosso ventre.\nÓ clemente, ó piedosa, ó doce Virgem Maria!\nAmém.`,
  la:`Salve, Regina, Mater misericordiae,\nvita, dulcedo et spes nostra, salve!\nAd te clamamus, exsules filii Hevae;\nad te suspiramus, gementes et flentes\nin hac lacrimarum valle.\nEia ergo, advocata nostra,\nillos tuos misericordes oculos\nad nos converte;\net Iesum, benedictum fructum ventris tui,\nnobis post hoc exsilium ostende.\nO clemens, o pia, o dulcis Virgo Maria.\nAmen.`}},

{id:17,cat:'marian',
 title:{en:'Memorare',pt:'Memorare',la:'Memorare'},
 text:{
  en:`Remember, O most gracious Virgin Mary,\nthat never was it known\nthat anyone who fled to thy protection,\nimplored thy help, or sought thy intercession\nwas left unaided.\nInspired by this confidence,\nI fly unto thee, O Virgin of virgins, my Mother;\nto thee do I come, before thee I stand,\nsinful and sorrowful.\nO Mother of the Word Incarnate,\ndespise not my petitions,\nbut in thy mercy hear and answer me.\nAmen.`,
  pt:`Lembrai-vos, ó Santíssima Virgem Maria,\nque jamais se ouviu dizer\nque algum daqueles que recorreram\nà vossa proteção,\nimplorou o vosso socorro\nou buscou a vossa mediação\ntivesse sido abandonado.\nAnimado por este pensamento,\nrecorro a Vós, ó Mãe, Virgem das virgens,\na Vós venho, diante de Vós me apresento,\npecador, contrito.\nÓ Mãe do Verbo Encarnado,\nnão desprezeis minhas súplicas,\nantes, em vossa clemência,\nescutai-as e atendei-as.\nAmém.`,
  la:`Memorare, O piissima Virgo Maria,\nnon esse auditum a saeculo\nquemquam ad tua currentem praesidia,\ntua implorantem auxilia,\ntua petentem suffragia,\nesse derelictum.\nEgo tali animatus confidentia,\nad te, Virgo Virginum, Mater, curro;\nad te venio, coram te gemens peccator assisto.\nNoli, Mater Verbi, verba mea despicere;\nsed audi propitia et exaudi.\nAmen.`}},

{id:18,cat:'marian',
 title:{en:'Angelus',pt:'Angelus',la:'Angelus'},
 text:{
  en:`V. The Angel of the Lord declared unto Mary.\nR. And she conceived of the Holy Spirit.\nHail Mary…\nV. Behold the handmaid of the Lord.\nR. Be it done unto me according to Thy word.\nHail Mary…\nV. And the Word was made flesh.\nR. And dwelt among us.\nHail Mary…\nV. Pray for us, O Holy Mother of God.\nR. That we may be made worthy of the promises of Christ.\n\nLet us pray:\nPour forth, we beseech Thee, O Lord, Thy grace into our hearts;\nthat we, to whom the Incarnation of Christ Thy Son\nwas made known by the message of an Angel,\nmay by His Passion and Cross be brought to the glory of His Resurrection.\nThrough the same Christ Our Lord.\nAmen.`,
  pt:`V. O Anjo do Senhor anunciou a Maria.\nR. E ela concebeu pelo poder do Espírito Santo.\nAve Maria…\nV. Eis aqui a escrava do Senhor.\nR. Faça-se em mim segundo a Vossa palavra.\nAve Maria…\nV. E o Verbo se fez carne.\nR. E habitou entre nós.\nAve Maria…\nV. Rogai por nós, Santa Mãe de Deus.\nR. Para que sejamos dignos das promessas de Cristo.\n\nOremos:\nInfundi, Senhor, a Vossa graça em nossas almas;\npara que nós, que conhecemos a Encarnação de Cristo Vosso Filho\npelo anúncio do Anjo,\npossamos, pela sua Paixão e sua Cruz,\nchegar à glória da Ressurreição.\nPelo mesmo Cristo Nosso Senhor.\nAmém.`,
  la:`V. Angelus Domini nuntiavit Mariae.\nR. Et concepit de Spiritu Sancto.\nAve Maria…\nV. Ecce Ancilla Domini.\nR. Fiat mihi secundum Verbum tuum.\nAve Maria…\nV. Et Verbum caro factum est.\nR. Et habitavit in nobis.\nAve Maria…\nV. Ora pro nobis, Sancta Dei Genitrix.\nR. Ut digni efficiamur promissionibus Christi.\n\nOremus:\nGratiam tuam, quaesumus Domine,\nmentibus nostris infunde;\nut qui angelo nuntiante\nChristi Filii tui incarnationem cognovimus,\nper passionem eius et crucem\nad resurrectionis gloriam perducamur.\nPer eundem Christum Dominum nostrum.\nAmen.`}},

{id:19,cat:'marian',
 title:{en:'Regina Caeli',pt:'Rainha do Céu',la:'Regina Caeli'},
 text:{
  en:`Queen of Heaven, rejoice, alleluia!\nFor He whom you did merit to bear, alleluia!\nHas risen as He said, alleluia!\nPray for us to God, alleluia!\n\nV. Rejoice and be glad, O Virgin Mary, alleluia!\nR. For the Lord has truly risen, alleluia!\n\nLet us pray:\nO God, who gave joy to the world\nthrough the resurrection of Thy Son, our Lord Jesus Christ,\ngrant, we beseech Thee,\nthat through the intercession of the Virgin Mary, His Mother,\nwe may obtain the joys of everlasting life.\nThrough the same Christ our Lord.\nAmen.`,
  pt:`Alegra-te, Rainha do Céu! Aleluia!\nPois aquele que merestes conter, Aleluia!\nComo disse, ressuscitou, Aleluia!\nOra a Deus por nós, Aleluia!\n\nV. Alegra-te e exulta, Virgem Maria, Aleluia!\nR. Pois o Senhor verdadeiramente ressuscitou, Aleluia!\n\nOremos:\nÓ Deus, que pelo meio da Ressurreição\nde Teu Filho Nosso Senhor Jesus Cristo\nalegraste o mundo inteiro,\nconcedei-nos, pedimos,\nalcançar as alegrias da vida eterna,\npela intercessão de Sua Mãe, a Virgem Maria.\nPelo mesmo Cristo Nosso Senhor.\nAmém.`,
  la:`Regina caeli, laetare, alleluia!\nQua meruisti portare, alleluia!\nResurrexit sicut dixit, alleluia!\nOra pro nobis Deum, alleluia!\n\nV. Gaude et laetare, Virgo Maria, alleluia!\nR. Quia surrexit Dominus vere, alleluia!\n\nOremus:\nDeus, qui per resurrectionem Filii tui\nDomini nostri Iesu Christi\nmundum laetificare dignatus es:\npraesta, quaesumus,\nut per eius Genetricem Virginem Mariam\nperpetua capere gaudia.\nPer eundem Christum Dominum nostrum.\nAmen.`}},

{id:20,cat:'marian',
 title:{en:'The Magnificat',pt:'Magnificat',la:'Magnificat'},
 text:{
  en:`My soul proclaims the greatness of the Lord,\nmy spirit rejoices in God my Savior\nfor he has looked with favor on his humble servant.\nFrom this day all generations will call me blessed:\nthe Almighty has done great things for me,\nand holy is his Name.\nHe has mercy on those who fear him\nin every generation.\nHe has shown the strength of his arm,\nhe has scattered the proud in their conceit.\nHe has cast down the mighty from their thrones,\nand has lifted up the humble.\nHe has filled the hungry with good things,\nand the rich he has sent away empty.\nHe has come to the help of his servant Israel\nfor he has remembered his promise of mercy,\nthe promise he made to our fathers,\nto Abraham and his children for ever.\nAmen.`,
  pt:`A minha alma glorifica o Senhor,\ne o meu espírito exulta em Deus, meu Salvador!\nPorque ele olhou para a humildade de sua serva.\nDoravante todas as gerações me chamarão bem-aventurada,\nporque o Todo-Poderoso fez grandes coisas em meu favor.\nSeu nome é santo,\ne sua misericórdia se estende de geração em geração\nsobre aqueles que o temem.\nMostrou o poder do seu braço,\ndispersou os orgulhosos em seus pensamentos.\nDerrubou os poderosos de seus tronos\ne exaltou os humildes.\nEncheu de bens os famintos\ne despediu os ricos com as mãos vazias.\nAmparou Israel, seu servo,\nlembrado da sua misericórdia —\ncomo tinha prometido a nossos pais —\nem favor de Abraão e de seus descendentes para sempre.\nAmém.`,
  la:`Magnificat anima mea Dominum,\net exsultavit spiritus meus\nin Deo salutari meo.\nQua respexit humilitatem ancillae suae;\necce enim ex hoc beatam me dicent\nomnes generationes.\nQua fecit mihi magna qui potens est,\net sanctum nomen eius,\net misericordia eius in progenies et progenies\ntimentibus eum.\nFecit potentiam in brachio suo,\ndispersit superbos mente cordis sui.\nDeposuit potentes de sede\net exaltavit humiles.\nEsurientes implevit bonis\net divites dimisit inanes.\nSuscepit Israel puerum suum,\nrecordatus misericordiae suae,\nsicut locutus est ad patres nostros,\nAbraham et semini eius in saecula.\nAmen.`}},

{id:21,cat:'marian',
 title:{en:'Sub Tuum Praesidium',pt:'Sob Vossa Proteção',la:'Sub Tuum Praesidium'},
 text:{
  en:`We fly to your protection,\nO Holy Mother of God;\ndo not despise our petitions\nin our necessities,\nbut deliver us always\nfrom all dangers,\nO glorious and blessed Virgin.\nAmen.`,
  pt:`Sob vossa proteção nos acolhemos,\nSanta Mãe de Deus;\nnão desprezeis as nossas súplicas\nem nossas necessidades,\nmas livrai-nos sempre\nde todos os perigos,\nó Virgem gloriosa e bendita.\nAmém.`,
  la:`Sub tuum praesidium confugimus,\nSancta Dei Genitrix;\nnostras deprecationes ne despicias\nin necessitatibus,\nsed a periculis cunctis\nlibera nos semper,\nVirgo gloriosa et benedicta.\nAmen.`}},

{id:22,cat:'marian',
 title:{en:'Prayer to Our Lady of Fatima',pt:'Oração a Nossa Senhora de Fátima',la:'Ad Dominam Nostram Fatimensis'},
 text:{
  en:`O Most Holy Virgin Mary, Queen of the Most Holy Rosary,\nyou were pleased to appear to the children of Fatima\nand reveal a glorious message.\nWe implore you, inspire in our hearts\na fervent love for the recitation of the Rosary.\nBy meditating on its mysteries\nmay we receive its fruits\nand obtain peace for the world,\nthe conversion of sinners,\nand the favor we ask of you.\nAmen.`,
  pt:`Ó Santíssima Virgem Maria, Rainha do Santo Rosário,\nvós que vos dignastes aparecer em Fátima\ne revelar a três pastorinhos ricas mensagens do Céu;\nolhai misericordiosa para nossa súplica\ne acendei em nossos corações\no amor fervoroso da oração do Rosário.\nPela meditação dos seus mistérios\nalcançai-nos frutos de graça\nna cura de todos os males que afligem o mundo,\na conversão dos pecadores\ne o favor especial que te pedimos.\nAmém.`,
  la:`O Sanctissima Virgo Maria,\nRegina Sanctissimi Rosarii,\nquae in Fatima apparere dignata es\net tribus pastoribus\nmessagium caeleste revelare:\nrespectu nostrae supplicationis\namoris fervorem Rosarii\nin cordibus nostris accende.\nPer illius mysteria considerando\ngratiae fructus nobis impetres\npro mundi salute\npeccatorumque conversione.\nAmen.`}},

{id:23,cat:'marian',
 title:{en:'Prayer to Our Lady of Guadalupe',pt:'Oração a Nossa Senhora de Guadalupe',la:'Ad Dominam Nostram Guadalupensem'},
 text:{
  en:`Our Lady of Guadalupe,\nmystical rose,\nmake intercession for holy Church,\nprotect the Sovereign Pontiff,\nhelp all those who invoke thee\nin their necessities,\nand since thou art the ever-Virgin Mary\nand Mother of the true God,\nobtain for us from thy most holy Son\nthe grace of keeping our faith,\nsweet hope in the midst of the bitterness of life,\nburing charity, and the precious gift of final perseverance.\nAmen.`,
  pt:`Nossa Senhora de Guadalupe,\nrosa mística,\nintercedei pela Santa Igreja,\nprotegei o Soberano Pontífice,\najudai todos quantos vos invocam\nnecessidades,\ne como sois a sempre Virgem Maria\ne Mãe do verdadeiro Deus,\nobtendes de vosso Santíssimo Filho\na graça de conservarmos a fé,\na doce esperança no meio das amarguras da vida,\na caridade ardente\ne o precioso dom da perseverança final.\nAmém.`,
  la:`Domina Nostra Guadalupensis,\nrosa mystica,\npro sancta Ecclesia intercede,\nSummum Pontificem protege,\nomnibus te invocantibus in necessitatibus succurre;\nquoniam tu es semper Virgo Maria\net Mater veri Dei,\na Filio tuo Sanctissimo nobis impetres\ngratiam fidei servandae,\ndulcis spei in amaritudinibus vitae,\ncaritatem ardentem\net donum perseverantiae finalis.\nAmen.`}},

{id:24,cat:'marian',
 title:{en:"Three Hail Mary's",pt:'Três Ave-Marias',la:'Tres Ave Mariae'},
 text:{
  en:`O Mary, my Mother, I offer you\nthese three Hail Marys in honor of\nthe great privilege which God gave you\nin making you the Immaculate Virgin.\nGuard and protect my purity of soul and body.\nAve Maria (×3)`,
  pt:`Ó Maria, minha Mãe, ofereço-te\nestas três Ave-Marias em honra\ndo grande privilégio que Deus te concedeu\nao te fazer Virgem Imaculada.\nGuarda e protege a minha pureza de alma e de corpo.\nAve Maria (×3)`,
  la:`O Maria, Mater mea, tibi offero\nhas tres Ave Marias in honorem\nmagni privilegii quod Deus tibi contulit\nte Virginem Immaculatam faciendo.\nPuritatem animae et corporis mei\ncustodi et protege.\nAve Maria (×3)`}},

{id:25,cat:'marian',
 title:{en:'Consecration to Mary',pt:'Consagração a Maria',la:'Consecratio Mariae'},
 text:{
  en:`O Virgin Mary, my Mother,\nI consecrate myself to your Immaculate Heart\nwith all that I am and all that I have.\nReceive my heart, receive my soul,\nmy thoughts, my words, my actions,\nmy joys and my sorrows.\nLead me ever closer to your Son Jesus.\nAmen.`,
  pt:`Ó Virgem Maria, Minha Mãe,\nconsagro-me ao Vosso Coração Imaculado\ncom tudo o que sou e tudo o que tenho.\nRecebei meu coração, recebei minha alma,\nmeus pensamentos, minhas palavras, minhas ações,\nminhas alegrias e meus sofrimentos.\nConduzis-me sempre mais perto de Vosso Filho Jesus.\nAmém.`,
  la:`O Virgo Maria, Mater mea,\nCordi tuo Immaculato me consecro\ncum omnibus quae sum et quae habeo.\nCor meum recipe, animam meam recipe,\ncogitata, verba, opera mea,\ngaudia et dolores meos.\nMe semper propius ad Filium tuum Iesum duc.\nAmen.`}},

{id:26,cat:'marian',
 title:{en:'Litany of the Blessed Virgin (excerpt)',pt:'Ladainha de Nossa Senhora (excerto)',la:'Litaniae Lauretanae (pars)'},
 text:{
  en:`Lord, have mercy.\nChrist, have mercy.\nLord, have mercy.\nChrist, hear us.\nChrist, graciously hear us.\n\nHoly Mary — pray for us.\nHoly Mother of God — pray for us.\nHoly Virgin of virgins — pray for us.\nMother of Christ — pray for us.\nMother of divine grace — pray for us.\nMother most pure — pray for us.\nMother most chaste — pray for us.\nMother inviolate — pray for us.\nMother undefiled — pray for us.\nMother most amiable — pray for us.\nMother most admirable — pray for us.\nMother of good counsel — pray for us.\nMother of our Creator — pray for us.\nMother of our Savior — pray for us.\nVirgin most prudent — pray for us.\nQueen of Angels — pray for us.\nQueen of Saints — pray for us.\nQueen of Peace — pray for us.\n\nLamb of God, who takes away the sins of the world — spare us, O Lord.\nLamb of God, who takes away the sins of the world — graciously hear us, O Lord.\nLamb of God, who takes away the sins of the world — have mercy on us.\nAmen.`,
  pt:`Senhor, tende piedade de nós.\nCristo, tende piedade de nós.\nSenhor, tende piedade de nós.\nCristo, ouvi-nos.\nCristo, escutai-nos com bondade.\n\nSanta Maria — rogai por nós.\nSanta Mãe de Deus — rogai por nós.\nSanta Virgem das Virgens — rogai por nós.\nMãe de Cristo — rogai por nós.\nMãe da Graça Divina — rogai por nós.\nMãe Puríssima — rogai por nós.\nMãe Castíssima — rogai por nós.\nMãe Inviolada — rogai por nós.\nMãe Imaculada — rogai por nós.\nMãe Amabilíssima — rogai por nós.\nMãe Admirável — rogai por nós.\nMãe do Bom Conselho — rogai por nós.\nMãe do Criador — rogai por nós.\nMãe do Salvador — rogai por nós.\nVirgem Prudentíssima — rogai por nós.\nRainha dos Anjos — rogai por nós.\nRainha dos Santos — rogai por nós.\nRainha da Paz — rogai por nós.\n\nCordeiro de Deus, que tirais o pecado do mundo — poupai-nos, Senhor.\nCordeiro de Deus, que tirais o pecado do mundo — escutai-nos com bondade, Senhor.\nCordeiro de Deus, que tirais o pecado do mundo — tende piedade de nós.\nAmém.`,
  la:`Kyrie eleison.\nChriste eleison.\nKyrie eleison.\nChriste audi nos.\nChriste exaudi nos.\n\nSancta Maria — ora pro nobis.\nSancta Dei Genitrix — ora pro nobis.\nSancta Virgo Virginum — ora pro nobis.\nMater Christi — ora pro nobis.\nMater Divinae Gratiae — ora pro nobis.\nMater purissima — ora pro nobis.\nMater castissima — ora pro nobis.\nMater inviolata — ora pro nobis.\nMater intemerata — ora pro nobis.\nMater amabilis — ora pro nobis.\nMater admirabilis — ora pro nobis.\nMater boni consilii — ora pro nobis.\nMater Creatoris — ora pro nobis.\nMater Salvatoris — ora pro nobis.\nVirgo prudentissima — ora pro nobis.\nRegina Angelorum — ora pro nobis.\nRegina Sanctorum omnium — ora pro nobis.\nRegina pacis — ora pro nobis.\n\nAgnus Dei, qui tollis peccata mundi — parce nobis, Domine.\nAgnus Dei, qui tollis peccata mundi — exaudi nos, Domine.\nAgnus Dei, qui tollis peccata mundi — miserere nobis.\nAmen.`}},

{id:27,cat:'mass',
 title:{en:'Kyrie Eleison',pt:'Senhor, Tende Piedade',la:'Kyrie Eleison'},
 text:{
  en:`Lord, have mercy. Lord, have mercy.\nChrist, have mercy. Christ, have mercy.\nLord, have mercy. Lord, have mercy.`,
  pt:`Senhor, tende piedade. Senhor, tende piedade.\nCristo, tende piedade. Cristo, tende piedade.\nSenhor, tende piedade. Senhor, tende piedade.`,
  la:`Kyrie eleison. Kyrie eleison.\nChriste eleison. Christe eleison.\nKyrie eleison. Kyrie eleison.`}},

{id:28,cat:'mass',
 title:{en:'Gloria (Mass)',pt:'Glória (Missa)',la:'Gloria in Excelsis'},
 text:{
  en:`Glory to God in the highest,\nand on earth peace to people of good will.\nWe praise you,\nwe bless you,\nwe adore you,\nwe glorify you,\nwe give you thanks for your great glory,\nLord God, heavenly King,\nO God, almighty Father.\nLord Jesus Christ, Only Begotten Son,\nLord God, Lamb of God, Son of the Father,\nyou take away the sins of the world, have mercy on us;\nyou take away the sins of the world, receive our prayer;\nyou are seated at the right hand of the Father,\nhave mercy on us.\nFor you alone are the Holy One,\nyou alone are the Lord,\nyou alone are the Most High, Jesus Christ,\nwith the Holy Spirit,\nin the glory of God the Father.\nAmen.`,
  pt:`Glória a Deus nas alturas\ne paz na terra aos homens que ele ama.\nSeñor Deus, Rei dos céus,\nDeus Pai todo-poderoso,\nnós Vos louvamos, nós Vos bendizemos,\nnós Vos adoramos, nós Vos glorificamos,\nnós Vos damos graças por Vossa imensa glória.\nSenhor Jesus Cristo, Filho Unigênito,\nSenhor Deus, Cordeiro de Deus, Filho do Pai!\nVós que tirais o pecado do mundo,\ntende piedade de nós;\nVós que tirais o pecado do mundo,\nacolhei a nossa súplica;\nVós que estais à direita do Pai,\ntende piedade de nós.\nPois só Vós sois o Santo,\nsó Vós, o Senhor,\nsó Vós, o Altíssimo, Jesus Cristo,\ncom o Espírito Santo,\nna glória de Deus Pai.\nAmém.`,
  la:`Gloria in excelsis Deo\net in terra pax hominibus bonae voluntatis.\nLaudamus te,\nbenedicimus te,\nadoramus te,\nglorificamus te,\ngratias agimus tibi propter magnam gloriam tuam,\nDomine Deus, Rex caelestis,\nDeus Pater omnipotens.\nDomine Fili unigenite, Iesu Christe,\nDomine Deus, Agnus Dei, Filius Patris,\nqui tollis peccata mundi, miserere nobis;\nqui tollis peccata mundi, suscipe deprecationem nostram;\nqui sedes ad dexteram Patris, miserere nobis.\nQuoniam tu solus Sanctus,\ntu solus Dominus,\ntu solus Altissimus, Iesu Christe,\ncum Sancto Spiritu,\nin gloria Dei Patris.\nAmen.`}},

{id:29,cat:'mass',
 title:{en:'Sanctus',pt:'Santo',la:'Sanctus'},
 text:{
  en:`Holy, Holy, Holy Lord God of hosts.\nHeaven and earth are full of your glory.\nHosanna in the highest.\nBlessed is he who comes in the name of the Lord.\nHosanna in the highest.`,
  pt:`Santo, Santo, Santo, Senhor, Deus do universo!\nOs céus e a terra proclamam a Vossa glória.\nHosana nas alturas!\nBendito o que vem em nome do Senhor.\nHosana nas alturas!`,
  la:`Sanctus, Sanctus, Sanctus\nDominus Deus Sabaoth.\nPleni sunt caeli et terra gloria tua.\nHosanna in excelsis.\nBenedictus qui venit in nomine Domini.\nHosanna in excelsis.`}},

{id:30,cat:'mass',
 title:{en:'Agnus Dei',pt:'Cordeiro de Deus',la:'Agnus Dei'},
 text:{
  en:`Lamb of God, you take away the sins of the world,\nhave mercy on us.\nLamb of God, you take away the sins of the world,\nhave mercy on us.\nLamb of God, you take away the sins of the world,\ngrant us peace.`,
  pt:`Cordeiro de Deus, que tirais o pecado do mundo,\ntende piedade de nós.\nCordeiro de Deus, que tirais o pecado do mundo,\ntende piedade de nós.\nCordeiro de Deus, que tirais o pecado do mundo,\ndai-nos a paz.`,
  la:`Agnus Dei, qui tollis peccata mundi,\nmiserere nobis.\nAgnus Dei, qui tollis peccata mundi,\nmiserere nobis.\nAgnus Dei, qui tollis peccata mundi,\ndona nobis pacem.`}},

{id:31,cat:'mass',
 title:{en:'Lord, I Am Not Worthy',pt:'Senhor, Não Sou Digno',la:'Domine, Non Sum Dignus'},
 text:{
  en:`Lord, I am not worthy\nthat you should enter under my roof,\nbut only say the word\nand my soul shall be healed.`,
  pt:`Senhor, não sou digno\nde que entreis em minha morada,\nmas dizei uma só palavra\ne serei salvo.`,
  la:`Domine, non sum dignus,\nut intres sub tectum meum;\nsed tantum dic verbo,\net sanabitur anima mea.`}},

{id:32,cat:'mass',
 title:{en:'Prayer After Communion',pt:'Ação de Graças após a Comunhão',la:'Post Communionem Gratiarum Actio'},
 text:{
  en:`Lord Jesus Christ,\nlet this holy Communion\nnot be for me a reason for condemnation,\nbut let it be for me\na saving remedy for soul and body.\nMay I always cleave to your commandments\nand never be separated from you.\nAmen.`,
  pt:`Senhor Jesus Cristo,\nfaz que esta Sagrada Comunhão\nnão seja para mim ocasião de condenação,\nmas remédio salutar\npara a alma e para o corpo.\nFaze com que eu me una sempre\naos Teus mandamentos\ne jamais me separe de Ti.\nAmém.`,
  la:`Domine Iesu Christe,\nhoc Sanctissimum Sacramentum\nnon sit mihi in iudicium,\nsed pro salute animae et corporis.\nSemper tibi adhaeream\nnec a te separar.\nAmen.`}},

{id:33,cat:'mass',
 title:{en:'Collect for Peace (Mass)',pt:'Coleta pela Paz',la:'Collecta pro Pace'},
 text:{
  en:`O God, from whom all holy desires,\nall good counsels, and all just works do proceed,\ngive to Thy servants that peace\nwhich the world cannot give;\nthat our hearts may be set to obey Thy commandments,\nand also that by Thee\nwe, being defended from the fear of our enemies,\nmay pass our time in rest and quietness.\nThrough Jesus Christ our Lord.\nAmen.`,
  pt:`Ó Deus, de quem procedem\ntodos os santos desejos,\ntodos os retos propósitos\ne todas as obras justas:\ndai aos Vossos servos aquela paz\nque o mundo não pode dar;\nfazei que nossos corações obedeçam\naos Vossos mandamentos\ne que, livres do temor dos inimigos,\npossamos viver em paz e tranquilidade.\nPor Jesus Cristo nosso Senhor.\nAmém.`,
  la:`Deus, a quo sancta desideria,\nrecta consilia et iusta sunt opera,\nda servis tuis illam,\nquam mundus dare non potest, pacem;\nut et corda nostra mandatis tuis dedita\net, hostium sublata formidine,\ntempora sint tua protectione tranquilla.\nPer Iesum Christum Dominum nostrum.\nAmen.`}},

// ── ACTS OF VIRTUE ──────────────────────────────────────────────────
{id:34,cat:'virtue',
 title:{en:'Act of Faith',pt:'Ato de Fé',la:'Actus Fidei'},
 text:{
  en:`O my God, I firmly believe\nthat Thou art one God in three Divine Persons,\nFather, Son, and Holy Spirit.\nI believe that Thy Divine Son became man\nand died for our sins,\nand that He will come to judge the living and the dead.\nI believe these and all the truths\nwhich the Holy Catholic Church teaches,\nbecause Thou hast revealed them,\nwho canst neither deceive nor be deceived.\nAmen.`,
  pt:`Meu Deus, creio firmemente\ntudo quanto a Santa Igreja Católica crê e ensina,\nporque Vós, que sois a verdade que não pode enganar nem ser enganada,\nrevelastes tudo isso à vossa Igreja.\nCreio em especial que sois\ntres Pessoas distintas num só Deus;\nque o Filho de Deus se fez homem,\nmorreu por nossos pecados\ne ressuscitou e há de vir julgar os vivos e os mortos.\nAmém.`,
  la:`O Deus meus, firmiter credo\nte esse unum Deum in tribus Personis divinis,\nPatrem, Filium et Spiritum Sanctum.\nCredo Filium Dei divinum factum esse hominem\nmortemque pro peccatis nostris oppetiisse;\neumque venturum esse ad iudicandos vivos et mortuos.\nHaec omnia et quidquid sancta Ecclesia catholica\ndocet, firmiter credo,\nquia tu id revelasti, qui falli nec fallere potes.\nAmen.`}},

{id:35,cat:'virtue',
 title:{en:'Act of Hope',pt:'Ato de Esperança',la:'Actus Spei'},
 text:{
  en:`O Lord God, I hope by Thy grace\nfor the pardon of all my sins\nand after this life to attain everlasting happiness,\nfor Thou hast promised it\nwho art infinitely powerful, faithful, kind,\nand merciful.\nIn this hope I intend to live and die.\nAmen.`,
  pt:`Meu Deus, espero, com plena confiança,\nalcançar, por Vossa graça e misericórdia,\nperdão dos meus pecados\ne a vida eterna que Vós prometestes,\npor meio de Jesus Cristo Nosso Senhor,\na todos aqueles que praticam\no bem nesta vida.\nAmém.`,
  la:`O Domine Deus, spero per gratiam tuam\nremissionem omnium peccatorum meorum\net post hanc vitam aeternam felicitatem,\nquia tu promisisti,\nqui es infinite potens, fidelis, benignus\net misericors.\nIn hac spe vivere et mori intendo.\nAmen.`}},

{id:36,cat:'virtue',
 title:{en:'Act of Charity',pt:'Ato de Caridade',la:'Actus Caritatis'},
 text:{
  en:`O Lord God, I love Thee\nabove all things\nand I love my neighbor for the love of Thee\nbecause Thou art the highest, infinite, and perfect Good,\nworthy of all my love.\nIn this love I intend to live and die.\nAmen.`,
  pt:`Meu Deus, amo-Vos sobre todas as coisas,\npelo que sois em Si mesmo\ne porque sois o infinito Bem\ne o nosso eterno Prêmio.\nAmo também o meu próximo\ncomo a mim mesmo por amor de Vós.\nAmém.`,
  la:`O Domine Deus, amo te\nsuper omnia\net proximum meum propter te diligo,\nquia tu es summum, infinitum et perfectum Bonum,\nomnium amore dignissimum.\nIn hoc amore vivere et mori propono.\nAmen.`}},

{id:37,cat:'virtue',
 title:{en:'Act of Adoration',pt:'Ato de Adoração',la:'Actus Adorationis'},
 text:{
  en:`O my God, I adore Thee\nas my Creator, my Lord, and my Sovereign Good.\nI adore Thee with all my heart,\nwith all my soul, with all my strength.\nI acknowledge Thee as the source of all being,\nall truth, and all goodness.\nTo Thee be honor and glory for ever.\nAmen.`,
  pt:`Ó meu Deus, prostro-me diante de Vós\ne Vos adoro como meu Criador,\nmeu Senhor e meu Soberano Bem.\nAdoro-Vos de todo o coração,\ncom toda a minha alma e todas as minhas forças.\nReconheço-Vos como a fonte de todo ser,\nde toda verdade e de toda bondade.\nA Vós seja honra e glória para sempre.\nAmém.`,
  la:`O Deus meus, te adoro\nut Creatorem meum, Dominum et summum Bonum.\nTe toto corde, tota anima,\ntotis viribus adoro.\nTe agnosco fontem omnis esse,\nomnis veritatis et omnis bonitatis.\nTibi honor et gloria in saecula.\nAmen.`}},

{id:38,cat:'virtue',
 title:{en:'Act of Thanksgiving',pt:'Ato de Ação de Graças',la:'Actus Gratiarum Actionis'},
 text:{
  en:`O my God, I thank You\nfor all the benefits You have granted me,\nfor the life You have given me,\nfor the creation of my soul,\nfor my Redemption, and for all Your gifts.\nWith all my heart I thank You\nfor all things seen and unseen,\nknown and unknown.\nAmen.`,
  pt:`Ó meu Deus, dou-Vos graças\npor todos os benefícios que me concedestes,\npela vida que me destes,\npela criação de minha alma,\npela Redenção e por todos os Vossos dons.\nDe todo o coração Vos agradeço\npor todas as coisas,\nvisíveis e invisíveis, sabidas e ignoradas.\nAmém.`,
  la:`O Deus meus, tibi gratias ago\npro omnibus beneficiis mihi conlatis,\npro vita mihi data,\npro creatione animae meae,\npro Redemptione omnibusque donis tuis.\nEx toto corde tibi gratias ago\npro omnibus rebus visibilibus et invisibilibus,\nnotis et ignotis.\nAmen.`}},

{id:39,cat:'virtue',
 title:{en:'Act of Humility',pt:'Ato de Humildade',la:'Actus Humilitatis'},
 text:{
  en:`O Lord, grant me the grace of humility,\nthat I may know myself as I truly am\nbefore Your infinite greatness.\nLet me never think more highly of myself\nthan I ought to think,\nbut let me think soberly\naccording to the measure of faith\nYou have given me.\nAmen.`,
  pt:`Senhor, concedei-me a graça da humildade,\npara que eu me conheça como verdadeiramente sou\ndiante de Vossa grandeza infinita.\nNão me deixeis pensar de mim\nmais do que devo pensar,\nmas fazei que pense de mim\ncomo convém, com sobriedade,\nconforme a medida da fé\nque me concedestes.\nAmém.`,
  la:`Domine, da mihi gratiam humilitatis,\nut me ipsam cognoscam\nprout vere sum coram tua infinita maiestate.\nNe altius de me sentiam\nquam oportet sentire,\nsed sentiam ut sobrie cogitem,\niuxta mensuram fidei\nquam dedisti mihi.\nAmen.`}},

{id:40,cat:'virtue',
 title:{en:'Act of Oblation (St. Ignatius)',pt:'Suscipe (Santo Inácio)',la:'Suscipe'},
 text:{
  en:`Take, Lord, and receive all my liberty,\nmy memory, my understanding,\nand my entire will,\nall that I have and all that I possess.\nThou hast given all to me;\nto Thee, O Lord, I return it.\nAll is Thine, dispose of it\nwholly according to Thy will.\nGive me only Thy love and Thy grace,\nfor that is enough for me.\nAmen.`,
  pt:`Tomai, Senhor, e recebei\ntoda a minha liberdade,\nminha memória, meu entendimento\ne toda a minha vontade,\ntudo o que tenho e possuo.\nVós mo destes; a Vós, Senhor, o torno.\nTudo é Vosso; disponde a Vosso inteiro bel-prazer.\nDai-me somente o Vosso amor e graça,\nque isso me basta.\nAmém.`,
  la:`Suscipe, Domine, universam meam libertatem,\nmemoriam, intellectum atque voluntatem omnem.\nQuidquid habeo vel possideo mihi largitus es;\nid tibi totum restituo\nac tuae prorsus voluntati trado gubernandum.\nAmorem tui solum cum gratia tua mihi dones,\net dives sum satis, nec aliud quidquam ultra posco.\nAmen.`}},

{id:41,cat:'virtue',
 title:{en:'Anima Christi',pt:'Anima Christi',la:'Anima Christi'},
 text:{
  en:`Soul of Christ, sanctify me.\nBody of Christ, save me.\nBlood of Christ, inebriate me.\nWater from the side of Christ, wash me.\nPassion of Christ, strengthen me.\nO good Jesus, hear me.\nWithin Thy wounds, hide me.\nSeperate me not from Thee.\nFrom the wicked foe, defend me.\nAt the hour of my death, call me\nand bid me come to Thee,\nthat with Thy saints I may praise Thee\nfor ever and ever.\nAmen.`,
  pt:`Alma de Cristo, santifica-me.\nCorpo de Cristo, salva-me.\nSangue de Cristo, inebria-me.\nÁgua do lado de Cristo, purifica-me.\nPaixão de Cristo, fortifica-me.\nÓ bom Jesus, ouvi-me.\nNas Tuas chagas, esconde-me.\nNão me deixes separar de Ti.\nDo inimigo maldoso, defende-me.\nNa hora da minha morte, chama-me\ne manda-me ir a Ti,\npara que com os Teus santos Te louvarei\npor todos os séculos dos séculos.\nAmém.`,
  la:`Anima Christi, sanctifica me.\nCorpus Christi, salva me.\nSanguis Christi, inebria me.\nAqua lateris Christi, lava me.\nPassio Christi, conforta me.\nO bone Iesu, exaudi me.\nIntra tua vulnera absconde me.\nNe permittas me separari a te.\nAb hoste maligno defende me.\nIn hora mortis meae voca me\net iube me venire ad te,\nut cum Sanctis tuis laudem te\nin saecula saeculorum.\nAmen.`}},

// ── ROSARY ──────────────────────────────────────────────────────────
{id:42,cat:'rosary',
 title:{en:'Opening Prayer of the Rosary',pt:'Oração Inicial do Rosário',la:'Initium Rosarii'},
 text:{
  en:`O God, whose only begotten Son,\nby His life, death, and resurrection,\nhas purchased for us the rewards of eternal salvation,\ngrant, we beseech Thee,\nthat meditating on these mysteries\nof the Most Holy Rosary of the Blessed Virgin Mary,\nwe may imitate what they contain\nand obtain what they promise.\nThrough Christ our Lord.\nAmen.`,
  pt:`Ó Deus, Vosso Filho Unigênito,\npela Sua Vida, Morte e Ressurreição,\nnos mereceu a graça da salvação eterna.\nConcedei-nos, pedimos,\nque meditando nos mistérios\ndo Santíssimo Rosário da Virgem Maria,\npossamos imitar o que eles contêm\ne alcançar o que prometem.\nPelo mesmo Cristo Nosso Senhor.\nAmém.`,
  la:`Deus, cuius unigenitus Filius\nper vitam, mortem et resurrectionem suam\nnobis salutis aeternae praemia comparavit,\nconcede, quaesumus,\nut haec mysteria sanctissimo\nBeatae Virginis Mariae Rosario recolentes,\net imitemur quod continent\net quod promittunt assequamur.\nPer Christum Dominum nostrum.\nAmen.`}},

{id:43,cat:'rosary',
 title:{en:'Fatima Prayer',pt:'Oração de Fátima',la:'Oratio Fatimensis'},
 text:{
  en:`O my Jesus, forgive us our sins,\nsave us from the fires of hell.\nLead all souls to Heaven,\nespecially those most in need of Your Mercy.\nAmen.`,
  pt:`Ó meu Jesus, perdoai-nos,\nlivrai-nos do fogo do inferno,\nlevai as almas todas para o Céu,\nespecialmente as que mais precisarem de Vossa misericórdia.\nAmém.`,
  la:`O mi Iesu, dimitte nobis debita nostra,\nlibera nos ab igne inferni,\naduc in caelum omnes animas,\npraesertim eas quae misericordiae tuae maxime indigent.\nAmen.`}},

{id:44,cat:'rosary',
 title:{en:'Joyful Mysteries Intention',pt:'Mistérios Gaudosos',la:'Mysteria Gaudiosa'},
 text:{
  en:`The Five Joyful Mysteries:\n1. The Annunciation\n2. The Visitation\n3. The Nativity\n4. The Presentation in the Temple\n5. The Finding in the Temple\n\nWe offer these Joyful Mysteries\nin honor of the Incarnation of Our Lord\nand the joys of the Blessed Virgin Mary.\nMay they increase in us the virtue of humility.\nAmen.`,
  pt:`Os Cinco Mistérios Gaudosos:\n1. A Anunciação\n2. A Visitação\n3. O Nascimento de Jesus\n4. A Apresentação no Templo\n5. O Encontro do Menino Jesus no Templo\n\nOfertamos estes Mistérios Gaudosos\nem honra da Encarnação de Nosso Senhor\ne das alegrias da Virgem Maria.\nAlcancem-nos a virtude da humildade.\nAmém.`,
  la:`Quinque Mysteria Gaudiosa:\n1. Annuntiatio\n2. Visitatio\n3. Nativitas\n4. Praesentatio in Templo\n5. Inventio in Templo\n\nHaec Mysteria Gaudiosa offerimus\nin honorem Incarnationis Domini nostri\net gaudiorum Beatae Virginis Mariae.\nVirtutem humilitatis in nobis augant.\nAmen.`}},

{id:45,cat:'rosary',
 title:{en:'Sorrowful Mysteries Intention',pt:'Mistérios Dolorosos',la:'Mysteria Dolorosa'},
 text:{
  en:`The Five Sorrowful Mysteries:\n1. The Agony in the Garden\n2. The Scourging at the Pillar\n3. The Crowning with Thorns\n4. The Carrying of the Cross\n5. The Crucifixion\n\nWe offer these Sorrowful Mysteries\nin honor of the Passion of Our Lord Jesus Christ.\nMay they increase in us the virtue of contrition.\nAmen.`,
  pt:`Os Cinco Mistérios Dolorosos:\n1. A Agonia no Horto das Oliveiras\n2. A Flagelação\n3. A Coroação de Espinhos\n4. Carregar a Cruz\n5. A Crucificação\n\nOfertamos estes Mistérios Dolorosos\nem honra da Paixão de Nosso Senhor Jesus Cristo.\nAlcancem-nos a virtude da contrição.\nAmém.`,
  la:`Quinque Mysteria Dolorosa:\n1. Agonia in Horto\n2. Flagellatio\n3. Coronatio Spinis\n4. Baiulatio Crucis\n5. Crucifixio\n\nHaec Mysteria Dolorosa offerimus\nin honorem Passionis Domini nostri Iesu Christi.\nVirtutem contritionis in nobis augant.\nAmen.`}},

{id:46,cat:'rosary',
 title:{en:'Glorious Mysteries Intention',pt:'Mistérios Gloriosos',la:'Mysteria Gloriosa'},
 text:{
  en:`The Five Glorious Mysteries:\n1. The Resurrection\n2. The Ascension\n3. The Descent of the Holy Spirit\n4. The Assumption of Mary\n5. The Coronation of Mary\n\nWe offer these Glorious Mysteries\nin honor of the Resurrection of Our Lord\nand the glory of the Blessed Virgin Mary.\nMay they increase in us the virtue of faith.\nAmen.`,
  pt:`Os Cinco Mistérios Gloriosos:\n1. A Ressurreição\n2. A Ascensão\n3. A Vinda do Espírito Santo\n4. A Assunção de Maria\n5. A Coroação de Maria\n\nOfertamos estes Mistérios Gloriosos\nem honra da Ressurreição de Nosso Senhor\ne da glória da Virgem Maria.\nAlcancem-nos a virtude da fé.\nAmém.`,
  la:`Quinque Mysteria Gloriosa:\n1. Resurrectio\n2. Ascensio\n3. Adventus Spiritus Sancti\n4. Assumptio Mariae\n5. Coronatio Mariae\n\nHaec Mysteria Gloriosa offerimus\nin honorem Resurrectionis Domini nostri\net gloriae Beatae Virginis Mariae.\nVirtutem fidei in nobis augant.\nAmen.`}},

{id:47,cat:'rosary',
 title:{en:'Luminous Mysteries Intention',pt:'Mistérios Luminosos',la:'Mysteria Luminosa'},
 text:{
  en:`The Five Luminous Mysteries:\n1. The Baptism in the Jordan\n2. The Wedding at Cana\n3. The Proclamation of the Kingdom\n4. The Transfiguration\n5. The Institution of the Eucharist\n\nWe offer these Luminous Mysteries\nin honor of the public life of Our Lord Jesus Christ.\nMay they increase in us the virtue of hope.\nAmen.`,
  pt:`Os Cinco Mistérios Luminosos:\n1. O Batismo no Jordão\n2. As Bodas de Caná\n3. O Anúncio do Reino\n4. A Transfiguração\n5. A Instituição da Eucaristia\n\nOfertamos estes Mistérios Luminosos\nem honra da vida pública de Nosso Senhor Jesus Cristo.\nAlcancem-nos a virtude da esperança.\nAmém.`,
  la:`Quinque Mysteria Luminosa:\n1. Baptismus in Iordane\n2. Nuptiae Canenses\n3. Proclamatio Regni\n4. Transfiguratio\n5. Institutio Eucharistiae\n\nHaec Mysteria Luminosa offerimus\nin honorem vitae publicae Domini nostri Iesu Christi.\nVirtutem spei in nobis augant.\nAmen.`}},

{id:48,cat:'rosary',
 title:{en:'Divine Mercy Chaplet',pt:'Coroa da Misericórdia Divina',la:'Corona Divinae Misericordiae'},
 text:{
  en:`Begin with: Our Father, Hail Mary, Apostles' Creed\n\nFor each group of ten:\nOn the Our Father beads:\n"Eternal Father, I offer you the Body and Blood,\nSoul and Divinity of Your dearly beloved Son,\nour Lord Jesus Christ,\nin atonement for our sins\nand those of the whole world."\n\nOn the Hail Mary beads:\n"For the sake of His sorrowful Passion,\nhave mercy on us and on the whole world."\n\nConclusion (3 times):\n"Holy God, Holy Mighty One,\nHoly Immortal One,\nhave mercy on us and on the whole world."\nAmen.`,
  pt:`Inicia com: Pai Nosso, Ave Maria, Credo\n\nPara cada dezena:\nNas contas do Pai Nosso:\n"Pai Eterno, ofereço-Vos o Corpo e Sangue,\nAlma e Divindade de Vosso Amabilíssimo Filho,\nNosso Senhor Jesus Cristo,\nem propiciação de nossos pecados\ne os do mundo inteiro."\n\nNas contas da Ave Maria:\n"Pelas dolorosas chagas de Jesus,\ntende misericórdia de nós e do mundo inteiro."\n\nConclusão (3 vezes):\n"Santo Deus, Santo Forte,\nSanto Imortal,\ntende misericórdia de nós e do mundo inteiro."\nAmém.`,
  la:`Incipe: Pater noster, Ave Maria, Symbolum\n\nPro quaque decada:\nIn granis Pater noster:\n"Pater aeterne, offero tibi Corpus et Sanguinem,\nAnimam et Divinitatem\nDilectissimi Filii tui,\nDomini nostri Iesu Christi,\nin expiatione peccatorum nostrorum\net totius mundi."\n\nIn granis Ave Maria:\n"Pro dolorosa eius Passione,\nmiserere nobis et totius mundi."\n\nConclusion (ter):\n"Sanctus Deus, Sanctus Fortis,\nSanctus Immortalis,\nmiserere nobis et totius mundi."\nAmen.`}},

// ── SAINTS ──────────────────────────────────────────────────────────
{id:49,cat:'saints',
 title:{en:'Prayer to St. Michael',pt:'Oração a São Miguel Arcanjo',la:'Ad Sanctum Michaelem'},
 text:{
  en:`Saint Michael the Archangel,\ndefend us in battle.\nBe our protection against the wickedness\nand snares of the devil.\nMay God rebuke him, we humbly pray;\nand do Thou, O Prince of the Heavenly Host,\nby the power of God,\ncast into hell Satan\nand all the evil spirits\nwho prowl throughout the world\nseeking the ruin of souls.\nAmen.`,
  pt:`São Miguel Arcanjo,\ndefendei-nos no combate,\nfazei-nos livres das ciladas\ne das armadilhas do demônio.\nImploramos a Deus que o submeta.\nE Vós, príncipe da milícia celestial,\npelao poder divino,\nprecipitai no inferno Satanás\ne os outros espíritos malignos\nque vagueiam pelo mundo\npara perdição das almas.\nAmém.`,
  la:`Sancte Michael Archangele,\ndefende nos in proelio;\ncontra nequitiam et insidias diaboli esto praesidium.\nImperet illi Deus, supplices deprecamur:\ntuque, Princeps militiae caelestis,\nSatanam aliosque spiritus malignos,\nqui ad perditionem animarum pervagantur in mundo,\ndivina virtute in infernum detrude.\nAmen.`}},

{id:50,cat:'saints',
 title:{en:'Prayer to St. Joseph',pt:'Oração a São José',la:'Ad Sanctum Iosephum'},
 text:{
  en:`O Blessed Joseph,\nhappy man, to whom it was given\nnot only to see and to hear that God\nwhom many a king had longed to see, yet saw not;\nto hear, yet heard not;\nbut also to carry Him in your arms,\nto embrace Him, to clothe Him,\nand guard and defend Him.\nPray for us, O Blessed Joseph,\nthat we may be made worthy\nof the promises of Christ.\nAmen.`,
  pt:`Ó São José bem-aventurado,\nfeliz varão a quem foi dado\nnão só ver e ouvir aquele Deus\nque tantos reis desejaram ver e não viram,\nouvir e não ouviram,\nmas também carregá-lo nos braços,\nabraçá-lo, vesti-lo\ne protegê-lo e guardá-lo.\nOrai por nós, São José,\npara que sejamos dignos\ndas promessas de Cristo.\nAmém.`,
  la:`O Ioseph beate,\nfelix homo, cui datum est\nnon solum Deum illum videre et audire,\nquem multi reges videre cupiverunt nec viderunt,\naudire nec audierunt,\nverum etiam in ulnis portare,\namplecti, vestire,\ncustodire et protegere.\nOra pro nobis, Sancte Ioseph,\nut digni efficiamur\npromissionibus Christi.\nAmen.`}},

{id:51,cat:'saints',
 title:{en:'Prayer to St. Francis',pt:'Oração de São Francisco',la:'Oratio Sancti Francisci'},
 text:{
  en:`Lord, make me an instrument of your peace:\nwhere there is hatred, let me sow love;\nwhere there is injury, pardon;\nwhere there is doubt, faith;\nwhere there is despair, hope;\nwhere there is darkness, light;\nand where there is sadness, joy.\n\nO Divine Master, grant that I may not\nso much seek to be consoled as to console,\nto be understood as to understand,\nto be loved as to love.\nFor it is in giving that we receive,\nit is in pardoning that we are pardoned,\nand it is in dying\nthat we are born to eternal life.\nAmen.`,
  pt:`Senhor, fazei-me instrumento de Vossa paz.\nOnde houver ódio, que eu leve o amor;\nonde houver ofensa, o perdão;\nonde houver discórdia, a union;\nonde houver dúvida, a fé;\nonde houver erro, a verdade;\nonde houver desespero, a esperança;\nonde houver tristeza, a alegria;\nonde houver trevas, a luz.\n\nMestre Divino, fazei que eu procure\nmais consolar do que ser consolado,\nmais compreender do que ser compreendido,\nmais amar do que ser amado.\nPois é dando que se recebe,\né perdoando que se é perdoado\ne é morrendo que se vive para a vida eterna.\nAmém.`,
