  la:`Domine Deus, qui omnia nova facis,\nda mihi gratiam de novo incipiendi.\nLibera me a pondere praeteritorum malorum,\nab amaritudine et paenitentia.\nNova spe cor meum imple\net proposito renovato animam meam.\nSicut quaeque aurora novam affert misericordiam,\nita haec dies me\npropius tibi et personae\nquam me esse vocas adducat.\nAmen.`}},

{id:118,cat:'daily',
 title:{en:'Prayer to the Holy Spirit for Guidance',pt:'Ao Espírito Santo por Orientação',la:'Ad Spiritum Sanctum Pro Directione'},
 text:{
  en:`Come, Holy Spirit,\nguide my thoughts, my words, and my actions today.\nHelp me to see with Your eyes,\nhear with Your ears,\nand love with Your heart.\nWhen I am uncertain, be my clarity.\nWhen I am afraid, be my courage.\nWhen I am weary, be my strength.\nLet everything I do today\ngive glory to the Father\nthrough the Son.\nAmen.`,
  pt:`Vinde, Espírito Santo,\nguiai meus pensamentos, minhas palavras e ações hoje.\nAjudai-me a ver com Vossos olhos,\nouvir com Vossos ouvidos\ne amar com Vosso coração.\nQuando estiver incerto, sedeis minha clareza.\nQuando estiver com medo, sedeis minha coragem.\nQuando estiver cansado, sedeis minha força.\nFazei que tudo o que eu faça hoje\ndê glória ao Pai\npor meio do Filho.\nAmém.`,
  la:`Veni, Sancte Spiritus,\ncogitata, verba et opera mea hodie dirige.\nAdiuva me oculis tuis videre,\nauribus tuis audire\net corde tuo amare.\nUbi incertus sum, sis claritas mea.\nUbi timeo, sis fortitudo mea.\nUbi fessus sum, sis robur meum.\nFac ut omnia quae hodie facio\nPatri gloriam dent\nper Filium.\nAmen.`}},

{id:119,cat:'rosary',
 title:{en:'Rosary for the Dead',pt:'Rosário pelos Defuntos',la:'Rosarium Pro Defunctis'},
 text:{
  en:`O God of mercy and compassion,\nwe offer this Rosary for the souls of the faithful departed,\nespecially those most forgotten and abandoned.\nBy the merits of Our Lord's Passion\nand the intercession of the Blessed Virgin Mary,\ngrant them rest from all their sufferings.\nMay the perpetual light shine upon them\nand may they rest in peace.\nAmen.\n\n(Pray the complete Rosary with this intention,\noffering each decade for a different soul or group of souls)`,
  pt:`Ó Deus de misericórdia e compaixão,\nofertamos este Rosário pelas almas dos fiéis defuntos,\nespecialmente pelos mais esquecidos e abandonados.\nPelos méritos da Paixão de Nosso Senhor\ne pela intercessão da Santíssima Virgem Maria,\nconcedei-lhes o repouso de todos os seus sofrimentos.\nBrilhe sobre eles a luz perpétua\ne descansem em paz.\nAmém.\n\n(Rezar o Rosário completo com esta intenção,\nofertando cada dezena por uma alma ou grupo diferente)`,
  la:`Deus misericordiae et pietatis,\nhoc Rosarium animabus fidelium defunctorum offerimus,\npraesertim maxime oblitis et derelictis.\nPer merita Passionis Domini nostri\net intercessionem Beatissimae Virginis Mariae,\nda eis requiem ab omnibus doloribus suis.\nLux perpetua eis luceat\net in pace requiescant.\nAmen.\n\n(Rosarium integrum cum hac intentione recitetur,\nsingulas decades variis animabus offerendo)`}},

{id:120,cat:'saints',
 title:{en:'Prayer to St. Faustina',pt:'Oração a Santa Faustina',la:'Ad Sanctam Faustinам'},
 text:{
  en:`O Saint Faustina,\nvessел of God's mercy,\nyou who experienced the great ocean of divine love,\nbe our intercessor before the Lord of Mercy.\nObtain for us faith in His mercy,\nhope in His forgiveness,\nand love for our neighbors.\nTeach us to say with you:\n"Jesus, I trust in You."\nAmen.`,
  pt:`Ó Santa Faustina,\nvaso da misericórdia de Deus,\nvós que viveu o grande oceano do amor divino,\nsedeis nossa intercessora diante do Senhor da Misericórdia.\nAlcançai para nós fé em Sua misericórdia,\nesperança em Seu perdão\ne amor ao próximo.\nEnsina-nos a dizer convosco:\n"Jesus, eu confio em Vós."\nAmém.`,
  la:`O Sancta Faustina,\nvas misericordiae Dei,\nquae magnum oceanum divini amoris experieris,\nesto nostra intercessrix ante Dominum Misericordiae.\nImpetres nobis fidem in misericordia eius,\nspem in indulgentia eius\net amorem proximi.\nDoce nos tecum dicere:\n"Iesu, in te confido."\nAmen.`}},
]; // end PRAYERS

// =====================================================================
// APP STATE
// =====================================================================
let currentLang = 'pt';
let currentCat = 'all';
let currentView = 'all'; // 'all' | 'rosary' | 'favorites'
let currentRosaryMystery = 'gozosos';
let currentPrayerId = null;
let detailLang = 'pt';
let searchText = '';
let favorites = JSON.parse(localStorage.getItem('catholic-favs')||'[]');
let synth = window.speechSynthesis;
let currentUtterance = null;
let isPlaying = false;
let progressInterval = null;

// =====================================================================
// INIT
// =====================================================================
function init() {
  renderCategories();
  filterPrayers();
  document.getElementById('totalCount').textContent = PRAYERS.length;
  updateFavBadge();
  document.addEventListener('keydown', e => {
    if(e.key==='Escape') closeDetail();
    if(currentPrayerId!==null){
      if(e.key==='ArrowRight') navigatePrayer(1);
      if(e.key==='ArrowLeft') navigatePrayer(-1);
    }
  });
}

// =====================================================================
// VIEW MANAGEMENT (Bottom Nav)
// =====================================================================
function setView(v){
  currentView = v;
  ['all','rosary','favorites'].forEach(x=>{
    const btn = document.getElementById('bnav-'+x);
    if(btn) btn.classList.toggle('active', x===v);
  });
  // cats button never stays active
  document.getElementById('bnav-cats').classList.remove('active');

  const prayerList = document.getElementById('prayerList');
  const rosaryGuide = document.getElementById('rosaryGuide');
  const topbarTitle = document.getElementById('topbarTitle');

  if(v==='rosary'){
    prayerList.style.display='none';
    rosaryGuide.style.display='flex';
    topbarTitle.innerHTML = '<span>O Rosário Completo</span>';
    renderRosaryGuide();
  } else {
    prayerList.style.display='grid';
    rosaryGuide.style.display='none';
    if(v==='favorites'){
      topbarTitle.innerHTML = '♥ <span>Minhas Favoritas</span>';
      renderFavorites();
    } else {
      updateTopbar();
      filterPrayers();
    }
  }
}

function toggleSidebar(){
  const s = document.getElementById('sidebar');
  const isHidden = s.style.display==='none' || getComputedStyle(s).display==='none';
  s.style.display = isHidden ? 'flex' : 'none';
}

// =====================================================================
// CATEGORIES & TOPBAR
// =====================================================================
function renderCategories() {
  const list = document.getElementById('catList');
  list.innerHTML = '';
  CATEGORIES.forEach(cat => {
    const count = cat.id==='all' ? PRAYERS.length : PRAYERS.filter(p=>p.cat===cat.id).length;
    const btn = document.createElement('button');
    btn.className = 'cat-btn' + (cat.id===currentCat?' active':'');
    btn.onclick = () => {
      currentCat = cat.id;
      setView('all');
      renderCategories();
    };
    btn.innerHTML = `<span class="cat-icon">${cat.icon}</span>
      <span class="cat-name">${cat[currentLang]||cat.pt}</span>
      <span class="cat-count">${count}</span>`;
    list.appendChild(btn);
  });
}

function updateTopbar(){
  const cat = CATEGORIES.find(c=>c.id===currentCat);
  const el = document.getElementById('topbarTitle');
  el.innerHTML = cat ? `<span>${cat[currentLang]||cat.pt}</span>` : 'Todas as <span>Orações</span>';
}

// =====================================================================
// PRAYER CARDS
// =====================================================================
function renderCard(p){
  const t = p.title[currentLang]||p.title.pt;
  const sub = p.title[currentLang==='pt'?'en':(currentLang==='en'?'la':'pt')]||'';
  const preview = (p.text[currentLang]||p.text.pt).split('\n').slice(0,2).join(' ');
  const cat = CATEGORIES.find(c=>c.id===p.cat);
  const isFav = favorites.includes(p.id);
  const hl = v => searchText ? v.replace(new RegExp(searchText.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi'), m=>`<mark>${m}</mark>`) : v;
  return `<div class="prayer-card ${p.id===currentPrayerId?'selected':''}" onclick="openPrayer(${p.id})">
    <button class="card-fav ${isFav?'is-fav':''}" onclick="event.stopPropagation();toggleFavorite(${p.id})" title="${isFav?'Remover dos favoritos':'Adicionar aos favoritos'}">${isFav?'♥':'♡'}</button>
    <div class="card-num">Nº ${String(p.id).padStart(3,'0')}</div>
    <div class="card-title">${hl(t)}</div>
    <div class="card-sub">${hl(sub)}</div>
    <div class="card-preview">${hl(preview)}…</div>
    ${cat?`<span class="card-tag">${cat.icon} ${cat[currentLang]||cat.pt}</span>`:''}
  </div>`;
}

function filterPrayers(){
  searchText = document.getElementById('searchInput').value.toLowerCase();
  const list = document.getElementById('prayerList');
  let filtered = PRAYERS.filter(p => {
    const matchCat = currentCat==='all' || p.cat===currentCat;
    const matchSearch = !searchText ||
      p.title.en.toLowerCase().includes(searchText) ||
      p.title.pt.toLowerCase().includes(searchText) ||
      p.title.la.toLowerCase().includes(searchText) ||
      p.text.en.toLowerCase().includes(searchText) ||
      p.text.pt.toLowerCase().includes(searchText);
    return matchCat && matchSearch;
  });

  if(filtered.length===0){
    list.innerHTML = `<div class="empty">
      <div class="empty-icon">✝</div>
      <div class="empty-text">Nenhuma oração encontrada · No prayers found</div>
    </div>`;
    return;
  }
  list.innerHTML = filtered.map(renderCard).join('');
}

function renderFavorites(){
  const list = document.getElementById('prayerList');
  const favPrayers = PRAYERS.filter(p => favorites.includes(p.id));
  if(favPrayers.length===0){
    list.innerHTML = `<div class="empty">
      <div class="empty-icon">♡</div>
      <div class="empty-text">Nenhuma oração favorita ainda<br><small style="font-size:12px;opacity:0.6">Toque ♡ em qualquer oração para salvar</small></div>
    </div>`;
    return;
  }
  list.innerHTML = favPrayers.map(renderCard).join('');
}

function setGlobalLang(lang){
  currentLang = lang;
  ['pt','en','la'].forEach(l => {
    document.getElementById('gtab-'+l).classList.toggle('active', l===lang);
  });
  renderCategories();
  if(currentView==='favorites') renderFavorites();
  else if(currentView==='rosary') renderRosaryGuide();
  else filterPrayers();
  updateTopbar();
  if(currentPrayerId!==null){
    detailLang = lang;
    updateDetailLang();
  }
}

// =====================================================================
// FAVORITES
// =====================================================================
function toggleFavorite(id){
  const idx = favorites.indexOf(id);
  if(idx===-1) favorites.push(id);
  else favorites.splice(idx,1);
  localStorage.setItem('catholic-favs', JSON.stringify(favorites));
  updateFavBadge();
  // refresh current view cards
  if(currentView==='favorites') renderFavorites();
  else if(currentView==='all') filterPrayers();
  // update modal button if open
  if(currentPrayerId===id) updateFavButton();
}

function toggleFavoriteModal(){
  if(currentPrayerId) toggleFavorite(currentPrayerId);
}

function updateFavButton(){
  const btn = document.getElementById('detailFav');
  if(!btn || currentPrayerId===null) return;
  const isFav = favorites.includes(currentPrayerId);
  btn.textContent = isFav ? '♥' : '♡';
  btn.classList.toggle('is-fav', isFav);
}

function updateFavBadge(){
  const badge = document.getElementById('favBadge');
  if(!badge) return;
  if(favorites.length>0){
    badge.textContent = favorites.length > 99 ? '99+' : favorites.length;
    badge.classList.add('show');
  } else {
    badge.classList.remove('show');
  }
}

// =====================================================================
// PRAYER DETAIL
// =====================================================================
function openPrayer(id){
  stopAudio();
  currentPrayerId = id;
  detailLang = currentLang;
  const p = PRAYERS.find(x=>x.id===id);
  if(!p) return;
  document.getElementById('detailNum').textContent = `Oração Nº ${String(id).padStart(3,'0')} · ${(CATEGORIES.find(c=>c.id===p.cat)||{}).pt||''}`;
  document.getElementById('detailTitle').textContent = p.title[detailLang]||p.title.pt;
  document.getElementById('detailSubtitle').textContent =
    [p.title.en, p.title.pt, p.title.la].filter((v,i)=>(i===0?'en':i===1?'pt':'la')!==detailLang).join(' · ');
  updateDetailLang();
  updateFavButton();
  document.getElementById('detailModal').style.display='flex';
  document.body.style.overflow='hidden';

  // Navigation within current filtered/view set
  const pool = currentView==='favorites'
    ? PRAYERS.filter(p=>favorites.includes(p.id))
    : (currentView==='rosary' ? PRAYERS : PRAYERS.filter(p2=>currentCat==='all'||p2.cat===currentCat));
  const idx = pool.findIndex(x=>x.id===id);
  document.getElementById('prevBtn').disabled = idx<=0;
  document.getElementById('nextBtn').disabled = idx>=pool.length-1;
}

function updateDetailLang(){
  const p = PRAYERS.find(x=>x.id===currentPrayerId);
  if(!p) return;
  ['pt','en','la'].forEach(l=>{
    document.getElementById('dtab-'+l).classList.toggle('active',l===detailLang);
  });
  const textEl = document.getElementById('detailText');
  textEl.textContent = p.text[detailLang]||p.text.pt;
  textEl.className = 'prayer-text' + (detailLang==='la'?' latin':'');
  document.getElementById('detailTitle').textContent = p.title[detailLang]||p.title.pt;
  const langs = {pt:'Português (pt-BR)',en:'English (en-US)',la:'Latim (la)'};
  document.getElementById('audioLangLabel').textContent = langs[detailLang]||detailLang;
  stopAudio();
}

function setDetailLang(lang){
  detailLang = lang;
  updateDetailLang();
}

function closeDetail(){
  stopAudio();
  document.getElementById('detailModal').style.display='none';
  document.body.style.overflow='';
  currentPrayerId = null;
}

function handleModalClick(e){
  if(e.target.id==='detailModal') closeDetail();
}

function navigatePrayer(dir){
  const pool = currentView==='favorites'
    ? PRAYERS.filter(p=>favorites.includes(p.id))
    : (currentView==='rosary' ? PRAYERS : PRAYERS.filter(p=>currentCat==='all'||p.cat===currentCat));
  const idx = pool.findIndex(x=>x.id===currentPrayerId);
  const next = pool[idx+dir];
  if(next) openPrayer(next.id);
}

// =====================================================================
// ROSARY GUIDE
// =====================================================================
function renderRosaryGuide(){
  const guide = document.getElementById('rosaryGuide');
  const m = MYSTERIES_DATA[currentRosaryMystery];
  const l = currentLang;

  // Build mystery selector
  const tabs = Object.entries(MYSTERIES_DATA).map(([k,v])=>`
    <button class="mys-tab ${k===currentRosaryMystery?'active':''}" onclick="selectMystery('${k}')">
      ${v[l]||v.pt}
      <span class="mys-day">${v.day[l]||v.day.pt}</span>
    </button>`).join('');

  // Helper to make a clickable prayer step
  const step = (icon, name, sub, prayerId, count='')=>`
    <div class="rosary-step ${prayerId?'clickable':''}" ${prayerId?`onclick="openPrayer(${prayerId})"`:''}>
      <span class="step-icon">${icon}</span>
      <div class="step-body">
        <div class="step-name">${name}</div>
        ${sub?`<div class="step-sub">${sub}</div>`:''}
      </div>
      ${count?`<span class="step-count">${count}</span>`:''}
      ${prayerId?`<span class="step-arr">›</span>`:''}
    </div>`;

  const intro = (txt)=>`<div class="rosary-step instruction"><span class="step-icon">📜</span><div class="step-body"><div class="step-name" style="font-style:italic;opacity:.7;font-size:13px">${txt}</div></div></div>`;

  const mysteries = m.list.map((ms,i)=>`
    <div class="rosary-step mystery-hdr">
      <span class="step-icon">${i+1}°</span>
      <div class="step-body"><div class="step-name" style="font-family:var(--font-title);font-size:13px;color:var(--gold2)">${ms[l]||ms.pt}</div></div>
    </div>
    ${step('📖', l==='en'?'Our Father':'Pai Nosso', l==='en'?'Say 1 time':'Rezar 1 vez', 1, '×1')}
    ${step('🌹', l==='en'?'Hail Mary':'Ave Maria', l==='en'?'Say 10 times':'Rezar 10 vezes', 2, '×10')}
    ${step('✨', l==='en'?'Glory Be':'Glória ao Pai', l==='en'?'Say 1 time':'Rezar 1 vez', 3, '×1')}
    ${step('🕊', l==='en'?'Fatima Prayer':'Oração de Fátima', l==='en'?'O my Jesus…':'Ó meu Jesus…', 43, '×1')}`
  ).join('');

  guide.innerHTML = `
    <div class="mystery-selector">${tabs}</div>
    <div class="rosary-scroll">
      <div class="rosary-section-head">⛪ ${l==='en'?'Opening':'Início do Rosário'}</div>
      ${step('✝', l==='en'?'Sign of the Cross':'Sinal da Cruz', l==='en'?'In the name of the Father…':'Em nome do Pai…', null)}
      ${intro(l==='en'?'Hold the Crucifix and recite:':'Segure o Crucifixo e recite:')}
      ${step('📖', l==='en'?"Apostles' Creed":'Credo dos Apóstolos', l==='en'?'I believe in God…':'Creio em Deus Pai…', 4, '×1')}
      ${step('📖', l==='en'?'Our Father':'Pai Nosso', l==='en'?'On the first large bead':'Na primeira conta grande', 1, '×1')}
      ${step('🌹', l==='en'?'Hail Mary (×3)':'Ave Maria (×3)', l==='en'?'For Faith, Hope, Charity':'Por Fé, Esperança, Caridade', 2, '×3')}
      ${step('✨', l==='en'?'Glory Be':'Glória ao Pai', '', 3, '×1')}

      <div class="rosary-section-head">📿 ${m[l]||m.pt} — ${l==='en'?'5 Decades':'5 Dezenas'}</div>
      ${intro(l==='en'?'For each decade: announce the mystery, meditate, then pray:':'Para cada dezena: anuncie o mistério, medite e reze:')}
      ${mysteries}

      <div class="rosary-section-head">🌹 ${l==='en'?'Closing Prayers':'Orações Finais'}</div>
      ${step('👑', l==='en'?'Hail Holy Queen':'Salve Rainha', l==='en'?'Salve Regina…':'Salve, Rainha, Mãe de Misericórdia…', 16, '×1')}
      ${step('🙏', l==='en'?'Rosary Closing Prayer':'Oração Final do Rosário', l==='en'?'O God, whose Only-begotten Son…':'Ó Deus, cujo Filho Unigênito…', 91, '×1')}
      ${step('✝', l==='en'?'Sign of the Cross':'Sinal da Cruz', l==='en'?'Conclude with the Sign':'Conclua com o Sinal', null)}

      <div class="rosary-section-head">📅 ${l==='en'?'Traditional Schedule':'Calendário Tradicional'}</div>
      ${Object.entries(MYSTERIES_DATA).map(([k,v])=>`
        <div class="rosary-step instruction">
          <span class="step-icon">📿</span>
          <div class="step-body">
            <div class="step-name" style="font-size:13px">${v[l]||v.pt}</div>
            <div class="step-sub">${v.day[l]||v.day.pt}</div>
          </div>
        </div>`).join('')}
    </div>`;
}

function selectMystery(key){
  currentRosaryMystery = key;
  renderRosaryGuide();
}

// =====================================================================
// AUDIO (Web Speech API)
// =====================================================================
const LANG_CODES = {pt:'pt-BR', en:'en-US', la:'la'};

function toggleAudio(){
  if(isPlaying){ stopAudio(); return; }
  playAudio();
}

function playAudio(){
  if(!synth || !currentPrayerId) return;
  stopAudio();
  const p = PRAYERS.find(x=>x.id===currentPrayerId);
  if(!p) return;
  const text = p.text[detailLang]||p.text.pt;
  const rate = parseFloat(document.getElementById('rateSelect').value);
  currentUtterance = new SpeechSynthesisUtterance(text);
  currentUtterance.lang = LANG_CODES[detailLang]||'pt-BR';
  currentUtterance.rate = rate;
  currentUtterance.pitch = 0.9;
  const voices = synth.getVoices();
  const langCode = LANG_CODES[detailLang];
  const match = voices.find(v=>v.lang===langCode)||voices.find(v=>v.lang.startsWith(langCode.split('-')[0]));
  if(match) currentUtterance.voice = match;
  currentUtterance.onstart = () => {
    isPlaying = true;
    document.getElementById('audioPlay').textContent = '⏸';
    document.getElementById('audioPlay').classList.add('playing');
    startProgressBar(text.length);
  };
  currentUtterance.onend = currentUtterance.onerror = () => {
    isPlaying = false;
    document.getElementById('audioPlay').textContent = '▶';
    document.getElementById('audioPlay').classList.remove('playing');
    clearProgressBar();
  };
  synth.speak(currentUtterance);
}

function stopAudio(){
  if(synth) synth.cancel();
  isPlaying = false;
  const btn = document.getElementById('audioPlay');
  if(btn){ btn.textContent='▶'; btn.classList.remove('playing'); }
  clearProgressBar();
}

function startProgressBar(len){
  const dur = (len/15)*(1/parseFloat(document.getElementById('rateSelect').value))*1000;
  const start = Date.now();
  progressInterval = setInterval(()=>{
    const elapsed = Date.now()-start;
    const pct = Math.min((elapsed/dur)*100,100);
    document.getElementById('audioBar').style.width = pct+'%';
    if(pct>=100) clearProgressBar();
  },100);
}

function clearProgressBar(){
  clearInterval(progressInterval);
  const bar = document.getElementById('audioBar');
  if(bar) bar.style.width='0%';
}

// Init app
window.addEventListener('DOMContentLoaded', init);
window.addEventListener('load', ()=>{ if(synth) synth.getVoices(); });
</script>
